# Hyper-Extract Examples: Templates Mapping
# 模板与测试数据映射表
# 格式: 模板路径 -> 测试数据路径

# 测试数据根目录
test_data_root: "tests/test_data/zh"

# 模板根目录
template_root: "hyperextract/templates/presets"

# Finance 领域 (5个模板)
finance:
  earnings_summary:
    template: "finance/earnings_summary"
    input: "finance/earnings_call_transcript_sample.md"
    type: "model"
    description: "财报电话会议摘要"

  event_timeline:
    template: "finance/event_timeline"
    input: "finance/annual_report_sample.md"
    type: "temporal_graph"
    description: "重大事件时间线"

  ownership_graph:
    template: "finance/ownership_graph"
    input: "finance/ipo_prospectus_sample.md"
    type: "graph"
    description: "股权结构图"

  risk_factor_set:
    template: "finance/risk_factor_set"
    input: "finance/annual_report_sample.md"
    type: "set"
    description: "风险因子集合"

  sentiment_model:
    template: "finance/sentiment_model"
    input: "finance/financial_news_sample.md"
    type: "model"
    description: "市场情绪模型"

