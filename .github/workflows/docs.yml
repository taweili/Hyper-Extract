name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., 0.1.0 or latest)"
        required: false
        default: "latest"
      alias:
        description: "Alias to set (e.g., dev, stable)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system mkdocs-material mkdocs-static-i18n mkdocstrings[python] pymdown-extensions mike

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy with mike
        run: |
          VERSION="${{ github.event.inputs.version || 'latest' }}"
          ALIAS="${{ github.event.inputs.alias }}"

          # Build and deploy the version
          if [ -n "$ALIAS" ]; then
            echo "Deploying version $VERSION with alias $ALIAS"
            mike deploy --push --update-aliases "$VERSION" "$ALIAS"
          else
            echo "Deploying version $VERSION"
            mike deploy --push "$VERSION"
          fi

          # Set default version to latest
          mike set-default --push latest

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
