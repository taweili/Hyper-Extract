language: [zh, en]

name: earnings_summary
type: model
tags: [finance, financial-report, earnings]

description:
  zh: '财报摘要模板 - 从财报文本中提取关键财务指标和业绩摘要'
  en: 'Earnings Summary Template - Extract key financial metrics and performance summary from financial reports'

output:
  description:
    zh: '单个公司的财务业绩摘要'
    en: 'Financial performance summary of a single company'
  fields:
    - name: company_name
      type: str
      description:
        zh: '公司全称，使用财报中的官方名称'
        en: 'Full company name as stated in the financial report'
      required: true
    - name: reporting_period
      type: str
      description:
        zh: '报告期间，格式如"2024Q3"或"2024年上半年"'
        en: 'Reporting period in format like "2024Q3" or "H1 2024"'
      required: true
    - name: revenue
      type: str
      description:
        zh: '营业收入金额，如"100"亿元'
        en: 'Revenue amount, e.g., "100" in hundred millions'
      required: true
    - name: net_profit
      type: str
      description:
        zh: '净利润金额，如"15"亿元'
        en: 'Net profit amount, e.g., "15" in hundred millions'
      required: true
    - name: notes
      type: str
      description:
        zh: '其他重要备注或说明'
        en: 'Other important notes or remarks'
      required: false

guideline:
  target:
    zh: '你是一位专业的财务分析师，负责从财报文本中准确提取核心财务数据。请确保数据的精确性和完整性。'
    en: 'You are a professional financial analyst responsible for accurately extracting core financial data from financial reports. Ensure precision and completeness of the data.'
  rules:
    zh:
      - '提取精确的营收和净利润数字，确保与财务报表一致'
      - '严格区分本报告期数据与历史/对比期数据，避免混淆'
      - '报告期格式应与原文保持一致，使用标准格式如"2024Q3"'
      - '金额默认单位为亿元人民币，数值保留原始精度'
      - '备注字段用于记录其他重要信息，如：数据来源、特殊事项、异常情况等'
    en:
      - 'Extract precise revenue and net profit figures, ensuring consistency with financial statements'
      - 'Strictly distinguish between current reporting period data and historical/comparative period data to avoid confusion'
      - 'Reporting period format should match the source text, use standard formats like "2024Q3"'
      - 'Amounts are in hundred millions of CNY by default, preserve original precision'
      - 'Use the notes field to record other important information such as data sources, special events, or anomalies'

identifiers: {}

display:
  label: '{company_name}'
