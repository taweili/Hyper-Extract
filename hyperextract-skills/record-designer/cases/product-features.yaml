language: [zh, en]

name: product_features
type: list
tags: [product, feature, analysis]

description:
  zh: '产品特性列表模板 - 从产品文档、评测或描述中提取结构化的产品特性列表'
  en: 'Product Features List Template - Extract structured product feature lists from product documentation, reviews, or descriptions'

output:
  description:
    zh: '从文本中提取的产品特性列表'
    en: 'List of product features extracted from the text'
  fields:
    - name: feature
      type: str
      description:
        zh: '产品特性名称或描述'
        en: 'Product feature name or description'
      required: true
    - name: category
      type: str
      description:
        zh: '特性所属类别，如"性能"、"功能"、"体验"、"安全"等'
        en: 'Category of the feature such as "performance", "functionality", "experience", "security"'
      required: true
    - name: sentiment
      type: str
      description:
        zh: '特性描述的情感倾向：正面/中性/负面'
        en: 'Sentiment of the feature description: positive/neutral/negative'
      required: false
      default: 'neutral'
    - name: evidence
      type: str
      description:
        zh: '原文引用，说明该特性的来源'
        en: 'Quote from the source text supporting this feature'
      required: false

guideline:
  target:
    zh: '你是一位产品分析专家，擅长从各类文本中识别、归类和提取产品特性。'
    en: 'You are a product analysis expert skilled at identifying, categorizing, and extracting product features from various texts.'
  rules:
    zh:
      - '提取所有明确的、具体的产品特性，不遗漏重要特性'
      - '对特性进行合理分类，使用统一的分类标签'
      - '常见分类包括：性能、功能、体验、安全、价格等'
      - '合并语义高度相近的特性，避免重复'
      - '去除纯主观评价、营销话术、泛泛而谈的描述'
      - '保留具体的功能描述和技术指标'
      - '情感倾向判断基于特性描述本身，而非用户评论或主观感受'
    en:
      - 'Extract all explicit and specific product features without omitting important ones'
      - 'Categorize features reasonably using consistent category labels'
      - 'Common categories include: performance, functionality, experience, security, price, etc.'
      - 'Merge highly similar features to avoid redundancy'
      - 'Remove purely subjective evaluations, marketing language, and vague descriptions'
      - 'Preserve specific functional descriptions and technical specifications'
      - 'Sentiment assessment is based on the feature description itself, not user reviews or subjective feelings'

identifiers: {}

display:
  label: '{feature}'
