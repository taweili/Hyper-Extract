language: zh
name: knowledge_graph
type: graph
tags: [general]
description: '通用知识图谱模板 - 从非结构化文本中提取关键实体、实体类型及实体之间的显式关系，适用于新闻、百科、制度和说明类文本的基础结构化建模。'

output:
  description: '由实体节点和关系边组成的通用知识图谱结果，用于表达文本中的核心对象及其语义连接。'
  entities:
    description: '文本中可独立识别、可作为关系端点的实体节点。'
    fields:
    - name: name
      type: str
      description: '实体在文本中的标准称呼或最稳定名称。'
    - name: type
      type: str
      description: '实体类别，如人物、地点、组织、物品、概念、事件、制度、技术等。'
    - name: description
      type: str
      description: '对实体身份、含义或在当前文本中作用的简要说明。'
      required: false
  relations:
    description: '实体之间的显式语义关系边。'
    fields:
    - name: source
      type: str
      description: '关系起点实体，必须对应已提取实体的 name。'
    - name: target
      type: str
      description: '关系终点实体，必须对应已提取实体的 name。'
    - name: type
      type: str
      description: '关系类型，应使用简洁明确的语义词，如包含、属于、合作、影响、导致、相关等。'
    - name: description
      type: str
      description: '对关系依据、方向或上下文含义的简要说明。'
      required: false

guideline:
  target:
    zh: '你是一位知识抽取与知识图谱构建专家。请基于给定文本识别关键实体，并构建仅由这些实体组成的二元关系图。'
  rules_for_entities:
    zh:
    - '提取对理解文本事实、结构或逻辑有价值的实体，避免无意义的泛称和临时短语。'
    - 'name 使用原文中最明确、最稳定的称呼；同一实体在全文中保持命名一致。'
    - 'type 需概括实体类别，可使用人物、地点、组织、物品、概念、事件、制度、技术等标签。'
    - 'description 用 1 句话概括实体的身份、属性或在文本中的作用；若信息不足可留空。'
  rules_for_relations:
    zh:
    - '仅在文本明确表达两个实体之间存在语义联系时创建关系，不要凭常识补充隐含关系。'
    - 'source 和 target 必须直接引用已提取实体的 name，不能新造实体名称。'
    - 'type 使用简洁、方向清晰的关系词，如包含、属于、相关、影响、合作、竞争、导致、位于、使用等。'
    - 'description 简要说明关系依据、作用方式或上下文；若文本没有额外信息可留空。'
    - '避免重复关系；若同一对实体存在多种不同关系，可分别记录。'

identifiers:
  entity_id: name
  relation_id: '{source}|{target}'
  relation_members:
    source: source
    target: target

options:
  extraction_mode: two_stage

display:
  entity_label: '{name} ({type})'
  relation_label: '{type}'
