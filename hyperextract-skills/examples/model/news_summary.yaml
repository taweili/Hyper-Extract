language: zh
name: NewsSummary
type: model
tags: [news]
description: '新闻摘要 - 从新闻报道中提取关键信息'

output:
  description: '新闻报道的结构化摘要'
  fields:
    - name: title
      type: str
      description: '新闻标题'
    - name: publication_date
      type: str
      description: '发布日期'
      required: false
    - name: source
      type: str
      description: '新闻来源'
      required: false
    - name: summary
      type: str
      description: '新闻摘要'

guideline:
  target: '你是一位新闻编辑。请从新闻报道中提取关键信息。'
  rules:
    - 'title 保留原文标题'
    - 'summary 用 2-3 句话概括核心内容'

display:
  label: '{title}'
