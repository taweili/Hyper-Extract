language: zh
name: biographical_timeline
type: temporal_graph
tags: [general]
description:
  zh: '人物生平时间线 - 从传记、自传、回忆录等人物叙事文本中提取带时间的生平事件，并组织为时间线。'

output:
  description: 
    zh: '由人物相关实体和生平事件关系组成的时间线结果，用于还原人物经历、角色变化与关键转折。'
  entities:
    description: 
      zh: '文本中与人物生平相关、可作为事件端点的实体。'
    fields:
    - name: name
      type: str
      description:
        zh: '实体在文本中的稳定名称或常用称呼。'
    - name: type
      type: str
      description:
        zh: '实体类型，如人物、地点、组织、作品、奖项、身份、物品、概念、其他。'
    - name: description
      type: str
      description:
        zh: '对实体身份、角色或在当前文本中作用的简要说明。'
      required: false
  relations:
    description: 
      zh: '围绕人物经历构建的事件关系边。'
    fields:
    - name: source
      type: str
      description:
        zh: '事件发起者或经历者，通常为人物主体或触发事件的相关实体。'
    - name: target
      type: str
      description:
        zh: '与该事件直接相关的对象实体，如地点、学校、组织、人物、作品、奖项等。'
    - name: eventType
      type: str
      description:
        zh: '事件类型。使用能够概括事件本身的简洁词语或短语，优先具体、直观、可区分；通常可用动词，如出生、入学、任职、结婚、出版、获奖。可参考示例，但不必局限于示例，也可以根据文本语义自行创造更贴切的标签。'
    - name: eventDate
      type: str
      description:
        zh: '事件时间。优先保留文本中最精确的时间表达；可为年份、年月、年月日，必要时可保留时间段。'
      required: false
    - name: details
      type: str
      description:
        zh: '事件补充说明，可记录身份、地点、机构、结果或上下文。'
      required: false

guideline:
  target:
    zh: '你是一位专业的人物传记事件抽取专家。请围绕人物主体，从文本中提取与其生平经历直接相关的实体和事件，并构建可信的时间线。'
  rules_for_entities:
    zh:
    - '优先提取与人物主体生平经历直接相关的实体，如人物、地点、组织、作品、奖项、身份称谓等。'
    - '为每个实体指定尽量准确的类型，并优先使用文本中的稳定称呼。'
    - '不必为纯背景概念、空泛评价或无法成为事件端点的内容单独建实体。'
  rules_for_relations:
    zh:
    - '仅从已提取实体中创建事件边，source 和 target 都必须对应实体 name。'
    - '事件应代表可放入人物时间线的经历、转折、公开活动或身份变化，不要把纯评价、性格描述或静态背景知识当作事件。'
    - '若一句话包含多个独立事件，应拆分为多条关系；若同一事件同时涉及时间、地点、组织、身份，可在 details 中补充。'
    - 'eventType 应使用能够概括事件本身的简洁词语或短语，优先具体、直观、可区分；通常可用动词或动宾结构。'
    - '优先写贴近原文语义的具体标签，不要过度抽象。例如优先写“入学、毕业、留学”而不是“教育”，优先写“任职、升迁、离任”而不是“工作”，优先写“出版、获奖、发明”而不是“成就”。'
    - '可参考但不限于以下示例：出生、逝世、迁居、入学、毕业、任职、结婚、合作、出版、获奖、参战、归国、隐居。'
    - '允许根据文本语义自行创造更贴切的标签，例如拜师、出道、登基、封侯、退赛、复出等；不要求必须使用示例中的词。'
    - '仅在确实无法提炼出更具体的事件标签时，才使用较泛的词。'
    - '时间信息为可选，仅在文本明确给出或能根据明确相对时间可靠换算时才填写。'
  rules_for_time:
    zh:
    - '当前观察日期：{observation_time}'
    - '相对时间解析（基于观察日期）：'
    - '- "去年" → {observation_time} 前一年'
    - '- "今年" → {observation_time} 所属年份'
    - '- "明年" → {observation_time} 后一年'
    - '- "昨天/今天/明天" → {observation_time} 前/当/后一天'
    - '- "十年前/五年后" → {observation_time} 前/后相应年数'
    - '- "年初/年末" → 当年 1月1日/12月31日'
    - '- "朝代" → 保留朝代名称'
    - '明确时间：优先保留文本中最精确的原始格式'
    - '- 年份（如 429年、2023年）→ 429、2023'
    - '- 年-月、年-月-日、时间段（如 1937-1945）→ 保持原格式'
    - '若只有模糊阶段性表达且无法可靠换算，不要强行补时间'
    - '缺失时间：留空'

identifiers:
  entity_id: name
  relation_id: '{source}|{target}'
  relation_members: 
    source: source
    target: target
  time_field: 'eventDate'

options:
  extraction_mode: two_stage

display:
  entity_label: '{name} ({type})'
  relation_label: '{eventType}({eventDate})'
