<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Pure Monochrome White Variant -->
  <!-- Excellent for image watermarks, dark photography overlays, and solid color backgrounds -->
  <g transform="translate(0, -20)">
    <polyline points="250,150 150,200 150,300 250,350" fill="none" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="15" stroke-dasharray="16, 20" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="250,150 350,200 350,300 250,350" fill="none" stroke="#FFFFFF" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="250" y1="250" x2="160" y2="198" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="12" stroke-linecap="round" stroke-dasharray="16, 20"/>
    <line x1="250" y1="250" x2="340" y2="198" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-opacity="0.8"/>
    <line x1="250" y1="250" x2="250" y2="345" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round"/>
    
    <circle cx="250" cy="250" r="16" fill="#FFFFFF"/>
    <circle cx="350" cy="200" r="10" fill="#FFFFFF"/>
    <circle cx="350" cy="300" r="10" fill="#FFFFFF"/>
  </g>
  <text x="250" y="440" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">
    HYPEREXTRACT
  </text>
</svg>