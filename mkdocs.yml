# Hyper-Extract Documentation Configuration

site_name: Hyper-Extract
site_description: LLM-powered knowledge extraction framework
site_author: Hyper-Extract Team
site_url: https://hyper-extract.github.io/

repo_name: hyper-extract/hyper-extract
repo_url: https://github.com/hyper-extract/hyper-extract
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?<!:)(?://|(?<!--))'
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hyper-extract/hyper-extract
  generator: false
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh/
      lang: zh

nav:
  - Home: en/index.md
  - Getting Started:
      - en/getting-started/index.md
      - en/getting-started/installation.md
      - en/getting-started/quickstart.md
      - en/getting-started/configuration.md
  - Concepts:
      - en/concepts/index.md
      - en/concepts/auto-types.md
      - en/concepts/methods.md
      - en/concepts/templates.md
  - Guides:
      - en/guides/index.md
      - en/guides/cli.md
      - en/guides/python-api.md
      - en/guides/domain-templates/index.md
      - en/guides/domain-templates/finance.md
      - en/guides/domain-templates/legal.md
      - en/guides/domain-templates/medicine.md
      - en/guides/domain-templates/tcm.md
  - Reference:
      - en/reference/index.md
      - en/reference/cli-reference.md
      - en/reference/template-gallery.md
  - Resources:
      - en/resources/faq.md
      - en/resources/troubleshooting.md
      - en/resources/contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.material
      emoji_generator: !!python/name:materialx.emoji.material
  - pymdownx.mark
  - attr_list

extra_css:
  - stylesheets/extra.css
