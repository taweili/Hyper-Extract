# Hyper-Extract Documentation Configuration

site_name: Hyper-Extract
site_description: LLM-powered knowledge extraction framework
site_author: Yifan Feng
site_url: https://hyper-extract.github.io/

repo_name: yifanfeng97/hyper-extract
repo_url: https://github.com/yifanfeng97/hyper-extract
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    primary: purple
    accent: deep purple

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          nav:
            - 首页: zh/index.md
            - CLI 使用指南:
                - zh/cli/index.md
                - zh/cli/cli.md
                - zh/cli/config.md
            - Python 开发者指南:
                - zh/python/index.md
                - zh/python/python-api.md
                - zh/python/config.md
            - 核心概念:
                - zh/concepts/index.md
                - zh/concepts/auto-types.md
            - 知识摘要模板:
                - zh/templates/index.md
                - zh/templates/domain/index.md
                - zh/templates/domain/finance.md
                - zh/templates/domain/legal.md
                - zh/templates/domain/medicine.md
                - zh/templates/domain/tcm.md
            - 帮助指南:
                - zh/resources/faq.md
                - zh/resources/troubleshooting.md
                - zh/resources/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yifanfeng97/hyper-extract

nav:
  - Home: en/index.md
  - CLI:
      - en/cli/index.md
      - en/cli/cli.md
      - en/cli/config.md
  - Python SDK:
      - en/python/index.md
      - en/python/python-api.md
      - en/python/config.md
  - Concepts:
      - en/concepts/index.md
      - en/concepts/auto-types.md
  - Templates:
      - en/templates/index.md
      - en/templates/domain/index.md
      - en/templates/domain/finance.md
      - en/templates/domain/legal.md
      - en/templates/domain/medicine.md
      - en/templates/domain/tcm.md
  - Help:
      - en/resources/faq.md
      - en/resources/troubleshooting.md
      - en/resources/contributing.md

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
