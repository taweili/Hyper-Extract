site_name: Hyper-Extract
site_description: An intelligent, LLM-powered knowledge extraction and evolution framework
site_url: https://your-github-username.github.io/hyper-extract/
repo_url: https://github.com/your-username/hyper-extract
repo_name: hyper-extract

# Theme configuration
theme:
  name: material
  language: en
  palette:
    # Light mode
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy       # Code copy button
    - content.code.annotate   # Code annotations
    - navigation.tabs         # Top navigation tabs
    - navigation.tabs.sticky  # Sticky tabs
    - navigation.sections     # Navigation sections
    - navigation.expand       # Expand navigation by default
    - navigation.top          # Back to top button
    - search.suggest          # Search suggestions
    - search.highlight        # Highlight search results
    - toc.follow              # TOC follows scroll
  icon:
    repo: fontawesome/brands/github

# Plugins configuration
plugins:
  - search:
      lang:
        - en
        - zh
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            docstring_style: google

# Markdown extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-username/hyper-extract
  alternate:
    - name: English
      link: /
      lang: en
    - name: 中文
      link: /zh/
      lang: zh

# Navigation structure
nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user-guide/getting-started.md
      - Knowledge Patterns: user-guide/knowledge-patterns.md
  - API Reference:
      - Overview: api/index.md
      - BaseAutoType: api/base.md
      - AutoModel: api/model.md
      - AutoList: api/auto_list.md
      - AutoSet: api/auto_set.md
  - 中文文档:
      - 首页: zh/index.md
