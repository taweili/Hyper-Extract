site_name: HyperExtract
site_description: Context-aware knowledge extraction library.
site_url: https://your-github-username.github.io/hyperextract/

# 核心主题配置
theme:
  name: material
  palette: 
    # 切换日间/夜间模式的按钮
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy # 代码块复制按钮
    - navigation.tabs   # 顶部导航栏

# 插件配置
plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src] # 告诉插件源码在哪里

# 导航栏结构
nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user-guide/getting-started.md
      - Configuration: user-guide/configuration.md
  - API Reference:      # 这里用来自动生成 API 文档
      - Extractor: api/extractor.md
      - Strategies: api/strategies.md
