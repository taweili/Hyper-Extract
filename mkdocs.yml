# Hyper-Extract Documentation Configuration

site_name: Hyper-Extract
site_description: LLM-powered knowledge extraction framework
site_author: Hyper-Extract Team
site_url: https://hyper-extract.github.io/

repo_name: hyper-extract/hyper-extract
repo_url: https://github.com/hyper-extract/hyper-extract
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    primary: purple
    accent: deep purple

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          nav:
            - 首页: zh/index.md
            - 开始使用:
                - zh/getting-started/index.md
                - zh/getting-started/installation.md
                - zh/getting-started/quickstart.md
                - zh/getting-started/configuration.md
            - 核心概念:
                - zh/concepts/index.md
                - zh/concepts/auto-types.md
                - zh/concepts/methods.md
                - zh/concepts/templates.md
            - 使用指南:
                - zh/guides/index.md
                - zh/guides/cli.md
                - zh/guides/python-api.md
                - zh/guides/domain-templates/index.md
                - zh/guides/domain-templates/finance.md
                - zh/guides/domain-templates/legal.md
                - zh/guides/domain-templates/medicine.md
                - zh/guides/domain-templates/tcm.md
            - 参考资料:
                - zh/reference/index.md
                - zh/reference/cli-reference.md
                - zh/reference/template-gallery.md
            - 资源:
                - zh/resources/index.md
                - zh/resources/faq.md
                - zh/resources/troubleshooting.md
                - zh/resources/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yifanfeng97/hyper-extract

nav:
  - Home: en/index.md
  - Getting Started:
      - en/getting-started/index.md
      - en/getting-started/installation.md
      - en/getting-started/quickstart.md
      - en/getting-started/configuration.md
  - Concepts:
      - en/concepts/index.md
      - en/concepts/auto-types.md
      - en/concepts/methods.md
      - en/concepts/templates.md
  - Guides:
      - en/guides/index.md
      - en/guides/cli.md
      - en/guides/python-api.md
      - en/guides/domain-templates/index.md
      - en/guides/domain-templates/finance.md
      - en/guides/domain-templates/legal.md
      - en/guides/domain-templates/medicine.md
      - en/guides/domain-templates/tcm.md
  - Reference:
      - en/reference/index.md
      - en/reference/cli-reference.md
      - en/reference/template-gallery.md
  - Resources:
      - en/resources/faq.md
      - en/resources/troubleshooting.md
      - en/resources/contributing.md

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
