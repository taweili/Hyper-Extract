language: zh
name: FailureKnowledgeHypergraph
type: hypergraph
tags:
- industry
description:
  zh: 故障知识超图 - 从故障案例中提取故障现象、根因、部件、解决方案的复杂关联关系
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 实体名称（例如：振动异常、轴承损坏密封失效等）
      required: true
      default: ''
    - name: category
      type: string
      description:
        zh: 类型：故障现象、根因、部件、解决方案
      required: true
      default: ''
    - name: description
      type: string
      description:
        zh: 描述（例如：表现为轴承温度升高、由于润滑不良导致）
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: nodes
      type: list
      description:
        zh: 参与故障推理的节点列表：[故障现象1, 故障现象2, ..., 根因, 部件, 解决方案1, 解决方案2, ...]
      required: true
      default: ''
    - name: reasoning_type
      type: string
      description:
        zh: 推理类型：故障诊断、原因分析、解决方案
      required: true
      default: ''
    - name: failure_description
      type: string
      description:
        zh: 故障详细描述
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位设备故障诊断专家，请从故障案例中提取故障知识实体和故障诊断推理作为超边。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 识别故障现象（振动异常、噪音、温度升高、泄漏、异响）
    - 识别故障根因（润滑不良、过载、磨损、老化、设计缺陷）
    - 识别故障部件（轴承、密封、电机、泵体、阀门）
    - 识别解决方案（更换备件、调整参数、清洁、紧固）
    - 建立从现象→根因→解决方案的完整推理链条
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 识别故障现象（振动异常、噪音、温度升高、泄漏、异响）
    - 识别故障根因（润滑不良、过载、磨损、老化、设计缺陷）
    - 识别故障部件（轴承、密封、电机、泵体、阀门）
    - 识别解决方案（更换备件、调整参数、清洁、紧固）
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别故障现象（振动异常、噪音、温度升高、泄漏、异响）
    - 识别从现象到根因的推理
    - 识别从根因到解决方案的推理
    - 边的 nodes 字段应包含所有参与该故障推理的实体
identifiers:
  entity_id: name
  relation_id: '{reasoning_type}_{nodes}'
  relation_members: nodes
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{reasoning_type}'
