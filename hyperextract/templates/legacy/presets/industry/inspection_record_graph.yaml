language: zh
name: InspectionRecordGraph
type: graph
tags:
- industry
description:
  zh: 巡检记录图谱 - 提取设备和巡检项，构建巡检层级结构，识别设备与巡检项之间的从属关系
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 实体名称（如：数控加工中心、机械臂系统、电机运行状态、轴承温度检查等）
      required: true
      default: ''
    - name: category
      type: str
      description:
        zh: 类别：设备、巡检项
      required: true
      default: ''
    - name: description
      type: str
      description:
        zh: 对该实体的描述
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 父实体（整体/设备）名称
      required: true
      default: ''
    - name: target
      type: str
      description:
        zh: 子实体（巡检项/部分）名称
      required: true
      default: ''
    - name: relationType
      type: str
      description:
        zh: 关系类型：属于、子类
      required: true
      default: ''
    - name: details
      type: str
      description:
        zh: 关系详细说明
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位工业设备巡检分析专家，请从文本中提取设备和巡检项，构建巡检层级结构。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别大设备（如数控加工中心、机械臂系统、物料输送系统等）
    - 识别每个设备下的巡检项（如电机运行状态、轴承温度、冷却液位等）
    - 建立巡检项与设备之间的从属关系
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 识别设备名称（大类）
    - 识别巡检项名称（具体检查点）
    - 为每个实体指定类别（设备/巡检项）
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别巡检项与设备之间的从属关系
    - 例如：电机运行状态 属于 数控加工中心
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{relationType}'
