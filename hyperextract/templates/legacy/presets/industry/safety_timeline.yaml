language: zh
name: SafetyTimeline
type: temporal_graph
tags:
- industry
description:
  zh: 事故时序图 - 从事故调查报告中提取时间线，还原事故发生前后的操作与响应序列
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 实体名称
      required: true
      default: ''
    - name: entity_type
      type: string
      description:
        zh: 类型：人员、设备、设施等
      required: true
      default: ''
    - name: description
      type: string
      description:
        zh: 描述
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: string
      description:
        zh: 源实体名称
      required: true
      default: ''
    - name: target
      type: string
      description:
        zh: 目标实体名称
      required: true
      default: ''
    - name: action
      type: string
      description:
        zh: 操作动作
      required: true
      default: ''
    - name: timestamp
      type: string
      description:
        zh: 动作发生时间
      required: false
      default: ''
    - name: location
      type: string
      description:
        zh: 发生位置
      required: false
      default: ''
    - name: status
      type: string
      description:
        zh: 状态描述
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位工业安全事故调查专家，请从事故调查报告中提取时间线，还原事故发生前后的操作与响应序列。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别事故相关人员（操作工、班组长、安全员、管理人员）
    - 识别相关设备（泵、电机、阀门、仪表）
    - 识别操作动作（启动、停止、巡检、维修、发现异常）
    - 识别环境状态（正常、异常、报警、危险）
  rules_for_entities:
    zh:
    - 每个节点对应一个独立实体
    - 实体名称与原文保持一致
    - 人员、设备、设施、岗位、位置等
  rules_for_relations:
    zh:
    - source 和 target 都必须是已知实体列表中的节点
    - 每个操作动作都必须提取为一条边
    - 节点名称必须完全匹配
    - 操作类型：启动、停止、开启、关闭、巡检、检查、排查、维修、检修、保养、发现、识别、报告、操作、使用、触发
  rules_for_time:
    zh:
    - 当前观察日期：{observation_time}
    - 相对时间解析（基于观察日期）：
    - '- "事故前30分钟" → {observation_time} 前30分钟'
    - '- "当天上午" → {observation_time} 当天上午'
    - '- "随后" → 接续前一事件'
    - 精确时间 → 保持原样
    - 时间缺失 → 留空，不要猜测
identifiers:
  entity_id: name
  relation_id: '{source}|{action}|{target}'
  relation_members:
    source: source
    target: target
  time_field: timestamp
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({entity_type})'
  relation_label: '{action} [{timestamp}]'
