language: zh
name: SystemTopologyGraph
type: graph
tags:
- industry
description:
  zh: 系统拓扑图谱 - 提取工厂的厂区、系统、子系统、设备等层级结构
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 实体名称（如：A工厂、制造车间A、数控加工系统、冷却系统等）
      required: true
      default: ''
    - name: category
      type: str
      description:
        zh: 类别：厂区、系统、子系统、设备
      required: true
      default: ''
    - name: function
      type: str
      description:
        zh: 功能描述
      required: false
      default: ''
    - name: capacity
      type: str
      description:
        zh: 容量或规模
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 上级实体名称（厂区或系统）
      required: true
      default: ''
    - name: target
      type: str
      description:
        zh: 下级实体名称（系统或子系统或设备）
      required: true
      default: ''
    - name: relationType
      type: str
      description:
        zh: 关系类型：包含等
      required: true
      default: ''
guideline:
  target:
    zh: '你是一位工业系统架构分析专家，请从文本中提取实体和它们之间的层级关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别厂区（如A工厂、B工厂）
    - 识别生产系统（如制造车间、加工车间）
    - 识别子系统（如数控加工系统、冷却系统）
    - 识别具体设备（如数控加工中心、机械臂、泵等）
    - 建立上下级的层级包含关系
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 识别厂区名称（如A工厂、B工厂）
    - 识别生产系统名称（如制造车间、加工车间）
    - 识别子系统名称（如数控加工系统、冷却系统）
    - 识别具体设备名称（如数控加工中心、机械臂、泵等）
    - 为每个实体指定类别（厂区/系统/子系统/设备）
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别厂区与系统之间的包含关系
    - 识别系统与子系统之间的包含关系
    - 识别子系统与设备之间的包含关系
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{relationType}'
