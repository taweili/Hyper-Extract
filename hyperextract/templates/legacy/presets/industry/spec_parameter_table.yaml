language: zh
name: SpecParameterTable
type: model
tags:
- industry
description:
  zh: 核心规格表 - 从技术规格书中提取额定功率、材质、尺寸精度等关键技术指标
output:
  description: {}
  fields:
  - name: equipment_name
    type: string
    description:
      zh: 设备或产品名称（例如：数控加工中心、离心泵、变压器等）
    required: true
    default: ''
  - name: model_number
    type: string
    description:
      zh: 型号或规格代号
    required: false
    default: ''
  - name: manufacturer
    type: string
    description:
      zh: 制造商或供应商
    required: false
    default: ''
  - name: rated_power
    type: string
    description:
      zh: 额定功率（例如：55kW、200kVA、15kW/20kW）
    required: false
    default: ''
  - name: rated_voltage
    type: string
    description:
      zh: 额定电压（例如：380V、10kV、220V）
    required: false
    default: ''
  - name: rated_current
    type: string
    description:
      zh: 额定电流（例如：100A、50Hz）
    required: false
    default: ''
  - name: frequency
    type: string
    description:
      zh: 工作频率（例如：50Hz、60Hz）
    required: false
    default: ''
  - name: material
    type: string
    description:
      zh: 主要材质或材料（例如：不锈钢304、铸铁、铝合金）
    required: false
    default: ''
  - name: dimensions
    type: string
    description:
      zh: 外形尺寸或安装尺寸（例如：2000×1500×1800mm）
    required: false
    default: ''
  - name: weight
    type: string
    description:
      zh: 重量或质量（例如：2500kg、5.8t）
    required: false
    default: ''
  - name: accuracy
    type: string
    description:
      zh: 精度等级或精度指标（例如：±0.01mm、IT7级）
    required: false
    default: ''
  - name: temperature_range
    type: string
    description:
      zh: 工作温度范围（例如：-20℃~50℃、0~80℃）
    required: false
    default: ''
  - name: pressure_range
    type: string
    description:
      zh: 工作压力范围（例如：0~1.6MPa、PN16）
    required: false
    default: ''
  - name: flow_rate
    type: string
    description:
      zh: 流量参数（例如：100m³/h、50L/min）
    required: false
    default: ''
  - name: speed
    type: string
    description:
      zh: 转速或速度（例如：1450rpm、0.5~2m/s）
    required: false
    default: ''
  - name: capacity
    type: string
    description:
      zh: 容量或处理能力（例如：500L、10m³/h）
    required: false
    default: ''
  - name: protection_level
    type: string
    description:
      zh: 防护等级（例如：IP65、IP55）
    required: false
    default: ''
  - name: insulation_class
    type: string
    description:
      zh: 绝缘等级（例如：F级、H级）
    required: false
    default: ''
  - name: other_parameters
    type: list
    description:
      zh: 其他关键技术参数列表（如适用）
    required: false
    default: ''
guideline:
  target:
    zh: '你是一位工业设备技术专家，请从技术规格书中提取所有关键技术参数。

      '
  rules:
    zh:
    - 每个对象对应一个独立的设备或产品，禁止合并
    - 参数值与原文保持一致
    - 提取设备名称、型号、制造商
    - 提取电气参数：额定功率、额定电压、额定电流、频率
    - 提取物理参数：材质、尺寸、重量、精度
    - 提取工况参数：温度范围、压力范围、流量、转速
    - 提取性能参数：容量、防护等级、绝缘等级
    - 保留原始单位，不要换算
display:
  label: '{equipment_name} ({model_number})'
