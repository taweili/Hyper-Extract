language: zh
name: FailureCaseGraph
type: graph
tags:
- industry
description:
  zh: 故障案例图谱 - 提取故障现象、原因、措施和教训，识别从发现到处理的完整故障演进链条
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 现象/措施等实体的名称
      required: true
      default: ''
    - name: category
      type: str
      description:
        zh: 类别：现象、原因、措施、教训
      required: true
      default: ''
    - name: description
      type: str
      description:
        zh: 对该实体内涵的进一步阐述和说明
      required: false
      default: ''
    - name: equipment
      type: str
      description:
        zh: 涉及设备名称
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 上游环节名称
      required: true
      default: ''
    - name: target
      type: str
      description:
        zh: 下游环节名称
      required: true
      default: ''
    - name: relationType
      type: str
      description:
        zh: 关系类型：导致、采取、产生、发现
      required: true
      default: ''
    - name: time_sequence
      type: str
      description:
        zh: 时序关系：发现、分析、处理、总结
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位工业设备故障分析专家，请从文本中提取故障现象、原因、处理措施和经验教训。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别故障现象和异常表现
    - 分析故障原因和根本原因
    - 提取处理措施和解决方案
    - 总结经验教训和改进建议
    - 建立从发现到处理的完整链条
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 识别故障现象和异常表现
    - 识别故障原因和根本原因
    - 识别处理措施和解决方案
    - 识别经验教训和改进建议
    - 记录涉及的设备名称
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别从现象到原因的关联
    - 识别从原因到措施的关联
    - 识别从措施到教训的关联
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{relationType}'
