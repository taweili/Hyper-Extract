language: zh
name: SystemCompatibilityGraph
type: hypergraph
tags:
- industry
description:
  zh: 系统兼容性超图 - 从技术规格书中提取设备与环境、介质的对应关系
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 实体名称（例如：离心泵P-101、不锈钢304、高温环境等）
      required: true
      default: ''
    - name: category
      type: str
      description:
        zh: 类型：设备、材质、介质、环境、连接方式
      required: true
      default: ''
    - name: description
      type: str
      description:
        zh: 描述（例如：15kW离心泵、适用于清水、适用于常温）
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: nodes
      type: list
      description:
        zh: 参与兼容性关系的节点列表：[设备, 材质/介质/环境1, 材质/介质/环境2, ...]
      required: true
      default: ''
    - name: compatibility_type
      type: str
      description:
        zh: 兼容性类型：材质兼容、介质适用、环境适用、连接匹配
      required: true
      default: ''
    - name: compatibility_note
      type: str
      description:
        zh: 兼容性说明或限制条件（例如：需加装过滤器、建议使用O型圈）
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位工业设备选型专家，请从技术规格书中提取实体和设备与环境、介质的兼容性关系作为超边。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 识别设备（离心泵、压缩机、阀门、换热器）
    - 识别材质（不锈钢304、铸铁、铝合金、碳钢）
    - 识别介质（清水、污水、油品、酸碱溶液）
    - 识别环境（高温环境、低温环境、防爆区域、腐蚀性环境）
    - 识别连接方式（法兰连接、螺纹连接、焊接）
    - 建立设备与材质、介质、环境的兼容性关系
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 识别设备（离心泵、压缩机、阀门、换热器）
    - 识别材质（不锈钢304、铸铁、铝合金、碳钢）
    - 识别介质（清水、污水、油品、酸碱溶液）
    - 识别环境（高温环境、低温环境、防爆区域、腐蚀性环境）
    - 识别连接方式（法兰连接、螺纹连接、焊接）
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别设备与材质的兼容性（不锈钢泵适用于清水）
    - 识别设备与介质的适用性（化工泵适用于酸碱溶液）
    - 识别设备对环境的要求（防爆电机适用于防爆区域）
    - 识别连接方式的匹配
    - 边的 nodes 字段应包含所有参与该兼容性关系的实体
identifiers:
  entity_id: name
  relation_id: '{compatibility_type}_{nodes}'
  relation_members: nodes
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{compatibility_type}'
