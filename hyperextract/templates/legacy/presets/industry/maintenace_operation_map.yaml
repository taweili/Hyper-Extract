language: zh
name: MaintenaceOperationMap
type: hypergraph
tags:
- industry
description:
  zh: 维修作业图 - 从维修作业指导书中提取操作人、工具、对象、耗时的复杂关联关系
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 实体名称（例如：维修工李四、扳手、离心泵P-101、润滑油等）
      required: true
      default: ''
    - name: category
      type: string
      description:
        zh: 类型：人员、工具、设备、材料、备件、岗位
      required: true
      default: ''
    - name: description
      type: string
      description:
        zh: 描述或规格（例如：高级维修工、16mm开口扳手、15kW离心泵）
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: nodes
      type: array
      description:
        zh: 参与作业的节点列表：[操作人员, 工具1, 工具2, 设备, 材料1, ...]
      required: true
      default: ''
    - name: operation_name
      type: string
      description:
        zh: 作业名称或步骤（例如：更换轴承、清洗过滤器、添加润滑油）
      required: true
      default: ''
    - name: duration
      type: string
      description:
        zh: 作业耗时（例如：30分钟、2小时、半天）
      required: false
      default: ''
    - name: prerequisite
      type: string
      description:
        zh: 前置条件或注意事项（例如：需停机断电、需佩戴防护用品）
      required: false
      default: ''
    - name: quality_standard
      type: string
      description:
        zh: 质量标准或验收要求（例如：运转正常无异响、螺栓紧固力矩达标）
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位设备维修管理专家，请从维修作业指导书中提取实体和维修作业中的复杂关联作为超边。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 识别维修人员（维修工、班组长、技术员）
    - 识别工具（扳手、螺丝刀、千斤顶、测量仪器）
    - 识别设备（离心泵、电机、阀门）
    - 识别材料（润滑油、密封胶、清洁剂）
    - 识别备件（轴承、密封圈、滤芯）
    - 识别维修作业步骤（更换轴承、清洗过滤器、添加润滑油）
    - 关联操作人员和工具
    - 关联设备和材料/备件
    - 提取作业耗时
    - 记录前置条件和质量标准
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 识别维修人员（维修工、班组长、技术员）
    - 识别工具（扳手、螺丝刀、千斤顶、测量仪器）
    - 识别设备（离心泵、电机、阀门）
    - 识别材料（润滑油、密封胶、清洁剂）
    - 识别备件（轴承、密封圈、滤芯）
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别维修作业步骤（更换轴承、清洗过滤器、添加润滑油）
    - 关联操作人员和工具
    - 关联设备和材料/备件
    - 提取作业耗时
    - 记录前置条件和质量标准
    - 边的 nodes 字段应包含所有参与该作业的实体
identifiers:
  entity_id: name
  relation_id: '{operation_name}_{nodes}'
  relation_members: nodes
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{operation_name}'
