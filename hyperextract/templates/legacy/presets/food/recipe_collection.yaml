name: "RecipeCollection"
autotype: set
tag: [food]

language: zh

description:
  zh: "菜谱名录 - 去重提取文本中出现的所有独立菜品实体及基本分类"

item_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "菜品名称，保持与原文一致"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "菜品分类：凉菜、热菜、主食、甜品、小吃、饮品等"
      required: true
      default: ""
    - name: price
      type: "string"
      description:
        zh: "价格，如 ¥68、18元"
      required: false
      default: ""
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的餐饮知识专家，请从文本中提取所有独立菜品实体，形成菜谱名录。
  rules:
    zh: |
      1. 提取所有独立菜品：每个菜品只能对应一条记录，禁止重复
      2. 为每个菜品指定分类：凉菜、热菜、主食、甜品、小吃、饮品等
      3. 保持菜品名称与原文一致
      4. 如有价格信息，一并提取
      5. 去重：同一菜品只保留一条记录
      6. 保持客观准确，不添加文本中没有的信息
      7. 菜品名称大小写需与原文保持一致
      8. 菜单中常见的分类：凉菜、热菜、主食、甜品、小吃、饮品
      9. 同一菜品在不同分类下出现时，保留所有出现过的分类

identifiers:
  item_id: "name"

display:
  label: "{name} ({category})"
