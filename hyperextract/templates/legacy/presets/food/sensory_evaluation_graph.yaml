name: "SensoryEvaluationGraph"
autotype: graph
tag: [food]

language: zh

description:
  zh: "感官评价图谱 - 提取菜品-口感/味道-食材/技法的评价逻辑"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "节点名称"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "节点类型：菜品/口感/味道/食材/技法"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源节点"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标节点"
      required: true
      default: ""
    - name: relation_type
      type: "string"
      description:
        zh: "关系类型：具有特征/归因于"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "详细描述"
      required: true
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的美食评论家，请从文本中提取感官评价图谱，包括菜品、口感/味道、食材/技法之间的归因关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 关系类型：具有特征（描述菜品具有某种口感/味道）、归因于（解释某种口感/味道的来源）
      6. 节点类型：菜品、口感、味道、食材、技法
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 节点类型：菜品、口感、味道、食材、技法
      4. 口感描述词：脆爽、鲜嫩、Q弹、绵密、软糯等
      5. 味道描述词：鲜香、麻辣、酸甜、醇厚、清爽等
      6. 技法描述词：腌制、烹煮、火候、刀工等
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 每条边必须连接已提取的节点
      3. 关系描述应与原文保持一致
      4. 关系类型：具有特征（描述菜品具有某种口感/味道）、归因于（解释某种口感/味道的来源）

identifiers:
  node_id: "name"
  edge_id: "{source}|{relation_type}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{relation_type}"
