name: "StandardRecipeCard"
autotype: model
tag: [food]

language: zh

description:
  zh: "单品标准食谱 - 针对单个菜品提取完整的配料表、步骤说明及关键TIPS"

schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "菜名"
      required: true
      default: ""
    - name: cuisine
      type: "string"
      description:
        zh: "菜系，如浙菜、川菜、粤菜等"
      required: false
      default: ""
    - name: category
      type: "string"
      description:
        zh: "分类，如热菜、凉菜、主食、甜品等"
      required: false
      default: ""
    - name: flavor
      type: "string"
      description:
        zh: "口味描述，如咸甜鲜香、麻辣等"
      required: false
      default: ""
    - name: difficulty
      type: "string"
      description:
        zh: "难度：简单/中等/困难"
      required: false
      default: ""
    - name: cooking_time
      type: "string"
      description:
        zh: "预估烹饪时间，如90分钟"
      required: false
      default: ""
    - name: servings
      type: "string"
      description:
        zh: "适合人数，如4-6人份"
      required: false
      default: ""
    - name: main_ingredients
      type: "list"
      description:
        zh: "主料列表"
      required: false
      default: ""
    - name: auxiliary_ingredients
      type: "list"
      description:
        zh: "辅料列表"
      required: false
      default: ""
    - name: seasonings
      type: "list"
      description:
        zh: "调味品列表"
      required: false
      default: ""
    - name: steps
      type: "list"
      description:
        zh: "烹饪步骤列表"
      required: false
      default: ""
    - name: tips
      type: "list"
      description:
        zh: "关键控制点TIPS"
      required: false
      default: ""
    - name: nutrition_info
      type: "string"
      description:
        zh: "营养信息"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的烹饪大师，请从文本中提取单个菜品的完整标准食谱信息。
  rules:
    zh: |
      1. 识别文本的核心菜品主体
      2. 提取菜名、菜系、分类、口味等基本信息
      3. 提取完整的原料信息（分为主料、辅料、调味品）
      4. 提取详细的烹饪步骤
      5. 提取关键控制点TIPS
      6. 原料分类：主料（主要食材）、辅料（辅助食材）、调味品（调料）
      7. 烹饪步骤：按顺序提取，每步一个条目
      8. TIPS：提取烹饪中的关键技巧和注意事项

display:
  label: "{name} ({category})"
