language: zh
name: LitigationParticipantMap
type: graph
tags:
- legal
description:
  zh: 诉讼参与人图谱 - 提取原告、被告、第三人、代理律师及证人之间的关系
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 参与人姓名或名称
      required: true
      default: ''
    - name: participant_type
      type: string
      description:
        zh: 参与人类型：原告、被告、第三人、委托诉讼代理人、法定代理人、证人、鉴定人、法官、合议庭成员
      required: true
      default: ''
    - name: description
      type: string
      description:
        zh: 参与人角色描述
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: string
      description:
        zh: 源参与人姓名或名称
      required: true
      default: ''
    - name: target
      type: string
      description:
        zh: 目标参与人姓名或名称
      required: true
      default: ''
    - name: relation_type
      type: string
      description:
        zh: 关系类型：代理、代表、股东、董事、担保、上下级、同案当事人、敌对
      required: true
      default: ''
    - name: description
      type: string
      description:
        zh: 关系描述
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位专业的法律文书分析师，请从文本中提取诉讼参与人及其之间的关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的参与人，禁止将多个参与人合并为一个节点
    - 参与人名称与原文保持一致
    - 仅从已知参与人列表中提取边，不要创建未列出的参与人
    - 关系描述应与原文保持一致
    - 参与人类型：原告、被告、第三人、委托诉讼代理人、法定代理人、证人、鉴定人、法官、合议庭成员
    - 关系类型：代理、代表、股东、董事、担保、上下级、同案当事人、敌对
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的参与人，禁止将多个参与人合并为一个节点
    - 参与人名称与原文保持一致
    - 参与人类型：原告、被告、第三人、委托诉讼代理人、法定代理人、证人、鉴定人、法官、合议庭成员
  rules_for_relations:
    zh:
    - 仅从已知参与人列表中提取边，不要创建未列出的参与人
    - 关系描述应与原文保持一致
    - 关系类型：代理、代表、股东、董事、担保、上下级、同案当事人、敌对
identifiers:
  entity_id: name
  relation_id: '{source}|{relation_type}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({participant_type})'
  relation_label: '{relation_type}'
