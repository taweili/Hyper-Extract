language: zh
name: AdjudicationLogic
type: hypergraph
tags:
- legal
description:
  zh: 裁判逻辑超图 - 建模法官的推理过程
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 要素名称
      required: true
      default: ''
    - name: category
      type: string
      description:
        zh: 要素类型：事实认定、法律依据、裁判结论、主旨、证据、其他
      required: true
      default: ''
    - name: description
      type: string
      description:
        zh: 简要描述
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: logic_type
      type: string
      description:
        zh: 推理类型：事实认定、法律适用、因果认定、责任认定、金额计算、其他
      required: true
      default: ''
    - name: participants
      type: array
      description:
        zh: 参与要素名称列表，必须使用已提取节点的 name
      required: true
      default: ''
    - name: reasoning
      type: string
      description:
        zh: 推理过程描述，从事实到结论的逻辑推导
      required: true
      default: ''
    - name: conclusion
      type: string
      description:
        zh: 推理结论
      required: false
      default: ''
    - name: source_clause
      type: string
      description:
        zh: 裁判文书的章节位置
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位专业的法律工作者，请从裁判文书中提取裁判要素和裁判逻辑。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的要素，禁止将多个要素合并为一个节点
    - 要素名称与原文保持一致
    - 仅从已提取节点中提取边，不要创建新名称
    - 超边必须包含 logic_type, participants, reasoning
    - participants 应包含涉及的事实认定、法律依据、裁判结论等要素
    - 要素类型：事实认定（法院认定的案件事实）、法律依据（适用的法律条文、司法解释等）、裁判结论（判决结果或裁定结果）、主旨（裁判的核心观点或要旨）、证据（用于证明事实的证据材料）、其他（不属于上述类别的要素）
    - 推理类型：事实认定（从证据推导出事实）、法律适用（将法律适用于事实）、因果认定（认定行为与结果之间的因果关系）、责任认定（认定责任主体和责任大小）、金额计算（计算赔偿金额或标的金额）、其他（不属于上述类别的推理）
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的要素，禁止将多个要素合并为一个节点
    - 要素名称与原文保持一致
    - 提取裁判文书中涉及的要素作为节点
    - 为每个要素指定类型
    - 为每个要素添加简要描述（1-2句话）
  rules_for_relations:
    zh:
    - participants 必须严格使用已知裁判要素列表中的名称，不要创建新名称
    - 超边必须包含 logic_type, participants, reasoning
    - participants 应包含涉及的事实认定、法律依据、裁判结论等要素
    - reasoning 描述从事实到结论的逻辑推导过程
identifiers:
  entity_id: name
  relation_id: '{logic_type}_{participants}'
  relation_members: participants
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '[{logic_type}] {conclusion}'
