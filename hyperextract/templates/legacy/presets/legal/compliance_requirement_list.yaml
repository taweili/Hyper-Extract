language: zh
name: ComplianceRequirementList
type: list
tags:
- legal
description:
  zh: 合规要求清单 - 从法规或政策文件中提取合规义务
output:
  description: {}
  fields:
  - name: requirement_type
    type: str
    description:
      zh: 要求类型：许可要求、报告要求、披露要求、禁止性规定、程序性要求、其他
    required: true
    default: ''
  - name: requirement_title
    type: str
    description:
      zh: 要求标题或简要名称
    required: true
    default: ''
  - name: content
    type: str
    description:
      zh: 要求的具体内容
    required: true
    default: ''
  - name: responsible_entity
    type: str
    description:
      zh: 责任主体或适用对象
    required: false
    default: ''
  - name: deadline
    type: str
    description:
      zh: 履行期限或截止日期
    required: false
    default: ''
  - name: penalty
    type: str
    description:
      zh: 违规后果或处罚措施
    required: false
    default: ''
  - name: source_clause
    type: str
    description:
      zh: 来源条款编号或章节
    required: false
    default: ''
guideline:
  target:
    zh: '你是一位专业的合规顾问，请从法规或政策文件中提取所有合规义务。

      '
  rules:
    zh:
    - 提取文本中所有合规要求或义务
    - 为每一项要求指定类型：许可要求、报告要求、披露要求、禁止性规定、程序性要求、其他
    - 记录要求的具体内容、责任主体、履行期限
    - 记录违规后果或处罚措施
    - 记录来源条款编号
    - 每项合规要求作为独立条目提取
    - 保持要求内容与原文一致
    - 不要遗漏任何合规要求
display:
  label: '[{requirement_type}] {requirement_title}'
