name: "NarrativeEventChain"
autotype: temporal_graph
tag: [literature]

language: zh

description:
  zh: "叙事事件链 - 按故事内部时间线提取关键情节转折点 (Plot Points)"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "事件名称"
    - name: description
      type: "string"
      description:
        zh: "事件描述"

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "前置事件"
    - name: target
      type: "string"
      description:
        zh: "后续事件"
    - name: time
      type: "string"
      description:
        zh: "故事内部时间点，如'第X章'、'第X日'、'第X年'"
    - name: causeEffect
      type: "string"
      description:
        zh: "因果关系描述"

extraction_guide:
  target:
    zh: |
      你是一位专业的小说分析师，请从文本中提取情节转折点以及它们之间的因果关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知情节列表中提取边，不要创建未列出的情节

  rules_for_nodes:
    zh: |
      - 情节转折点：改变故事走向的关键事件

  rules_for_edges:
    zh: |
      - 记录情节之间的因果关系

  rules_for_time:
    zh: |
      当前观测时间：{observation_time}

      1. 章节格式：如"第一章"、"第3章" → 保持原样
      2. 日期格式：如"第一日"、"第X日" → 保持原样
      3. 年份格式：如"第一年"、"XX年" → 保持原样
      4. 相对时间：如"随后"、"之后" → 留空，不要猜测

identifiers:
  node_id: "name"
  edge_id: "{source}|{time}|{target}"
  edge_members:
    source: "source"
    target: "target"
  time_field: "time"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "name"
  edge_label: "{time}: {causeEffect}"
