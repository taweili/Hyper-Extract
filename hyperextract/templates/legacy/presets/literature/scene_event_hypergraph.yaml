name: "SceneEventHypergraph"
autotype: hypergraph
tag: [literature]

language: zh

description:
  zh: "场景事件超图 - 将一场戏建模为连接 {出场角色, 场景地点, 关键道具, 核心动作} 的超边"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "元素名称"
    - name: category
      type: "string"
      description:
        zh: "元素类型：角色、地点、道具、动作"
    - name: description
      type: "string"
      description:
        zh: "简要描述"

edge_schema:
  fields:
    - name: sceneName
      type: "string"
      description:
        zh: "场景名称，如'第一场：桐花台夜话'"
    - name: characters
      type: "list"
      description:
        zh: "出场角色列表"
    - name: location
      type: "string"
      description:
        zh: "场景地点"
    - name: props
      type: "list"
      description:
        zh: "关键道具列表"
      required: false
    - name: actions
      type: "list"
      description:
        zh: "核心动作列表"
    - name: timeOfDay
      type: "string"
      description:
        zh: "时间段：日/夜/晨/昏"

guide:
  target:
    zh: |
      你是一位专业的影视剧本分析师，请从文本中提取场景元素以及它们组成的场景事件超边。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 超边必须包含至少一个角色和地点

  rules_for_nodes:
    zh: |
      - 角色：从【动作】或对白中识别的人物
      - 地点：从场景头中提取，如"碎玉轩"、"桐花台"
      - 道具：从动作描述中提取的关键物品，如"油纸伞"、"宫灯"
      - 动作：从动作描述中提取的核心行为，如"起舞"、"吟诵"

  rules_for_edges:
    zh: |
      - 出场角色：从剧本对白和动作中识别的参与人物
      - 场景地点：场景头中标注的地点
      - 关键道具：动作描述中出现的物品
      - 核心动作：角色完成的主要行为
      - 时间段：从场景头中提取，如"日"、"夜"、"晨"、"昏"

identifiers:
  node_id: "name"
  edge_id: "sceneName"
  edge_members:
    - "characters"
    - "location"
    - "props"
    - "actions"
    - "timeOfDay"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name}[{category}]"
  edge_label: "sceneName"
