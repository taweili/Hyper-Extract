name: "ComplexCharacterRelation"
autotype: hypergraph
tag: [literature]

language: zh

description:
  zh: "复杂人物关系网 - 超越两两关系，提取涉及多方的社会结构（如三角恋、结盟、家族派系）"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "人物姓名"
    - name: role
      type: "string"
      description:
        zh: "角色定位：主角、配角、反派、酱油"
    - name: faction
      type: "string"
      description:
        zh: "所属阵营或派系"
      required: false
    - name: description
      type: "string"
      description:
        zh: "人物描述"

edge_schema:
  fields:
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：三角恋、结盟、敌对、背叛、竞争、家族"
    - name: participants
      type: "array"
      description:
        zh: "参与方列表（3人或以上）"
    - name: description
      type: "string"
      description:
        zh: "关系描述"
    - name: sourceScene
      type: "string"
      description:
        zh: "来源情节"
      required: false

guide:
  target:
    zh: |
      你是一位专业的小说分析师，请从文本中提取人物以及它们之间的复杂关系超边。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 超边必须包含3个或以上参与者

  rules_for_nodes:
    zh: |
      - 角色定位：主角、配角、反派、酱油
      - 所属阵营：如"江左盟"、"太子党"、"誉王党"等

  rules_for_edges:
    zh: |
      - 三角恋：涉及三人的爱情关系
      - 结盟：多方形成的政治或军事联盟
      - 敌对：多方之间的对立关系
      - 背叛：一方背离原先的阵营或关系
      - 竞争：多方争夺同一目标
      - 家族：同一家族的成员关系

identifiers:
  node_id: "name"
  edge_id: "{relationType}|{participants}"
  edge_members: "participants"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}[{role}]"
  edge_label: "{relationType}: {description}"
