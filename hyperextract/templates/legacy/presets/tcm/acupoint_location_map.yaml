language: zh
name: AcupointLocationMap
type: graph
tags:
- tcm
description:
  zh: 腧穴空间定位 - 基于人体解剖标志提取穴位的相对位置关系（如 '脐旁2寸'）
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 穴位名称：如合谷、足三里、三阴交等
      required: true
      default: ''
    - name: meridian
      type: string
      description:
        zh: 所属经脉
      required: false
      default: ''
    - name: location
      type: string
      description:
        zh: 位置描述：如脐旁2寸、腕横纹上3寸等
      required: false
      default: ''
    - name: indications
      type: string
      description:
        zh: 主治功能
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: string
      description:
        zh: 源穴位或解剖标志名称
      required: true
      default: ''
    - name: target
      type: string
      description:
        zh: 目标穴位名称
      required: true
      default: ''
    - name: relationType
      type: string
      description:
        zh: 关系类型：位于
      required: true
      default: ''
    - name: relativePosition
      type: string
      description:
        zh: 相对位置描述：如脐旁2寸、腕横纹上3寸等
      required: true
      default: ''
guideline:
  target:
    zh: '你是一位专业的针灸学专家，请从文本中提取穴位的相对位置关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 穴位：针灸特定位置，如合谷、足三里、三阴交
    - 解剖标志：人体解剖部位，如腕横纹、第2掌骨
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 穴位：针灸特定位置
    - 解剖标志：人体解剖部位
  rules_for_relations:
    zh:
    - 仅从已知穴位列表中提取边，不要创建未列出的穴位
    - 关系描述应与原文保持一致
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name}'
  relation_label: '{relationType}: {relativePosition}'
