language: zh
name: PulseTongueRecord
type: list
tags:
- tcm
description:
  zh: 舌脉特征提取 - 结构化提取舌象（质、苔）与脉象描述，用于统计分析
output:
  description: {}
  fields:
  - name: type
    type: str
    description:
      zh: 特征类型：舌象、脉象
    required: true
    default: ''
  - name: subType
    type: str
    description:
      zh: 子类型：如舌质、舌苔、脉位、脉率、脉势等
    required: true
    default: ''
  - name: feature
    type: str
    description:
      zh: 具体特征描述，如淡红、薄白、浮、沉、迟、数等
    required: true
    default: ''
  - name: description
    type: str
    description:
      zh: 详细描述
    required: false
    default: ''
  - name: clinicalSignificance
    type: str
    description:
      zh: 临床意义
    required: false
    default: ''
  - name: source
    type: str
    description:
      zh: 来源，如医案名称、章节等
    required: false
    default: ''
guideline:
  target:
    zh: '你是一位专业的中医诊断专家，请从文本中提取舌象和脉象的特征信息。

      '
  rules:
    zh:
    - 提取所有舌象特征，包括舌质（颜色、形态）、舌苔（颜色、厚薄、干湿等）
    - 提取所有脉象特征，包括脉位（浮、沉）、脉率（迟、数）、脉势（有力、无力）等
    - 为每个特征指定类型和子类型
    - 保持特征描述与原文一致
    - 舌象描述解析：文言舌象常采用连写表述（如"舌淡红苔薄白"→拆分为舌质淡红、舌苔薄白）
    - 脉象术语理解：文言脉象术语需准确识别（如"浮紧脉"→浮脉、紧脉）
    - 复合特征拆分：文言中常将多个特征合并描述，需分别提取到对应字段
display:
  label: '{type} - {subType}'
