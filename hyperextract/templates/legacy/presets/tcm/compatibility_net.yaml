language: zh
name: CompatibilityNet
type: graph
tags:
- tcm
description:
  zh: 七情配伍网络 - 提取药物间的相须、相使、相畏、相杀、十八反十九畏关系
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 药物名称
      required: true
      default: ''
    - name: description
      type: str
      description:
        zh: 简要描述
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 源药物
      required: true
      default: ''
    - name: target
      type: str
      description:
        zh: 目标药物
      required: true
      default: ''
    - name: relationType
      type: str
      description:
        zh: 配伍关系类型：相须、相使、相畏、相杀、相恶、相反、十八反、十九畏
      required: true
      default: ''
    - name: effect
      type: str
      description:
        zh: 配伍效果描述
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位专业的中药配伍专家，请从文本中提取药物间的配伍关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 配伍关系类型：相须、相使、相畏、相杀、相恶、相反、十八反、十九畏
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
  rules_for_relations:
    zh:
    - 仅从已知药物列表中提取边，不要创建未列出的药物
    - 关系描述应与原文保持一致
    - 配伍关系类型：相须、相使、相畏、相杀、相恶、相反、十八反、十九畏
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name}'
  relation_label: '{relationType}'
