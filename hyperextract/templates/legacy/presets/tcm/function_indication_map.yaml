language: zh
name: FunctionIndicationMap
type: graph
tags:
- tcm
description:
  zh: 主治功效映射 - 关联 方剂 -> 功能（如清热解毒） -> 主治证候
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 实体名称
      required: true
      default: ''
    - name: category
      type: str
      description:
        zh: 实体类型：方剂、功能、主治证候
      required: true
      default: ''
    - name: description
      type: str
      description:
        zh: 简要描述
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 源实体
      required: true
      default: ''
    - name: target
      type: str
      description:
        zh: 目标实体
      required: true
      default: ''
    - name: relationType
      type: str
      description:
        zh: 关系类型：具有功能、主治
      required: true
      default: ''
    - name: details
      type: str
      description:
        zh: 详细描述
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位专业的方剂学专家，请从文本中提取方剂、功能和主治证候之间的关联关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 方剂：如桂枝汤、麻黄汤
    - 功能：如解肌发表、清热解毒
    - 主治证候：如太阳中风、外感风寒
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 方剂：如桂枝汤、麻黄汤
    - 功能：如解肌发表、清热解毒
    - 主治证候：如太阳中风、外感风寒
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 关系类型：具有功能、主治
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{relationType}'
