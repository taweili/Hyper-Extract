language: zh
name: FormulaComposition
type: hypergraph
tags:
- tcm
description:
  zh: 君臣佐使结构图 - 将方剂建模为 {君药, 臣药, 佐药, 使药} 的层级化超边结构
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 药物名称
      required: true
      default: ''
    - name: nature
      type: string
      description:
        zh: 性味，如：辛温、苦寒、甘平
      required: false
      default: ''
    - name: meridian
      type: string
      description:
        zh: 归经，如：归肺经、归脾经、归心经
      required: false
      default: ''
    - name: effect
      type: string
      description:
        zh: 功效，如：发汗解表、温通经脉、补气健脾
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: formulaName
      type: string
      description:
        zh: 方剂名称
      required: true
      default: ''
    - name: source
      type: string
      description:
        zh: 方剂来源，如：伤寒论、金匮要略、方剂学教材
      required: false
      default: ''
    - name: junHerbs
      type: list
      description:
        zh: 君药列表（包含药物名称、剂量、炮制方法）
      required: false
      default: ''
    - name: chenHerbs
      type: list
      description:
        zh: 臣药列表（包含药物名称、剂量、炮制方法）
      required: false
      default: ''
    - name: zuoHerbs
      type: list
      description:
        zh: 佐药列表（包含药物名称、剂量、炮制方法）
      required: false
      default: ''
    - name: shiHerbs
      type: list
      description:
        zh: 使药列表（包含药物名称、剂量、炮制方法）
      required: false
      default: ''
    - name: functions
      type: list
      description:
        zh: 方剂功能，如：解肌发表、调和营卫
      required: false
      default: ''
    - name: indications
      type: list
      description:
        zh: 主治证候，如：外感风寒表虚证
      required: false
      default: ''
    - name: decoctionMethod
      type: string
      description:
        zh: 煎服法，如：水煎服，日三服
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位专业的方剂学专家，请从文本中提取方剂的君臣佐使结构。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 药物固有属性：性味、归经、功效（不随方剂变化）
    - 药物在方剂中的属性：剂量、炮制方法、角色（君/臣/佐/使）
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 药物固有属性：性味、归经、功效
  rules_for_relations:
    zh:
    - 仅从已知药物列表中提取边，不要创建未列出的药物
    - 关系描述应与原文保持一致
    - 药物角色：君药、臣药、佐药、使药
identifiers:
  entity_id: name
  relation_id: formulaName
  relation_members:
  - junHerbs
  - chenHerbs
  - zuoHerbs
  - shiHerbs
options:
  extraction_mode: two_stage
display:
  entity_label: '{name}'
  relation_label: '{formulaName}'
