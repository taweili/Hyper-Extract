language: zh
name: PrescriptionModification
type: hypergraph
tags:
- tcm
description:
  zh: 处方加减逻辑 - 提取基于特定证型或症状对基础方剂进行的药物加减（如'随证加减'）
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 实体名称
      required: true
      default: ''
    - name: category
      type: string
      description:
        zh: 实体类型：基础方、药物、证型、症状
      required: true
      default: ''
  relations:
    description: {}
    fields:
    - name: baseFormula
      type: string
      description:
        zh: 基础方剂名称
      required: true
      default: ''
    - name: condition
      type: string
      description:
        zh: 加减条件（证型或症状）
      required: true
      default: ''
    - name: modificationType
      type: string
      description:
        zh: 加减类型：加、减、替换
      required: true
      default: ''
    - name: herbs
      type: list
      description:
        zh: 加减药物列表
      required: true
      default: ''
    - name: reason
      type: string
      description:
        zh: 加减原因
      required: false
      default: ''
    - name: dosage
      type: string
      description:
        zh: 调整后的剂量
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位专业的中医方剂专家，请从文本中提取处方加减的实体和超边结构。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 基础方：方剂名称，如桂枝汤、麻黄汤、小柴胡汤
    - 药物：中药名称，如葛根、厚朴、杏仁、附子
    - 证型/症状：临床表现，如项背强几几、喘、腹满痛
    - 加减类型：加、减、替换
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 基础方：方剂名称，如桂枝汤、麻黄汤、小柴胡汤
    - 药物：中药名称，如葛根、厚朴、杏仁、附子
    - 证型/症状：临床表现，如项背强几几、喘、腹满痛
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 加减类型：加、减、替换（通过 modificationType 字段区分）
identifiers:
  entity_id: name
  relation_id: '{baseFormula}|{condition}'
  relation_members:
  - baseFormula
  - herbs
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{baseFormula} | {condition}'
