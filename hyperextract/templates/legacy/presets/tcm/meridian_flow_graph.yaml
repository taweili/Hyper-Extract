language: zh
name: MeridianFlowGraph
type: graph
tags:
- tcm
description:
  zh: 经络流注图 - 提取十二经脉的循行路线及经气流注次序
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 经脉名称：如手太阴肺经、手阳明大肠经等
      required: true
      default: ''
    - name: category
      type: string
      description:
        zh: 经脉类别：阴经、阳经
      required: true
      default: ''
    - name: associatedOrgan
      type: string
      description:
        zh: 关联脏腑
      required: false
      default: ''
    - name: circulationPath
      type: string
      description:
        zh: 循行路线
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: string
      description:
        zh: 源经脉名称
      required: true
      default: ''
    - name: target
      type: string
      description:
        zh: 目标经脉名称
      required: true
      default: ''
    - name: relationType
      type: string
      description:
        zh: 关系类型：流注
      required: true
      default: ''
    - name: flowOrder
      type: int
      description:
        zh: 流注次序
      required: true
      default: '0'
    - name: connectionPoint
      type: string
      description:
        zh: 连接部位
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位专业的经络学专家，请从文本中提取十二经脉的循行路线及经气流注次序。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 经脉：十二经脉，如手太阴肺经、手阳明大肠经
    - 经脉类别：阴经、阳经
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 经脉：十二经脉
    - 经脉类别：阴经、阳经
  rules_for_relations:
    zh:
    - 仅从已知经脉列表中提取边，不要创建未列出的经脉
    - 关系描述应与原文保持一致
    - 关系类型：流注
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '流注 #{flowOrder}'
