language: zh
name: CrossReferenceNet
type: graph
tags:
- general
description:
  zh: 交叉引用网络 - 映射概念之间的超链接或相互引用关系
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 概念/条目名称
    - name: type
      type: string
      description:
        zh: 节点类型：条目、章节、概念、人物、地点、其他
    - name: description
      type: string
      description:
        zh: 简要描述
      required: false
  relations:
    description: {}
    fields:
    - name: source
      type: string
      description:
        zh: 源条目/概念
    - name: target
      type: string
      description:
        zh: 被引用条目/概念
    - name: relationType
      type: string
      description:
        zh: 关系类型：Hyperlink（超链接）、Reference（引用）、SeeAlso（参见）、Related（相关）、Other（其他）
    - name: context
      type: string
      description:
        zh: 引用上下文描述
      required: false
guideline:
  target:
    zh: '你是一位专业的知识网络分析专家，请从文本中提取概念/条目及其相互引用关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从提取的节点中创建边
  rules_for_entities:
    zh:
    - '- 提取所有被提及的概念或条目'
    - '- 为每个节点指定类型'
  rules_for_relations:
    zh:
    - '- Hyperlink：超链接关系'
    - '- Reference：引用关系'
    - '- SeeAlso：参见关系'
    - '- Related：相关关系'
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({type})'
  relation_label: '{relationType}'
