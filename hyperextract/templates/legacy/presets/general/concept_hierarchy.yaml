language: zh
name: ConceptHierarchy
type: graph
tags:
- general
description:
  zh: 概念层级图 - 构建上下位关系或组成关系
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 概念名称
    - name: category
      type: str
      description:
        zh: 概念类型：核心概念、子概念、属性、实例、其他
    - name: description
      type: str
      description:
        zh: 概念简要描述
      required: false
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 父概念/整体概念
    - name: target
      type: str
      description:
        zh: 子概念/部分概念
    - name: relationType
      type: str
      description:
        zh: 关系类型：上下位（Subclass-Of）、组成（Part-Of）、实例（Instance-Of）、其他（Other）
    - name: details
      type: str
      description:
        zh: 关系详细说明
      required: false
guideline:
  target:
    zh: '你是一位专业的概念结构分析专家，请从文本中提取概念及其层级关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的概念，禁止将多个概念合并为一个节点
    - 概念名称与原文保持一致
    - 仅从提取的概念中创建边
  rules_for_entities:
    zh:
    - '- 提取所有概念'
    - '- 为每个概念指定类型'
  rules_for_relations:
    zh:
    - '- 上下位（Subclass-Of）：表示概念的继承关系'
    - '- 组成（Part-Of）：表示整体与部分的关系'
    - '- 实例（Instance-Of）：表示概念与实例的关系'
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{relationType}'
