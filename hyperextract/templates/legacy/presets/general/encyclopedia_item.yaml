language: zh
name: EncyclopediaItem
type: model
tags:
- general
description:
  zh: 百科条目 - 针对单一主体提取结构化的属性信息（类似信息框 Infobox）
output:
  description: {}
  fields:
  - name: title
    type: string
    description:
      zh: 条目标题
  - name: entityType
    type: string
    description:
      zh: 实体类型：人物、地点、组织、事件、概念、物品、其他
  - name: alternativeNames
    type: array
    description:
      zh: 别名、俗称、外文名称
    required: false
  - name: category
    type: array
    description:
      zh: 分类标签
    required: false
  - name: summary
    type: string
    description:
      zh: 摘要/简介
    required: false
  - name: attributes
    type: array
    description:
      zh: '关键属性列表，每个元素格式为''属性名: 属性值'''
    required: false
  - name: keyEvents
    type: array
    description:
      zh: 重要事件/里程碑
    required: false
  - name: relatedConcepts
    type: array
    description:
      zh: 相关概念/条目
    required: false
guideline:
  target:
    zh: '你是一位专业的百科全书编辑，请从文本中提取单一主体的结构化属性信息，构建百科条目信息框。

      '
  rules:
    zh:
    - 识别文本的核心主体（人物、地点、组织、事件、概念等）
    - 为主体指定类型
    - 提取所有别名、俗称或外文名称
    - 提取分类标签
    - 撰写 100-200 字的摘要
    - 提取关键属性
    - 提取重要事件或里程碑
    - 提取相关概念或条目
display:
  label: title
