language: zh
name: PersonalProfile
type: model
tags:
- general
description:
  zh: 个人档案 - 聚合人物的静态属性（生卒年、学历、核心身份）
output:
  description: {}
  fields:
  - name: name
    type: str
    description:
      zh: 姓名
  - name: gender
    type: str
    description:
      zh: 性别
    required: false
  - name: birthDate
    type: str
    description:
      zh: 出生日期，格式为年-月-日或年份
    required: false
  - name: deathDate
    type: str
    description:
      zh: 逝世日期，格式为年-月-日或年份
    required: false
  - name: nationality
    type: str
    description:
      zh: 国籍
    required: false
  - name: birthPlace
    type: str
    description:
      zh: 出生地
    required: false
  - name: education
    type: list
    description:
      zh: 教育经历
    required: false
  - name: occupations
    type: list
    description:
      zh: 职业/身份
    required: false
  - name: coreIdentity
    type: list
    description:
      zh: 核心身份/标签
    required: false
  - name: majorAchievements
    type: list
    description:
      zh: 主要成就
    required: false
  - name: affiliations
    type: list
    description:
      zh: 所属组织/机构
    required: false
  - name: summary
    type: str
    description:
      zh: 个人简介
    required: false
guideline:
  target:
    zh: '你是一位专业的人物档案编辑，请从文本中提取该人物的静态属性信息，构建个人档案。

      '
  rules:
    zh:
    - 提取姓名、性别、出生日期、逝世日期、国籍、出生地等基本信息
    - 提取教育经历
    - 提取职业或身份信息
    - 提取核心身份标签
    - 提取主要成就
    - 提取所属组织或机构
    - 撰写 100-200 字的个人简介
    - 若信息缺失时留空，不要编造
display:
  label: name
