language: zh
name: SocialNetwork
type: graph
tags:
- general
description:
  zh: 社交网络图 - 专注于提取人际关系、互动与组织隶属
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 名称
    - name: type
      type: str
      description:
        zh: 节点类型：人物、组织、机构、其他
    - name: description
      type: str
      description:
        zh: 简要描述
      required: false
    - name: role
      type: str
      description:
        zh: 角色/身份
      required: false
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 源节点
    - name: target
      type: str
      description:
        zh: 目标节点
    - name: relationType
      type: str
      description:
        zh: 关系类型：亲属、朋友、同事、师生、上下级、合作、竞争、隶属、其他
    - name: details
      type: str
      description:
        zh: 关系详细说明
      required: false
guideline:
  target:
    zh: '你是一位专业的社会关系分析专家，请从文本中提取人物、组织及其相互关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从提取的节点中创建边
  rules_for_entities:
    zh:
    - '- 提取所有人物、组织、机构等'
    - '- 为每个节点指定类型和角色'
  rules_for_relations:
    zh:
    - '- 亲属：血缘或姻亲关系'
    - '- 朋友：朋友关系'
    - '- 同事：工作关系'
    - '- 师生：教育关系'
    - '- 上下级：层级关系'
    - '- 合作：合作关系'
    - '- 竞争：竞争关系'
    - '- 隶属：组织隶属关系'
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({role})'
  relation_label: '{relationType}'
