language: zh
name: OperationalProcedure
type: graph
tags:
- general
description:
  zh: 执行程序流程图 - 提取规章中规定的申报、审批或操作的具体先后步骤
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: stepId
      type: str
      description:
        zh: 步骤编号，如步骤1、步骤2
    - name: name
      type: str
      description:
        zh: 步骤名称
    - name: description
      type: str
      description:
        zh: 步骤详细描述
    - name: role
      type: str
      description:
        zh: 执行角色
      required: false
    - name: inputRequired
      type: str
      description:
        zh: 所需输入/材料
      required: false
    - name: outputResult
      type: str
      description:
        zh: 输出/结果
      required: false
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 源步骤编号
    - name: target
      type: str
      description:
        zh: 目标步骤编号
    - name: condition
      type: str
      description:
        zh: 转换条件
      required: false
    - name: details
      type: str
      description:
        zh: 详细说明
      required: false
guideline:
  target:
    zh: '你是一位专业的流程分析专家，请从文本中提取执行程序的步骤和转换关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的步骤，禁止将多个步骤合并为一个节点
    - 步骤名称与原文保持一致
    - 仅从提取的步骤中创建转换边
  rules_for_entities:
    zh:
    - '- 提取所有流程步骤'
    - '- 为每个步骤分配编号'
    - '- 记录步骤名称和描述'
    - '- 记录执行角色（如有）'
    - '- 记录所需输入或材料（如有）'
    - '- 记录输出或结果（如有）'
  rules_for_relations:
    zh:
    - '- 记录步骤之间的先后关系'
    - '- 记录转换条件（如有）'
identifiers:
  entity_id: stepId
  relation_id: '{source}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{stepId}: {name}'
  relation_label: condition
