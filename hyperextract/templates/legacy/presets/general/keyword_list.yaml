language: zh
name: KeywordList
type: list
tags:
- general
description:
  zh: 关键词列表 - 从文本中提取关键词并附带分类、出现频次信息
output:
  description: {}
  fields:
  - name: term
    type: str
    description:
      zh: 关键词
  - name: category
    type: str
    description:
      zh: 分类：核心概念、术语、人名、机构名、其他
  - name: description
    type: str
    description:
      zh: 关键词简要描述或上下文说明
    required: false
guideline:
  target:
    zh: '你是一位专业的关键词提取专家，请从文本中提取所有关键词并附带分类和描述信息。

      '
  rules:
    zh:
    - 提取文本中的所有关键词和核心短语
    - 为每个关键词指定分类
    - 为每个关键词添加简要描述
display:
  label: term
