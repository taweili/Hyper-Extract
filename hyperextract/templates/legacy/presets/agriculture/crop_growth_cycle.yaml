name: "CropGrowthCycle"
autotype: temporal_graph
tag: [agriculture]

language: zh

description:
  zh: "作物生长周期图 - 从农业技术手册中提取作物各生长阶段的农事操作与环境要求"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "节点名称"
    - name: category
      type: "string"
      description:
        zh: "节点类型：生长阶段、农事操作、环境条件"
    - name: description
      type: "string"
      description:
        zh: "详细描述"

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源节点"
    - name: target
      type: "string"
      description:
        zh: "目标节点"
    - name: time
      type: "string"
      description:
        zh: "时间点或时间段"
    - name: description
      type: "string"
      description:
        zh: "关系描述"

guide:
  target:
    zh: |
      你是一位专业的农业技术专家，请从农业技术手册中提取作物生长周期图。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 边只能从已知实体列表中提取，不要创建未列出的实体
      4. 关系描述应与原文保持一致

  rules_for_nodes:
    zh: |
      - 生长阶段：如播种期、幼苗期、分蘖期、孕穗抽穗期、灌浆成熟期
      - 农事操作：如苗床准备、种子处理、移栽、施肥、病虫害防治
      - 环境条件：如温度、湿度、光照、水分要求

  rules_for_edges:
    zh: |
      - 提取时间信息：时间范围描述、生长阶段名称、相对时间表达
      - 精确时间 → 保持原样，如"4月上旬"、"3叶1心期"
      - 生长阶段 → 视为时间标记，如"幼苗期"、"分蘖期"直接作为时间
      - 相对时间解析：基于观察日期进行偏移计算

  rules_for_time:
    zh: |
      当前观察日期：{observation_time}

      1. 精确时间 → 保持原样，如"4月上旬"、"3叶1心期"
      2. 生长阶段 → 视为时间标记，如"幼苗期"、"分蘖期"直接作为时间
      3. 相对时间解析（基于观察日期）：
         - "播种后5-7天" → 相对于播种期的时间偏移
         - "移栽后5-7天" → 相对于移栽期的时间偏移
      4. 时间缺失 → 留空，不要猜测

identifiers:
  node_id: "name"
  edge_id: "{source}|{time}|{target}"
  edge_members:
    source: "source"
    target: "target"
  time_field: "time"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{time}"
