language: zh
name: ComplexInteractionNet
type: hypergraph
tags:
- medicine
description:
  zh: 条件性相互作用网 - 建模 '药A+药B+特定体质 -> 不良反应' 的高阶依赖
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 实体名称，如药物、体质、不良反应等
    - name: category
      type: string
      description:
        zh: 实体类型：药物、体质、不良反应、其他等
    - name: description
      type: string
      description:
        zh: 简要描述，如药物的功能、作用等
      required: false
  relations:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 超边名称，如药物相互作用
    - name: nodes
      type: array
      description:
        zh: 参与超边的节点列表
    - name: interactionType
      type: string
      description:
        zh: 相互作用类型：增强、减弱、不良反应等
    - name: details
      type: string
      description:
        zh: 详细描述，如具体的相互作用机制
guideline:
  target:
    zh: '你是一位专业的临床药师，请从文本中提取药物相互作用信息，构建条件性相互作用网。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
  rules_for_entities:
    zh:
    - '- 药物名称保持原文，如二甲双胍、磺酰脲类'
    - '- 不良反应名称保持原文'
  rules_for_relations:
    zh:
    - '- 增强：药物作用相互增强'
    - '- 减弱：药物作用相互减弱'
    - '- 不良反应：药物组合导致不良反应'
identifiers:
  entity_id: name
  relation_id: name
  relation_members: nodes
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: name
