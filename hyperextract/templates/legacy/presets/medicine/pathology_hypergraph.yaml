language: zh
name: PathologyHypergraph
type: hypergraph
tags:
- medicine
description:
  zh: 多因素病理机制图 - 建模 '基因+环境+诱因 -> 疾病' 的复杂致病逻辑
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: string
      description:
        zh: 实体名称，如基因、环境因素、诱因、疾病等
    - name: category
      type: string
      description:
        zh: 实体类型：基因、环境因素、诱因、疾病、病理过程、症状等
    - name: description
      type: string
      description:
        zh: 简要描述
      required: false
  relations:
    description: {}
    fields:
    - name: mechanism_name
      type: string
      description:
        zh: 机制名称，简短描述性名称
    - name: participating_entities
      type: list
      description:
        zh: 参与此病理机制的所有实体名称列表
    - name: relationType
      type: string
      description:
        zh: 关系类型：致病、诱发、促进、抑制等
    - name: details
      type: string
      description:
        zh: 详细描述，如具体的致病机制
    - name: outcome
      type: string
      description:
        zh: 该机制导致的结果或效应
guideline:
  target:
    zh: '你是一位专业的病理学家，请从文本中提取与疾病病理机制相关的实体和它们之间的复杂关联关系，构建多因素病理机制图。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
  rules_for_entities:
    zh:
    - '- 医学专业术语保持原文，如基因名称（BRCA1、KRAS、TP53）、蛋白名称'
    - '- 疾病名称保持原文，如慢性阻塞性肺疾病、肺癌'
  rules_for_relations:
    zh:
    - '- 致病：导致疾病发生'
    - '- 诱发：诱发疾病发作'
    - '- 促进：促进疾病进展'
    - '- 抑制：抑制疾病发展'
identifiers:
  entity_id: name
  relation_id: mechanism_name
  relation_members: participating_entities
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '[{relationType}] {mechanism_name}'
