language: zh
name: MedicalConceptNet
type: graph
tags:
- medicine
description:
  zh: 医学概念网络 - 提取医学术语及其关联属性（如：属于、定义为）
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 概念名称，如医学术语、疾病名称、解剖部位等
    - name: category
      type: str
      description:
        zh: 概念类型：疾病、解剖部位、生理过程、药物、症状、体征等
    - name: definition
      type: str
      description:
        zh: 概念定义
      required: false
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 源概念
    - name: target
      type: str
      description:
        zh: 目标概念
    - name: relationType
      type: str
      description:
        zh: 关系类型：属于、定义为、包含、组成、位于、导致、治疗等
    - name: details
      type: str
      description:
        zh: 详细描述
      required: false
guideline:
  target:
    zh: '你是一位专业的医学术语专家，请从文本中提取医学术语及其关联属性，构建医学概念网络。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
  rules_for_entities:
    zh:
    - '- 医学术语保持原文，如疾病名称、解剖部位名称'
    - '- 专业缩写保持原文，如 ECG、CT、MRI'
  rules_for_relations:
    zh:
    - '- 属于：概念归属关系'
    - '- 定义为：概念定义关系'
    - '- 包含：包含关系'
    - '- 组成：组成关系'
    - '- 位于：位置关系'
    - '- 导致：因果关系'
    - '- 治疗：治疗关系'
identifiers:
  entity_id: name
  relation_id: '{source}|{relationType}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{relationType}'
