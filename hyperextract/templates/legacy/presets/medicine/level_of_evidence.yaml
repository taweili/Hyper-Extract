language: zh
name: LevelOfEvidence
type: list
tags:
- medicine
description:
  zh: 证据评级表 - 提取指南中的具体推荐意见及其对应的证据等级
output:
  description: {}
  fields:
  - name: topic
    type: str
    description:
      zh: 推荐主题，如血糖控制、血脂管理、阿司匹林使用等
  - name: summary
    type: str
    description:
      zh: 推荐意见摘要，简短概括该推荐的核心内容，不超过10字
  - name: recommendation
    type: str
    description:
      zh: 推荐意见
  - name: evidenceLevel
    type: str
    description:
      zh: 证据等级，如A、B、C、1a、1b等
  - name: recommendationLevel
    type: str
    description:
      zh: 推荐级别，如强推荐、弱推荐等
  - name: details
    type: str
    description:
      zh: 详细描述
    required: false
guideline:
  target:
    zh: '你是一位专业的循证医学专家，请从文本中提取指南中的具体推荐意见及其对应的证据等级，构建证据评级表。

      '
  rules:
    zh:
    - 提取所有推荐意见及其对应的证据等级
    - 为每个推荐意见指定推荐主题（topic）
    - 为每个推荐意见提取摘要（summary），不超过10字
    - 为每个推荐意见指定推荐级别
    - 为每个推荐意见添加详细描述（如果文本中提供）
    - 保持推荐意见与原文一致
  rules_for_entities:
    zh:
    - '- 证据等级保持原文，如 A、B、C、1a、1b'
    - '- 医学术语保持原文'
display:
  label: '{topic} [{evidenceLevel}]'
