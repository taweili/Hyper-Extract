language: zh
name: HospitalCourseTimeline
type: temporal_graph
tags:
- medicine
description:
  zh: 住院病程时间轴 - 严格按时间顺序提取入院、检查、治疗、转归等节点
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 节点名称，如入院、检查、治疗、转归等
    - name: category
      type: str
      description:
        zh: 节点类型：入院、检查、治疗、手术、转归、其他等
    - name: description
      type: str
      description:
        zh: 简要描述
      required: false
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 源节点
    - name: target
      type: str
      description:
        zh: 目标节点
    - name: eventType
      type: str
      description:
        zh: 事件类型：入院、检查、治疗、手术、转归等
    - name: eventDate
      type: str
      description:
        zh: 事件日期，格式为年-月-日
    - name: details
      type: str
      description:
        zh: 详细描述
      required: false
guideline:
  target:
    zh: '你是一位专业的医院管理人员，请从文本中严格按时间顺序提取入院、检查、治疗、转归等节点，构建住院病程时间轴。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
  rules_for_entities:
    zh:
    - '- 医学术语保持原文'
  rules_for_relations:
    zh:
    - '- 记录事件之间的时间顺序关系'
  rules_for_time:
    zh:
    - 当前观察日期：{observation_time}
    - 相对时间解析（基于观察日期）：
    - '- "去年" → {observation_time} 的前一年'
    - '- "上月" → {observation_time} 的前一个月'
    - '- "本季度" → {observation_time} 所在季度'
    - '- "近期" → {observation_time} 最近 3 个月'
    - '- "入院当天" → 使用入院日期'
    - '- "术后第一天" → 手术日期的后一天'
    - 精确时间 → 保持原样
    - 时间缺失 → 留空，不要猜测
identifiers:
  entity_id: name
  relation_id: '{source}|{eventType}|{target}'
  relation_members:
    source: source
    target: target
  time_field: eventDate
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{eventType} ({eventDate})'
