language: zh
name: AdverseReactionStats
type: list
tags:
- medicine
description:
  zh: 不良反应统计 - 提取各系统的不良反应表现及其发生率描述
output:
  description: {}
  fields:
  - name: system
    type: str
    description:
      zh: 系统名称，如胃肠道、全身、皮肤等
  - name: reaction
    type: str
    description:
      zh: 不良反应表现
  - name: incidence
    type: str
    description:
      zh: 发生率
  - name: details
    type: str
    description:
      zh: 详细描述
    required: false
guideline:
  target:
    zh: '你是一位专业的临床药师，请从文本中提取各系统的不良反应表现及其发生率描述，构建不良反应统计。

      '
  rules:
    zh:
    - 提取所有不良反应，包括系统名称、不良反应表现和发生率
    - 为每个不良反应添加详细描述（如果文本中提供）
    - 保持不良反应表现与原文一致
  rules_for_entities:
    zh:
    - '- 不良反应名称保持原文'
    - '- 发生率表示法保持原文，如 5.2%、常见、罕见'
display:
  label: '{system}: {reaction} ({incidence})'
