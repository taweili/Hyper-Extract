language: zh
name: DischargeInstruction
type: model
tags:
- medicine
description:
  zh: 出院医嘱摘要 - 提取出院带药、复诊计划及康复建议的结构化信息
output:
  description: {}
  fields:
  - name: medications
    type: array
    description:
      zh: 出院带药列表，每个药物包含名称、剂量、用法、频次等信息
    required: false
  - name: followUp
    type: array
    description:
      zh: 复诊计划列表，每个复诊包含时间、科室、检查项目等信息
    required: false
  - name: rehabilitation
    type: array
    description:
      zh: 康复建议列表
    required: false
  - name: diet
    type: array
    description:
      zh: 饮食建议列表
    required: false
  - name: activity
    type: array
    description:
      zh: 活动建议列表
    required: false
  - name: notes
    type: array
    description:
      zh: 其他注意事项列表
    required: false
guideline:
  target:
    zh: '你是一位专业的医生，请从文本中提取出院带药、复诊计划及康复建议的结构化信息，构建出院医嘱摘要。

      '
  rules:
    zh:
    - 提取所有出院带药信息，每个药物包含名称、剂量、用法、频次等信息
    - 提取所有复诊计划信息，每个复诊包含时间、科室、检查项目等信息
    - 提取所有康复建议、饮食建议、活动建议和其他注意事项
    - 保持信息与原文一致
  rules_for_entities:
    zh:
    - '- 药物名称保持原文，如阿司匹林、二甲双胍'
    - '- 剂量单位保持原文，如 mg、ml'
    - '- 医学缩写保持原文，如 qd（每日一次）、bid（每日两次）'
display:
  label: 出院医嘱摘要
