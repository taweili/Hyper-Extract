language: zh
name: TreatmentRegimenMap
type: hypergraph
tags:
- medicine
description:
  zh: 综合治疗方案图 - 提取由 药物组合+理疗+生活干预 构成的多因素治疗方案
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 实体名称，如药物、理疗方法、生活干预等
    - name: category
      type: str
      description:
        zh: 实体类型：药物、理疗、生活干预、检查、手术等
    - name: description
      type: str
      description:
        zh: 简要描述
      required: false
  relations:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 超边名称，如治疗方案、康复计划等
    - name: nodes
      type: list
      description:
        zh: 参与超边的节点列表
    - name: disease
      type: str
      description:
        zh: 针对的疾病
    - name: details
      type: str
      description:
        zh: 详细描述，如具体的治疗方案内容
guideline:
  target:
    zh: '你是一位专业的临床医生，请从文本中提取由"药物组合+理疗+生活干预"构成的多因素治疗方案，构建综合治疗方案图。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 超边必须包含多个节点
  rules_for_entities:
    zh:
    - '- 药物名称保持原文，如二甲双胍、阿司匹林'
    - '- 治疗方式保持原文，如放疗、化疗、手术'
  rules_for_relations:
    zh:
    - '- 一个超边代表一个完整的治疗方案'
    - '- 需要包含针对的疾病信息'
identifiers:
  entity_id: name
  relation_id: name
  relation_members: nodes
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({category})'
  relation_label: '{name} - {disease}'
