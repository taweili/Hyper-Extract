name: "BiodiversityRegistry"
autotype: set
tag: [biology]

language: zh

description:
  zh: "物种名录 - 从生物多样性调查报告中提取物种观测记录及种群数量信息"

item_schema:
  fields:
    - name: species_name
      type: "string"
      description:
        zh: "物种中文名称"
    - name: latin_name
      type: "string"
      description:
        zh: "拉丁学名"
      required: false
    - name: category
      type: "string"
      description:
        zh: "类别：脊椎动物、无脊椎动物、植物、微生物"
    - name: population_count
      type: "string"
      description:
        zh: "种群数量，如约120只、约850只"
    - name: protection_level
      type: "string"
      description:
        zh: "保护级别：国家一级保护、国家二级保护、地方保护、无保护"
      required: false
    - name: habitat
      type: "string"
      description:
        zh: "栖息地或分布区域"
      required: false
    - name: observation_details
      type: "string"
      description:
        zh: "观测详情，包括观测时间、地点和数量记录"
      required: false

extraction_guide:
  target:
    zh: |
      你是一位专业的生态学专家，请从调查报告中提取所有物种观测记录，构建物种名录。

  rules:
    zh: |
      1. 每个物种只能对应一个唯一的记录，根据物种名称进行去重
      2. 物种名称与原文保持一致
      3. 汇总所有观测报告中提到的物种及其种群数量

  rules_for_nodes:
    zh: |
      - 保护级别：国家一级保护、国家二级保护、地方保护、无保护
      - 类别：脊椎动物（鱼类、两栖类、爬行类、鸟类、哺乳动物）、无脊椎动物（昆虫、螺类、蚌类等）、植物（高等植物、藻类、苔藓）
      - 种群数量：使用原文中的数量描述，如"约120只"、"约850尾"

identifiers:
  item_id: "species_name"

display:
  label: "species_name"
