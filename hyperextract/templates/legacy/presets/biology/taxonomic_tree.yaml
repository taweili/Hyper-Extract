name: "TaxonomicTree"
autotype: graph
tag: [biology]

language: zh

description:
  zh: "分类学树 - 从生物学文献中提取生物分类层级包含关系"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "分类单元名称，如绿藻门、鲤科、鲢鱼"
    - name: rank
      type: "string"
      description:
        zh: "分类等级：界、门、纲、目、科、属、种"
    - name: latin_name
      type: "string"
      description:
        zh: "拉丁学名"
      required: false

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源分类单元（较高等级，如门）"
    - name: target
      type: "string"
      description:
        zh: "目标分类单元（较低等级，如种）"
    - name: relation_type
      type: "string"
      description:
        zh: "关系类型：包含于"
    - name: details
      type: "string"
      description:
        zh: "详细描述，包含具体的分类路径信息"
      required: false

guide:
  target:
    zh: |
      你是一位专业的生物分类学专家，请从生物学文献中提取分类单元及其层级包含关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的分类单元，禁止将多个分类单元合并为一个节点
      2. 物种名称与原文保持一致
      3. 边只能连接已提取的分类单元节点
      4. 分类关系是层级包含关系，从高等级指向低等级

  rules_for_nodes:
    zh: |
      - 分类等级：界(kingdom)、门(phylum)、纲(class)、目(order)、科(family)、属(genus)、种(species)
      - 拉丁学名保持原文格式（属名首字母大写，种名小写斜体）
      - 常见的分类等级英文缩写：Kingdom, Phylum, Class, Order, Family, Genus, Species

  rules_for_edges:
    zh: |
      - 关系类型统一为"包含于"
      - 提取完整的分类路径信息

identifiers:
  node_id: "name"
  edge_id: "{source}|{relation_type}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({rank})"
  edge_label: "{relation_type}"
