name: "PhylogeneticRelationGraph"
autotype: graph
tag: [biology]

language: zh

description:
  zh: "系统发育关系图 - 从进化生物学文献中提取物种亲缘关系和演化分支信息"

node_schema:
  fields:
    - name: name
      type: "str"
      description:
        zh: "物种或分类单元名称"
    - name: taxon_level
      type: "str"
      description:
        zh: "分类水平：界、门、纲、目、科、属、种"
    - name: description
      type: "str"
      description:
        zh: "简要描述，包含演化位置或特征"
      required: false

edge_schema:
  fields:
    - name: source
      type: "str"
      description:
        zh: "源物种或分类单元"
    - name: target
      type: "str"
      description:
        zh: "目标物种或分类单元"
    - name: relation_type
      type: "str"
      description:
        zh: "关系类型：亲缘关系、演化距离、分支、姐妹群"
    - name: evolutionary_distance
      type: "str"
      description:
        zh: "演化距离或分支时间估算"
      required: false
    - name: branch_point
      type: "str"
      description:
        zh: "分支点信息，如共同的祖先年代"
      required: false
    - name: details
      type: "str"
      description:
        zh: "详细描述"
      required: false

guide:
  target:
    zh: |
      你是一位专业的进化生物学专家，请从生物学文献中提取物种或分类单元及其系统发育关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的物种或分类单元，禁止将其合并为一个节点
      2. 物种名称与原文保持一致
      3. 边只能连接已提取的物种或分类单元节点

  rules_for_nodes:
    zh: |
      - 分类等级：界(kingdom)、门(phylum)、纲(class)、目(order)、科(family)、属(genus)、种(species)
      - 系统发育关系包括：亲缘关系、演化距离、分支、姐妹群关系

  rules_for_edges:
    zh: |
      - 关系类型：亲缘关系、演化距离、分支、姐妹群
      - 演化距离可用分支时间（百万年）或序列差异度表示
      - 分支点信息包括共同的祖先和分化时间

identifiers:
  node_id: "name"
  edge_id: "{source}|{relation_type}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({taxon_level})"
  edge_label: "{relation_type}"
