name: "SpeciesInteractionWeb"
autotype: graph
tag: [biology]

language: zh

description:
  zh: "物种相互作用网 - 从生态学文献中提取物种间的捕食、竞争、共生等关系"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "物种名称，如绿藻、鲢鱼、苍鹭"
    - name: category
      type: "string"
      description:
        zh: "物种类别：生产者、消费者、分解者"
    - name: species_type
      type: "string"
      description:
        zh: "具体分类：浮游植物、浮游动物、底栖动物、鱼类、鸟类、哺乳动物、植物、微生物"
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源物种名称"
    - name: target
      type: "string"
      description:
        zh: "目标物种名称"
    - name: relation_type
      type: "string"
      description:
        zh: "关系类型：捕食、寄生、竞争、互利共生、共生"
    - name: details
      type: "string"
      description:
        zh: "关系详细描述，包括具体行为或机制"
      required: false

extraction_guide:
  target:
    zh: |
      你是一位专业的生态学专家，请从文本中提取物种及其之间的相互作用关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的物种，禁止将多个物种合并为一个节点
      2. 物种名称与原文保持一致
      3. 准确判断物种的营养级：生产者（植物、藻类）、消费者（动物）、分解者（细菌、真菌）
      4. 边只能连接已提取的物种节点

  rules_for_nodes:
    zh: |
      - 生态学术语保持原文，如物种名称（鲢鱼、绿藻）、生态关系（捕食、竞争）
      - 注意区分不同营养级的物种

  rules_for_edges:
    zh: |
      - 关系类型包括：捕食、寄生、竞争、互利共生、共生
      - 捕食关系：捕食者 → 被捕食者
      - 竞争关系：竞争同一资源的物种之间
      - 互利共生：双方都受益的关系

identifiers:
  node_id: "name"
  edge_id: "{source}|{relation_type}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{relation_type}"
