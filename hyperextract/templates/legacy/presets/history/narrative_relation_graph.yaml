name: "NarrativeRelationGraph"
autotype: graph
tag: [history]

language: zh

description:
  zh: "叙事关系图 - 提取口述者主观视角下的人物互动与评价关系"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "人物姓名"
    - name: description
      type: "string"
      description:
        zh: "人物描述"
    - name: perspective
      type: "string"
      description:
        zh: "视角人物对该人物的评价或印象"
      required: false

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源人物"
    - name: target
      type: "string"
      description:
        zh: "目标人物"
    - name: interaction
      type: "string"
      description:
        zh: "互动类型：评价、往来、合作、书信"
    - name: content
      type: "string"
      description:
        zh: "互动内容或评价具体描述"

guide:
  target:
    zh: |
      你是一位专业的历史学专家，请从文本中提取口述历史或回忆录中的人物以及他们之间的互动与评价关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从提取的实体中创建边

  rules_for_nodes:
    zh: |
      - 人物要包含描述信息
      - 视角人物的评价或印象要记录

  rules_for_edges:
    zh: |
      - 评价：对人物的评价
      - 往来：往来互动
      - 合作：合作关系
      - 书信：书信往来

identifiers:
  node_id: "name"
  edge_id: "{source}|{interaction}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "name"
  edge_label: "{interaction}"
