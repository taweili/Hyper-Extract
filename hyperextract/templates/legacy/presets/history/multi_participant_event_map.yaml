name: "MultiParticipantEventMap"
autotype: hypergraph
tag: [history]

language: zh

description:
  zh: "多方事件超图 - 将历史事件建模为连接多个参与者的超边结构"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "参与者姓名或名称"
    - name: role
      type: "string"
      description:
        zh: "角色定位，如主将、谋士、使者、参战方"
    - name: faction
      type: "string"
      description:
        zh: "所属阵营"
      required: false
    - name: description
      type: "string"
      description:
        zh: "参与者描述，包括身份背景和在事件中的角色说明"
      required: false

edge_schema:
  fields:
    - name: eventName
      type: "string"
      description:
        zh: "事件名称，如赤壁之战、鸿门宴"
    - name: time
      type: "string"
      description:
        zh: "发生时间，如建安十三年冬"
    - name: location
      type: "string"
      description:
        zh: "发生地点"
    - name: description
      type: "string"
      description:
        zh: "事件概述，描述事件背景、经过和结果"
    - name: participants
      type: "array"
      description:
        zh: "参与者列表，与节点对应"

extraction_guide:
  target:
    zh: |
      你是一位专业的历史学专家，请从文本中提取历史事件中的参与者以及他们组成的事件超边。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 超边必须连接2个或以上的参与者

  rules_for_nodes:
    zh: |
      - 参与者要标注角色定位
      - 参与者要标注所属阵营

  rules_for_edges:
    zh: |
      - 一个超边代表一个完整的历史事件
      - 需要包含事件的时间、地点、背景和结果

identifiers:
  node_id: "name"
  edge_id: "eventName"
  edge_members: "participants"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}({role})"
  edge_label: "eventName"
