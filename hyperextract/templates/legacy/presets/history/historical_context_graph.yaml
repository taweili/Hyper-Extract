name: "HistoricalContextGraph"
autotype: graph
tag: [history]

language: zh

description:
  zh: "历史背景关联图 - 提取事件背后的人物关系、地缘政治等静态关联"

node_schema:
  fields:
    - name: name
      type: "str"
      description:
        zh: "实体名称"
    - name: category
      type: "str"
      description:
        zh: "类型：地理、政治、经济、军事、文化"
    - name: description
      type: "str"
      description:
        zh: "实体描述，包括位置、作用、意义等"

edge_schema:
  fields:
    - name: source
      type: "str"
      description:
        zh: "源实体"
    - name: target
      type: "str"
      description:
        zh: "目标实体"
    - name: relationType
      type: "str"
      description:
        zh: "关系类型：包含、影响、对抗、支撑"
    - name: description
      type: "str"
      description:
        zh: "关系描述"

guide:
  target:
    zh: |
      你是一位专业的历史学专家，请从文本中提取历史背景相关的实体以及它们之间的关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从提取的实体中创建边

  rules_for_nodes:
    zh: |
      - 实体类型：地理、政治、经济、军事、文化

  rules_for_edges:
    zh: |
      - 包含：包含关系
      - 影响：影响关系
      - 对抗：对抗关系
      - 支撑：支撑关系

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name}[{category}]"
  edge_label: "{relationType}"
