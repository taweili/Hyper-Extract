name: "ChronologicalEventChain"
autotype: temporal_graph
tag: [history]

language: zh

description:
  zh: "编年事件链 - 提取带精确时间戳的原子事件，严格还原历史时间线"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "事件名称"
    - name: category
      type: "string"
      description:
        zh: "事件类型：战争、政治、外交、军事"
    - name: description
      type: "string"
      description:
        zh: "事件简要描述"

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "前置事件名称"
    - name: target
      type: "string"
      description:
        zh: "后续事件名称"
    - name: time
      type: "string"
      description:
        zh: "时间，格式为年份或朝代年份，如208年，建安十三年"
    - name: location
      type: "string"
      description:
        zh: "地点"
    - name: description
      type: "string"
      description:
        zh: "事件因果描述，说明两事件之间的逻辑关系"

guide:
  target:
    zh: |
      你是一位专业的历史学专家，请从文本中提取历史事件以及它们之间的时间因果关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从提取的实体中创建边

  rules_for_nodes:
    zh: |
      - 事件类型：战争、政治、外交、军事等
      - 事件要包含简要描述

  rules_for_edges:
    zh: |
      - 记录事件之间的时间因果关系
      - 关系描述应与原文保持一致

  rules_for_time:
    zh: |
      当前观察日期：{observation_time}

      1. 相对时间解析（基于观察日期）：
         - "去年" → {observation_time} 的前一年
         - "上月" → {observation_time} 的前一个月

      2. 精确时间 → 保持原样（如"建安十三年冬"）
      3. 时间缺失 → 留空，不要猜测

identifiers:
  node_id: "name"
  edge_id: "{source}|{time}|{target}"
  edge_members:
    source: "source"
    target: "target"
  time_field: "time"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "name"
  edge_label: "time"
