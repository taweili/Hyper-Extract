name: "EpistolaryKnowledgeGraph"
autotype: temporal_graph
tag: [history]

language: zh

description:
  zh: "信札内容图谱 - 提取信件正文中提到的人物、事件及其相互关系"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "人物姓名"
    - name: identity
      type: "string"
      description:
        zh: "身份描述，如北宋文学家、东吴大都督"
      required: false
    - name: description
      type: "string"
      description:
        zh: "人物描述"
      required: false

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "发信人"
    - name: target
      type: "string"
      description:
        zh: "收信人"
    - name: time
      type: "string"
      description:
        zh: "时间"
      required: false
    - name: subject
      type: "string"
      description:
        zh: "信件主题或主要议题"
    - name: mentionedPersons
      type: "list"
      description:
        zh: "信中提及的人物"
      required: false
    - name: mentionedEvents
      type: "list"
      description:
        zh: "信中提及的事件"
      required: false
    - name: summary
      type: "string"
      description:
        zh: "信件内容摘要"

guide:
  target:
    zh: |
      你是一位专业的历史学专家，请从文本中提取书信中的人物以及书信内容关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致

  rules_for_nodes:
    zh: |
      - 人物要包含身份描述

  rules_for_edges:
    zh: |
      - 信件主题：信件讨论的主要议题
      - 提及人物：必须仔细阅读信件正文，提取正文中明确提到的人物姓名
      - 提及事件：必须仔细阅读信件正文，提取正文中明确提到的事件
      - 内容摘要：信件的主要内容概括

  rules_for_time:
    zh: |
      当前观察日期：{observation_time}

      1. 相对时间解析（基于观察日期）：
         - "去年" → {observation_time} 的前一年
         - "上月" → {observation_time} 的前一个月
         - "本季度" → {observation_time} 所在季度
         - "近期" → {observation_time} 最近 3 个月

      2. 精确时间 → 保持原样
      3. 时间缺失 → 留空，不要猜测

identifiers:
  node_id: "name"
  edge_id: "{source}|{subject}|{target}"
  edge_members:
    source: "source"
    target: "target"
  time_field: "time"

options:
  extraction_mode: "two_stage"

display:
  node_label: "name"
  edge_label: "subject"
