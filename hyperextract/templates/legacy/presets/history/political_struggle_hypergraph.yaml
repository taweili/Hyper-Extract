name: "PoliticalStruggleHypergraph"
autotype: hypergraph
tag: [history]

language: zh

description:
  zh: "政治博弈超图 - 针对战役或政争，提取攻方、守方、策划者、变节者的复杂互动"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "人物姓名"
    - name: role
      type: "string"
      description:
        zh: "角色定位：攻方、守方、策划者、变节者、调解者"
    - name: faction
      type: "string"
      description:
        zh: "所属阵营"
      required: false
    - name: description
      type: "string"
      description:
        zh: "人物描述"

edge_schema:
  fields:
    - name: eventName
      type: "string"
      description:
        zh: "事件名称"
    - name: attackers
      type: "array"
      description:
        zh: "攻方列表"
    - name: defenders
      type: "array"
      description:
        zh: "守方列表"
    - name: planners
      type: "array"
      description:
        zh: "策划者列表"
      required: false
    - name: turncoats
      type: "array"
      description:
        zh: "变节者列表"
      required: false
    - name: time
      type: "string"
      description:
        zh: "时间"
    - name: location
      type: "string"
      description:
        zh: "地点"
    - name: outcome
      type: "string"
      description:
        zh: "结果描述"

extraction_guide:
  target:
    zh: |
      你是一位专业的历史学专家，请从文本中提取政治博弈或战役中的人物以及他们组成的博弈事件超边。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 超边必须包含攻方和守方

  rules_for_nodes:
    zh: |
      - 角色定位：攻方、守方、策划者、变节者、调解者
      - 参与者要标注所属阵营

  rules_for_edges:
    zh: |
      - 攻方：主动发起进攻或挑战的一方
      - 守方：被动防守或应战的一方
      - 策划者：幕后策划或出谋划策的人
      - 变节者：中途倒戈或背叛的人

identifiers:
  node_id: "name"
  edge_id: "eventName"
  edge_members:
    - "attackers"
    - "defenders"
    - "planners"
    - "turncoats"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}[{role}]"
  edge_label: "eventName"
