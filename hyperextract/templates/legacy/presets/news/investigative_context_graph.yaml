name: "InvestigativeContextGraph"
autotype: graph
tag: [news]

language: zh

description:
  zh: "调查背景图谱 - 从调查报道中提取人物、机构、资金、项目之间的关联"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "实体类型：人物、机构、资金、项目、地点"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源实体"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标实体"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：任职、持股、交易、关联、合作、担保、亲属"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "关系描述"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的新闻调查记者，请从调查报道文本中提取实体和它们之间的关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 实体类型：人物、机构、资金、项目、地点
      6. 关系类型：任职、持股、交易、关联、合作、担保、亲属
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 实体类型：人物、机构、资金、项目、地点
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 关系类型：任职（担任职位）、持股（持有股份）、交易（商业交易）、关联（关联关系）、合作（合作关系）、担保（担保关系）、亲属（亲属关系）

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}[{category}]"
  edge_label: "{relationType}"
