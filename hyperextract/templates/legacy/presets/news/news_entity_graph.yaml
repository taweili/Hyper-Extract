name: "NewsEntityGraph"
autotype: graph
tag: [news]

language: zh

description:
  zh: "新闻实体图谱 - 快速提取新闻中的核心主体及其动作或状态"

node_schema:
  fields:
    - name: name
      type: "str"
      description:
        zh: "实体名称"
      required: true
      default: ""
    - name: category
      type: "str"
      description:
        zh: "实体类型：人物、机构、地点、产品、事件"
      required: true
      default: ""
    - name: description
      type: "str"
      description:
        zh: "简要描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "str"
      description:
        zh: "源实体"
      required: true
      default: ""
    - name: target
      type: "str"
      description:
        zh: "目标实体"
      required: true
      default: ""
    - name: relationType
      type: "str"
      description:
        zh: "关系类型，例如：发布、任命、收购等"
      required: true
      default: ""
    - name: description
      type: "str"
      description:
        zh: "动作详细描述"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的新闻编辑，请从新闻文本中提取实体和它们之间的动作或关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 实体类型：人物、机构、地点、产品、事件
      6. 关系类型：例如：发布、任命、收购等
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 实体类型：人物、机构、地点、产品、事件
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 关系类型：例如：发布、任命、收购等

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name}[{category}]"
  edge_label: "{relationType}"
