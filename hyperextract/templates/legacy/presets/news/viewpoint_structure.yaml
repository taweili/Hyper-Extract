name: "ViewpointStructure"
autotype: hypergraph
tag: [news]

language: zh

description:
  zh: "观点逻辑结构 - 建模文章的论证逻辑，将观点、论据、背景引用聚合为观点结构"

node_schema:
  fields:
    - name: name
      type: "str"
      description:
        zh: "元素名称，简短唯一标识符，如'政策建议'、'数据支撑'、'专家观点'"
      required: true
      default: ""
    - name: category
      type: "str"
      description:
        zh: "元素类型：观点、论据、背景引用"
      required: true
      default: ""
    - name: content
      type: "str"
      description:
        zh: "完整内容，概括原文意思"
      required: true
      default: ""
    - name: source
      type: "str"
      description:
        zh: "来源，如无则为空白"
      required: false
      default: ""

edge_schema:
  fields:
    - name: name
      type: "str"
      description:
        zh: "聚合名称，简短唯一标识，如'核心论点'、'论证结构'、'分析框架'"
      required: true
      default: ""
    - name: participantNames
      type: "list"
      description:
        zh: "参与此观点论证的所有元素名称列表，必须从已提取的节点中选择"
      required: true
      default: ""
    - name: description
      type: "str"
      description:
        zh: "论证描述，说明这些元素如何构成观点"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的政策分析师，请从文本中提取论证元素以及它们组成的观点聚合超边。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的元素，禁止将多个元素合并
      2. 元素名称 (name) 必须是简短、唯一的标识符（不超过10个字）
      3. 每个超边必须包含至少2个节点（观点 + 论据/背景引用）
      4. 超边中的participantNames必须填写节点的元素名称
      5. 观点：作者的核心论点
      6. 论据：支撑观点的证据或分析
      7. 背景引用：政策文件、统计数据、专家说法
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的元素，禁止将多个元素合并为一个节点
      2. 元素名称 (name) 必须是简短、唯一的标识符，用于后续引用
      3. 元素名称与原文保持一致，但要简洁（不超过10个字）
      4. 内容 (content) 字段要完整概括原文意思
      5. 观点：作者的核心论点、主张或结论
      6. 论据：支撑观点的证据、数据或分析
      7. 背景引用：政策文件、统计数据、专家说法等外部引用
      8. 来源如无则为空白
  rules_for_edges:
    zh: |
      1. 每个超边代表一个完整的观点论证结构
      2. 超边必须包含至少2个节点（一个观点 + 至少一个论据或背景引用）
      3. 只能从已知节点列表中选择，禁止创建未列出的节点
      4. participantNames字段必须填写节点的名字
      5. 将围绕同一核心观点的所有相关元素聚合到一个超边中
      6. 一个观点可以参与多个超边（从不同角度论证）
      7. 描述应说明这些元素如何共同支撑观点

identifiers:
  node_id: "name"
  edge_id: "name"
  edge_members: "participantNames"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name}[{category}]"
  edge_label: "{name}"
