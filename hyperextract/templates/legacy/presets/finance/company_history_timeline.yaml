language: zh
name: CompanyHistoryTimeline
type: temporal_graph
tags:
- finance
description:
  zh: 公司历史时间线 - 从招股说明书或公司历史文档中提取里程碑事件
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 实体名称
      required: true
      default: ''
    - name: type
      type: str
      description:
        zh: 实体类型：公司、创始人、投资机构等
      required: true
      default: ''
    - name: description
      type: str
      description:
        zh: 简要描述
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 事件主体/相关实体
      required: true
      default: ''
    - name: target
      type: str
      description:
        zh: 事件对象/相关实体
      required: true
      default: ''
    - name: eventType
      type: str
      description:
        zh: 事件类型：成立、融资、并购、IPO、裁员、发布产品、管理层变更、股权变更、获得专利、获奖
      required: true
      default: ''
    - name: eventDate
      type: str
      description:
        zh: 事件日期，格式为年-月-日或年份
      required: false
      default: ''
    - name: details
      type: str
      description:
        zh: 事件详细描述
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位专业的公司历史分析师，请从文本中提取公司相关的实体以及里程碑事件。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建新的实体
    - 关系描述应与原文保持一致
    - 仅提取与公司历史直接相关的核心实体
    - 重点关注：本公司、子公司、创始人、投资机构
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅提取与公司历史直接相关的核心实体
    - 重点关注：本公司、子公司、创始人、投资机构
    - 实体类型：公司、创始人、投资机构
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取事件，不要创建未列出的实体
    - 时间信息为可选，仅在文本中明确提及时才提取
    - source 和 target 只能是单个实体，不能是多个实体的拼接
    - 如果多个主体参与同一事件，应为每个主体创建独立的边
    - 事件类型：成立、融资、并购、IPO、裁员、发布产品、管理层变更、股权变更、获得专利、获奖
  rules_for_time:
    zh:
    - 当前观察日期：{observation_time}
    - 相对时间解析（基于观察日期）：
    - '- "去年" → {observation_time} 前一年'
    - '- "今年" → {observation_time} 所属年份'
    - '- "明年" → {observation_time} 后一年'
    - '- "五年前" → {observation_time} 前五年'
    - '- "最近" → {observation_time} 前1年'
    - 明确日期：保持原格式
    - '- 年份（如 2015年）→ 2015'
    - '- 年-月-日 → 保持原格式'
    - 缺失时间：留空
identifiers:
  entity_id: name
  relation_id: '{source}|{eventType}|{details}'
  relation_members:
    source: source
    target: target
  time_field: eventDate
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({type})'
  relation_label: '{eventType} ({eventDate})'
