language: zh
name: SupplyChainGraph
type: graph
tags:
- finance
description:
  zh: 供应链图谱 - 从 SEC 申报文件中提取供应链实体及其关系
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 实体名称（公司或供应商）
      required: true
      default: ''
    - name: entity_type
      type: str
      description:
        zh: 类型：客户、供应商、战略伙伴、分销商、本公司
      required: true
      default: ''
    - name: details
      type: str
      description:
        zh: 地理管辖区、认证信息及合规说明
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 上游供应商或提供方
      required: true
      default: ''
    - name: target
      type: str
      description:
        zh: 下游买方或需求方
      required: true
      default: ''
    - name: relationship_type
      type: str
      description:
        zh: 类型：供应、采购、分销、战略合作
      required: true
      default: ''
    - name: product_service
      type: str
      description:
        zh: 被供应或交易的内容，例如锂芯片、物流服务等
      required: true
      default: ''
guideline:
  target:
    zh: '你是一位专业的供应链分析师，请从文本中提取供应链实体及其关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别供应商、客户和伙伴
    - 提取交易类型及产品
    - 将依赖度、交易量及地缘政治风险汇总
  rules_for_entities:
    zh:
    - 每个节点对应一个独立实体
    - 实体名称与原文保持一致
    - 识别公司及合作伙伴
    - 分类角色（客户、供应商、战略伙伴、分销商）
    - 记录地区及认证至 details
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 通过产品/服务连接实体
    - 综合评估依赖度、交易量及风险（关税、单一来源）
identifiers:
  entity_id: name
  relation_id: '{source}|{relationship_type}|{target}'
  relation_members:
    source: source
    target: target
options:
  extraction_mode: one_stage
display:
  entity_label: '{name} ({entity_type})'
  relation_label: '{relationship_type}'
