language: zh
name: EarningsCallSummary
type: model
tags:
- finance
description:
  zh: 财报电话会议摘要 - 从财报电话会议记录中提取关键财务指标、业绩指引和整体基调
output:
  description: {}
  fields:
  - name: company_name
    type: string
    description:
      zh: 公司名称
    required: false
    default: ''
  - name: ticker
    type: string
    description:
      zh: 股票代码
    required: false
    default: ''
  - name: quarter
    type: string
    description:
      zh: 报告季度（例如'Q3 FY2024'、'2024 年第四季度'）
    required: false
    default: ''
  - name: call_date
    type: string
    description:
      zh: 财报电话会议日期
    required: false
    default: ''
  - name: reported_revenue
    type: string
    description:
      zh: 本季度报告收入（例如'948 亿美元'）
    required: false
    default: ''
  - name: revenue_vs_consensus
    type: string
    description:
      zh: 收入与市场一致预期对比（例如'超出 12 亿美元'、'符合预期'、'低于预期 5 亿美元'）
    required: false
    default: ''
  - name: reported_eps
    type: string
    description:
      zh: 报告的稀释每股收益（例如'1.46 美元'）
    required: false
    default: ''
  - name: eps_vs_consensus
    type: string
    description:
      zh: 每股收益与一致预期对比（例如'超出 0.05 美元'）
    required: false
    default: ''
  - name: guidance_revenue
    type: string
    description:
      zh: 前瞻性收入指引（例如'第四季度 950-970 亿美元'、'2025 财年收入 3800-3900 亿美元'）
    required: false
    default: ''
  - name: guidance_eps
    type: string
    description:
      zh: 前瞻性每股收益指引（如有提供）
    required: false
    default: ''
  - name: overall_tone
    type: string
    description:
      zh: 电话会议整体基调：'积极'、'审慎乐观'、'中性'、'谨慎'、'消极'
    required: false
    default: ''
  - name: key_highlights
    type: array
    description:
      zh: 管理层准备发言中的 3-5 项核心亮点
    required: false
    default: ''
  - name: key_concerns
    type: array
    description:
      zh: 管理层或分析师在问答环节提出的主要关切
    required: false
    default: ''
  - name: strategic_priorities
    type: array
    description:
      zh: 管理层强调的战略重点
    required: false
    default: ''
  - name: ceo_name
    type: string
    description:
      zh: CEO 或主要发言人姓名
    required: false
    default: ''
  - name: cfo_name
    type: string
    description:
      zh: CFO 姓名
    required: false
    default: ''
guideline:
  target:
    zh: '你是一位专业的分析师，请从财报电话会议记录中提取关键财务指标、业绩指引和整体基调。

      '
  rules:
    zh:
    - 每个对象对应一个独立的实体，禁止合并
    - 实体名称与原文保持一致
    - 提取确切的报告数据（收入、每股收益）并与一致预期进行对比
    - 捕捉收入和盈利的前瞻性指引
    - 评估电话会议的整体基调（管理层措辞、分析师反应）
    - 列出准备发言中的核心亮点和问答环节中的主要关切
    - 识别管理层强调的战略重点
display:
  label: '{company_name} - {quarter}'
