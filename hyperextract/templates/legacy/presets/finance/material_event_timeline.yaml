language: zh
name: MaterialEventTimeline
type: temporal_graph
tags:
- finance
description:
  zh: 重大事件时间线 - 从 8-K 申报文件中按时间顺序提取重大事件
output:
  description: {}
  entities:
    description: {}
    fields:
    - name: name
      type: str
      description:
        zh: 实体名称（例如 公司名称、高管姓名、监管机构）
      required: true
      default: ''
    - name: entity_type
      type: str
      description:
        zh: 类型：'公司'、'高管'、'监管机构'、'交易对手'、'子公司'、'审计师'
      required: true
      default: ''
    - name: description
      type: str
      description:
        zh: 角色或背景（例如 '首席执行官'、'收购方'、'SEC'）
      required: false
      default: ''
  relations:
    description: {}
    fields:
    - name: source
      type: str
      description:
        zh: 行为实体名称
      required: true
      default: ''
    - name: target
      type: str
      description:
        zh: 受影响实体名称
      required: true
      default: ''
    - name: event_type
      type: str
      description:
        zh: 类型：'高管任命'、'高管离职'、'收购'、'资产剥离'、'财务重述'、'破产'、'退市'、'重大协议'、'股息宣派'、'股票拆分'、'监管行动'
      required: true
      default: ''
    - name: start_timestamp
      type: str
      description:
        zh: 事件发生或公告的日期（例如 '2024-03-15'、'2024年3月15日'）
      required: false
      default: ''
    - name: end_timestamp
      type: str
      description:
        zh: 如适用的结束日期（例如 生效日期、交割日期）
      required: false
      default: ''
    - name: description
      type: str
      description:
        zh: 重大事件的详细信息，包括财务条款、条件或监管背景
      required: false
      default: ''
    - name: sec_item
      type: str
      description:
        zh: 8-K 条目编号（例如 'Item 5.02'、'Item 1.01'、'Item 2.01'）
      required: false
      default: ''
guideline:
  target:
    zh: '你是一位专业的监管申报分析师，请从文本中提取参与重大事件的实体及其之间的时序关系。

      '
  rules:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 识别涉及的公司、高管、监管机构和交易对手
    - 提取每个重大事件及其具体日期
    - 在可获取时按 8-K 条目编号对事件进行分类
    - 捕获财务条款、条件和监管背景
  rules_for_entities:
    zh:
    - 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
    - 实体名称与原文保持一致
    - 识别公司、高管、监管机构、审计师和交易对手
    - 按类型对每个实体进行分类
    - 捕获角色描述
  rules_for_relations:
    zh:
    - 仅从已知实体列表中提取边，不要创建未列出的实体
    - 关系描述应与原文保持一致
    - 通过重大事件连接实体
    - 提取每个事件的具体日期
    - 按事件类型和 8-K 条目编号进行分类
    - 捕获财务条款和条件
  rules_for_time:
    zh:
    - 当前观察日期：{observation_time}
    - 相对时间解析（基于观察日期）：
    - '- "去年" → {observation_time} 的前一年'
    - '- "上月" → {observation_time} 的前一个月'
    - '- "本季度" → {observation_time} 所在季度'
    - '- "近期" → {observation_time} 最近 3 个月'
    - 精确时间 → 保持原样
    - 时间缺失 → 留空，不要猜测
identifiers:
  entity_id: name
  relation_id: '{source}|{event_type}|{target}'
  relation_members:
    source: source
    target: target
  time_field: start_timestamp
options:
  extraction_mode: two_stage
display:
  entity_label: '{name} ({entity_type})'
  relation_label: '{event_type} [{start_timestamp}]'
