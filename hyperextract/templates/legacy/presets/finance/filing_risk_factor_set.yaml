language: zh
name: FilingRiskFactorSet
type: set
tags:
- finance
description:
  zh: 申报风险因素集 - 对 SEC 申报文件中的风险因素进行去重和归类
output:
  description: {}
  fields:
  - name: risk_title
    type: string
    description:
      zh: 风险因素的简明标题（例如 '网络安全漏洞风险'、'外汇敞口'）
    required: true
    default: ''
  - name: risk_category
    type: string
    description:
      zh: 类别：'市场'、'运营'、'监管'、'财务'、'战略'、'网络安全'、'ESG'、'法律'、'地缘政治'
    required: true
    default: ''
  - name: description
    type: string
    description:
      zh: 申报文件中披露的风险完整描述
    required: true
    default: ''
  - name: potential_impact
    type: string
    description:
      zh: 所述的潜在财务或运营影响（例如 '对营收产生重大不利影响'）
    required: false
    default: ''
  - name: affected_areas
    type: array
    description:
      zh: 受影响的业务板块或职能（例如 ['国际业务', '供应链']）
    required: false
    default: ''
  - name: mitigation_disclosed
    type: string
    description:
      zh: 公司已披露的任何缓解措施或管控手段
    required: false
    default: ''
  - name: is_new
    type: bool
    description:
      zh: 与前期申报相比，该风险因素是否为新增
    required: false
    default: false
guideline:
  target:
    zh: '你是一位专业的监管申报分析师，请从 SEC 申报文件的风险因素章节中提取并归类所有单项风险因素。

      '
  rules:
    zh:
    - 每个元素对应一个独立的实体，禁止合并
    - 实体名称与原文保持一致
    - 规范化：将相关的风险描述归纳到一个简明的风险标题下
    - 分类：将每项风险归入其主要类别
    - 完整性：提取每一个不同的风险因素，即使只是简要提及
    - 累积合并：如果同一风险在不同章节中出现了更多细节，则合并相关信息
identifiers:
  item_id: risk_title
display:
  label: '[{risk_category}] {risk_title}'
