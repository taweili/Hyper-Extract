language: zh
name: entity_registry
type: set
tags: [general]
description:
  zh: '实体注册表模板 - 从任意文本中识别并去重关键实体，汇总为可复用的实体清单。'

output:
  description:
    zh: '去重后的实体列表结果，用于形成基础实体台账。'
  fields:
  - name: name
    type: str
    description:
      zh: '实体名称，优先使用文本中最稳定、最清晰的称呼。'
  - name: category
    type: str
    description:
      zh: '实体类型，如人物、机构、地点、产品、概念、事件、制度、其他。'
  - name: description
    type: str
    description:
      zh: '对实体身份、含义或在文本中作用的简要说明。'
    required: false
    default: ''

guideline:
  target:
    zh: '你是一位实体识别专家。请从文本中识别具有独立意义的实体，并将重复出现的同一实体合并为一条记录。'
  rules:
    zh:
    - '提取对理解文本内容有意义的实体，如人物、机构、地点、产品、概念、事件、制度等。'
    - 'name 使用文本中最清晰、最稳定的称呼；同一实体若有简称或别称，应统一为一个名称。'
    - 'category 用于概括实体类型，尽量准确且可复用。'
    - 'description 用 1 句话说明实体是谁、是什么或在文本中的作用；信息不足时可留空。'
    - '对同一实体进行去重，不要因表述差异重复输出多条。'
    - '不要把纯代词、泛称、临时描述短语或无独立指代意义的词语当作实体。'

identifiers:
  item_id: name

options: {}

display:
  label: name
