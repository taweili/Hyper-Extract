language: zh
name: cross_reference_net
type: graph
tags: [general]
description:
  zh: '交叉引用网络模板 - 从百科、文档、规章或知识说明类文本中提取条目之间的引用、参见、链接或相关关系。'

output:
  description:
    zh: '由条目节点和交叉引用关系组成的网络结构，用于表达文本中的引用路径和知识跳转关系。'
  entities:
    description:
      zh: '可作为引用发起方或引用目标的条目、概念或章节节点。'
    fields:
    - name: name
      type: str
      description:
        zh: '条目、概念、章节或被引用对象的名称。'
    - name: type
      type: str
      description:
        zh: '节点类型，如条目、章节、概念、人物、地点、其他。'
    - name: description
      type: str
      description:
        zh: '对节点含义或其在当前引用网络中角色的简要说明。'
      required: false
      default: ''
  relations:
    description:
      zh: '节点之间的交叉引用关系边。'
    fields:
    - name: source
      type: str
      description:
        zh: '引用发起方，即当前条目、章节或概念。'
    - name: target
      type: str
      description:
        zh: '被引用、被链接、被参见或被关联的目标节点。'
    - name: relation_type
      type: str
      description:
        zh: '关系类型，优先使用超链接、引用、参见、相关、其他。'
    - name: context
      type: str
      description:
        zh: '对引用语境、引用目的或上下文位置的简要补充。'
      required: false
      default: ''

guideline:
  target:
    zh: '你是一位知识网络分析专家。请从文本中提取可独立识别的条目或概念，并建立它们之间明确存在的引用、参见或相关连接。'
  rules_for_entities:
    zh:
    - '优先提取在文本中被明确提及、并能够作为引用源或引用目标的条目、概念、章节、人物或地点。'
    - 'name 使用原文中最清晰、最稳定的称呼；同一对象保持统一命名。'
    - 'type 需概括节点身份，如条目、章节、概念、人物、地点、其他。'
    - 'description 可用于说明该节点为何会进入当前引用网络；信息不足时可留空。'
  rules_for_relations:
    zh:
    - '仅在文本明确存在引用、超链接、参见、相关提示或互指关系时建立边。'
    - 'source 和 target 必须直接引用已提取节点的 name。'
    - 'relation_type 优先使用超链接、引用、参见、相关、其他，并尽量与文本表达保持一致。'
    - '若引用关系带有特定上下文、说明语或引用目的，可写入 context；否则留空。'
    - '不要把仅仅共同出现、主题相近但没有显式互指的节点误判为交叉引用关系。'

identifiers:
  entity_id: name
  relation_id: '{source}|{relation_type}|{target}'
  relation_members:
    source: source
    target: target

options:
  extraction_mode: two_stage

display:
  entity_label: '{name} ({type})'
  relation_label: '{relation_type}'
