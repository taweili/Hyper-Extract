name: "PenaltyMapping"
autotype: graph
tag: [general]

language: zh

description:
  zh: "违规处罚因果链 - 描述从'违规行为'到'处理程序'再到'最终结果'的演变路径"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "节点名称"
    - name: type
      type: "string"
      description:
        zh: "节点类型：违规行为、处理程序、处罚结果、其他"
    - name: description
      type: "string"
      description:
        zh: "详细描述"

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源节点名称"
    - name: target
      type: "string"
      description:
        zh: "目标节点名称"
    - name: relation
      type: "string"
      description:
        zh: "关系类型：导致、触发、执行、产生、其他"
    - name: details
      type: "string"
      description:
        zh: "详细说明"
      required: false

extraction_guide:
  target:
    zh: |
      你是一位专业的处罚逻辑分析专家，请从文本中提取违规处罚的因果链。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从提取的节点中创建因果路径边

  rules_for_nodes:
    zh: |
      - 违规行为：违反规定的行为
      - 处理程序：处理违规的流程
      - 处罚结果：最终的处罚结果

  rules_for_edges:
    zh: |
      - 导致：表示因果关系
      - 触发：表示引发关系
      - 执行：表示执行关系
      - 产生：表示结果关系

identifiers:
  node_id: "name"
  edge_id: "{source}|{relation}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({type})"
  edge_label: "{relation}"
