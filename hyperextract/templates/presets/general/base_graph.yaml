language: [zh, en]

name: graph
type: graph
tags: [general, graph]

description:
  zh: '通用图结构知识模板 - 从任意文本中提取实体节点及实体之间的二元关系，构建简单知识图谱。'
  en: 'General-purpose Graph Knowledge Template - Extracts entity nodes and binary relations between entities from any text, constructing a simple knowledge graph.'

output:
  description:
    zh: '由实体节点和关系边组成的知识图谱结果。'
    en: 'Knowledge graph result consisting of entity nodes and relation edges.'
  entities:
    description:
      zh: '文本中可独立识别、可参与关系连接的实体节点。'
      en: 'Entity nodes that can be independently identified and participate in relation connections.'
    fields:
    - name: name
      type: str
      description:
        zh: '实体名称，使用文本中最明确、最稳定的称呼。'
        en: 'Entity name, using the most explicit and stable designation in the text.'
    - name: type
      type: str
      description:
        zh: '实体类型，如人物、地点、组织、物品、概念、事件、制度、技术等。'
        en: 'Entity type, such as person, location, organization, object, concept, event, institution, technology, etc.'
    - name: description
      type: str
      description:
        zh: '对实体身份、含义或其在当前文本中作用的简要说明。'
        en: 'Brief description of the entity identity, meaning, or its role in the current text.'
      required: false
  relations:
    description:
      zh: '实体之间的显式语义关系边。'
      en: 'Explicit semantic relation edges between entities.'
    fields:
    - name: source
      type: str
      description:
        zh: '关系起点实体，必须对应已提取实体的 name。'
        en: 'Source entity of the relation, must correspond to the name of an extracted entity.'
    - name: target
      type: str
      description:
        zh: '关系终点实体，必须对应已提取实体的 name。'
        en: 'Target entity of the relation, must correspond to the name of an extracted entity.'
    - name: type
      type: str
      description:
        zh: '关系类型，使用简洁明确的语义词概括两个实体之间的连接方式。'
        en: 'Relation type, using concise and clear semantic words to describe the connection between two entities.'
    - name: description
      type: str
      description:
        zh: '对关系依据、方向或上下文含义的简要说明。'
        en: 'Brief description of the relation basis, direction, or contextual meaning.'
      required: false

guideline:
  target:
    zh: '你是一位知识抽取与知识图谱构建专家。请从文本中识别关键实体，并构建这些实体之间的二元关系。'
    en: 'You are an expert in knowledge extraction and knowledge graph construction. Identify key entities from the text and construct binary relations between them.'
  rules_for_entities:
    zh:
    - '提取对理解文本事实、结构或逻辑有价值的实体。'
    - 'name 使用原文中最明确、最稳定的称呼；同一实体在全文中保持命名一致。'
    - 'type 需概括实体类别，可使用通用类型标签。'
    - 'description 用 1 句话概括实体的身份或作用；若信息不足可留空。'
    en:
    - 'Extract entities that are valuable for understanding text facts, structure, or logic.'
    - 'Use the most explicit and stable designation in the source text for names; maintain consistent naming for the same entity.'
    - 'Use type to summarize the entity category using general type labels.'
    - 'Describe the entity in 1 sentence; leave empty if information is insufficient.'
  rules_for_relations:
    zh:
    - '仅在文本明确表达两个实体之间存在语义联系时创建关系，不要凭常识补充隐含关系。'
    - 'source 和 target 必须直接引用已提取实体的 name，不能新造实体名称。'
    - 'type 使用简洁、方向清晰的关系词。'
    - 'description 简要说明关系依据或上下文；若文本没有额外信息可留空。'
    - '避免重复关系；若同一对实体存在多种不同关系，可分别记录。'
    en:
    - 'Create relation edges only when the text explicitly expresses a semantic connection between two entities.'
    - 'Source and target must directly reference the name of an extracted entity; do not create new entity names.'
    - 'Use concise relation words with clear direction.'
    - 'Briefly describe the relation basis or context; leave empty if no additional information is available.'
    - 'Avoid duplicate relations; if the same pair of entities has multiple different relations, record them separately.'

identifiers:
  entity_id: name
  relation_id: '{source}|{type}|{target}'
  relation_members:
    source: source
    target: target

options:
  extraction_mode: two_stage

display:
  entity_label: '{name} ({type})'
  relation_label: '{type}'
