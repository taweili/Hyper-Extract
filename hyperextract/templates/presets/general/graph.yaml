language: zh
name: knowledge_graph
type: graph
tags: [general]
description: '通用知识图谱 - 提取实体和它们之间的关系'

output:
  description: '通用知识图谱结构'
  entities:
    description: '提取的实体'
    fields:
    - name: name
      type: str
      description: '实体名称'
    - name: type
      type: str
      description: '实体类型'
    - name: description
      type: str
      description: '实体描述'
      required: false
  relations:
    description: '实体之间的关系'
    fields:
    - name: source
      type: str
      description: '源实体'
    - name: target
      type: str
      description: '目标实体'
    - name: type
      type: str
      description: '关系类型'
    - name: description
      type: str
      description: '关系描述'
      required: false

guideline:
  target:
    zh: '你是一位知识图谱专家，请从文本中提取实体和它们之间的关系。'
  rules_for_entities:
    zh:
    - '提取所有相关实体'
    - '为每个实体指定类型'
    - '实体类型包括：人物、地点、组织、物品、概念、事件等'
  rules_for_relations:
    zh:
    - '仅从提取的实体中创建关系边'
    - '关系类型包括：包含、属于、相关、影响、合作、竞争等'
    - 'source 和 target 都必须是已提取的实体'

identifiers:
  entity_id: name
  relation_id: '{source}|{target}'
  relation_members:
    source: source
    target: target

options:
  extraction_mode: two_stage

display:
  entity_label: '{name} ({type})'
  relation_label: '{type}'
