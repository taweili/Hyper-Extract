language: [zh, en]

name: base_set
type: set
tags: [general]

description:
  zh: '通用实体集合结构知识模板 - 从任意文本中识别并去重关键实体，汇总为可复用的实体清单。'
  en: 'General-purpose Entity Set Knowledge Template - Identifies and deduplicates key entities from any text, aggregating them into a reusable entity registry.'

output:
  description:
    zh: '去重后的实体列表结果。'
    en: 'Deduplicated entity list result.'
  fields:
  - name: name
    type: str
    description:
      zh: '实体名称，优先使用文本中最稳定、最清晰的称呼。'
      en: 'Entity name, using the most stable and clear designation in the text.'
  - name: type
    type: str
    description:
      zh: '实体类型，如人物、机构、地点、物品、概念、事件、其他。'
      en: 'Entity type, such as person, organization, location, object, concept, event, other.'
  - name: description
    type: str
    description:
      zh: '对实体身份、含义或在文本中作用的简要说明。'
      en: 'Brief description of the entity identity, meaning, or role in the text.'
    required: false

guideline:
  target:
    zh: '你是一位实体识别专家。请从文本中识别具有独立意义的实体，并将重复出现的同一实体合并为一条记录。'
    en: 'You are an entity recognition expert. Identify entities with independent meaning from the text and merge duplicate entities into a single record.'
  rules:
    zh:
    - '提取对理解文本内容有意义的实体。'
    - 'name 使用文本中最清晰、最稳定的称呼；同一实体若有简称或别称，应统一为一个名称。'
    - 'type 用于概括实体类型，尽量准确且可复用。'
    - 'description 用 1 句话说明实体是谁、是什么或在文本中的作用；信息不足时可留空。'
    - '对同一实体进行去重，不要因表述差异重复输出多条。'
    - '不要把纯代词、泛称、临时描述短语或无独立指代意义的词语当作实体。'
    en:
    - 'Extract entities that are meaningful for understanding the text content.'
    - 'Use the clearest and most stable designation for names; unify names with aliases or nicknames.'
    - 'Use type to summarize the entity category.'
    - 'Describe the entity in 1 sentence; leave empty if information is insufficient.'
    - 'Deduplicate entities; do not output multiple records for the same entity.'
    - 'Do not treat pure pronouns, generic terms, or non-referential phrases as entities.'

identifiers:
  item_id: name

display:
  label: '{name}'
