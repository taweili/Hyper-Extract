name: "LifeEventTimeline"
autotype: temporal_graph
tag: [general]

language: zh

description:
  zh: "生活事件时间线 - 提取带时间戳的事件，并按时间顺序排列"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称"
    - name: type
      type: "string"
      description:
        zh: "实体类型：人物、地点、组织、物品、概念、其他"
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "事件主体/相关实体"
    - name: target
      type: "string"
      description:
        zh: "事件对象/相关实体"
    - name: eventType
      type: "string"
      description:
        zh: "事件类型：出生、逝世、教育、工作、成就、交往、旅行、其他"
    - name: eventDate
      type: "string"
      description:
        zh: "事件日期，格式为年-月-日或年份"
      required: false
    - name: details
      type: "string"
      description:
        zh: "事件详细描述"
      required: false

guide:
  target:
    zh: |
      你是一位专业的传记年表专家，请从文本中提取人物、地点、组织等实体以及生活事件。

  rules:
    zh: |
      1. 提取所有相关实体
      2. 为每个实体指定类型
      3. 仅从提取的实体中创建事件边

  rules_for_nodes:
    zh: |
      - 人物、地点、组织、物品、概念等实体

  rules_for_edges:
    zh: |
      - 事件类型：出生、逝世、教育、工作、成就、交往、旅行、其他
      - 时间信息为可选，仅在文本中明确提及时才提取

  rules_for_time:
    zh: |
      当前观察日期：{observation_time}
      
      1. 相对时间解析（基于观察日期）：
         - "去年" → {observation_time} 前一年
         - "今年" → {observation_time} 所属年份
         - "明年" → {observation_time} 后一年
         - "昨天/今天/明天" → {observation_time} 前/当/后一天
         - "十年前/五年后" → {observation_time} 前/后相应年数
         - "年初/年末" → 当年 1月1日/12月31日
         - "朝代" → 保留朝代名称
      
      2. 明确日期：保持原格式
         - 年份（如 429年、2023年）→ 429、2023
         - 年-月-日 → 保持原格式
      
      3. 缺失时间：留空

identifiers:
  node_id: "name"
  edge_id: "{source}|{eventType}|{details}"
  edge_members:
    source: "source"
    target: "target"
  time_field: "eventDate"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({type})"
  edge_label: "{eventType}"
