name: "RegulationProfile"
autotype: model
tag: [general]

language: zh

description:
  zh: "规章元数据快照 - 提取制度的名称、版本、适用范围、生效日期及核心宗旨"

schema:
  fields:
    - name: title
      type: "string"
      description:
        zh: "规章名称"
    - name: version
      type: "string"
      description:
        zh: "版本号"
      required: false
    - name: issuer
      type: "string"
      description:
        zh: "发布机构"
      required: false
    - name: issueDate
      type: "string"
      description:
        zh: "发布日期"
      required: false
    - name: effectiveDate
      type: "string"
      description:
        zh: "生效日期"
      required: false
    - name: expiryDate
      type: "string"
      description:
        zh: "失效日期"
      required: false
    - name: scope
      type: "array"
      description:
        zh: "适用范围"
      required: false
    - name: targetAudience
      type: "array"
      description:
        zh: "适用对象"
      required: false
    - name: corePurpose
      type: "string"
      description:
        zh: "核心宗旨/目的"
      required: false
    - name: keywords
      type: "array"
      description:
        zh: "关键词/标签"
      required: false
    - name: relatedRegulations
      type: "array"
      description:
        zh: "关联规章"
      required: false

extraction_guide:
  target:
    zh: |
      你是一位专业的规章制度分析专家，请从文本中提取该规章制度的元数据信息，构建规章元数据快照。

  rules:
    zh: |
      1. 提取规章的完整名称
      2. 提取版本号（如有）
      3. 提取发布机构
      4. 提取发布日期、生效日期、失效日期（如有）
      5. 提取适用范围
      6. 提取适用对象
      7. 提取核心宗旨或目的
      8. 提取关键词或标签
      9. 提取关联的其他规章
      10. 信息缺失时留空，不要编造

display:
  label: "title"
