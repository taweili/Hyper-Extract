name: "KeywordList"
autotype: list
tag: [general]

language: zh

description:
  zh: "关键词列表 - 从文本中提取关键词并附带分类、出现频次信息"

item_schema:
  fields:
    - name: term
      type: "string"
      description:
        zh: "关键词"
    - name: category
      type: "string"
      description:
        zh: "分类：核心概念、术语、人名、机构名、其他"
    - name: description
      type: "string"
      description:
        zh: "关键词简要描述或上下文说明"
      required: false

extraction_guide:
  target:
    zh: |
      你是一位专业的关键词提取专家，请从文本中提取所有关键词并附带分类和描述信息。

  rules:
    zh: |
      1. 提取文本中的所有关键词和核心短语
      2. 为每个关键词指定分类
      3. 为每个关键词添加简要描述

display:
  label: "term"
