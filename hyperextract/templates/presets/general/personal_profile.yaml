name: "PersonalProfile"
autotype: model
tag: [general]

language: zh

description:
  zh: "个人档案 - 聚合人物的静态属性（生卒年、学历、核心身份）"

schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "姓名"
    - name: gender
      type: "string"
      description:
        zh: "性别"
      required: false
    - name: birthDate
      type: "string"
      description:
        zh: "出生日期，格式为年-月-日或年份"
      required: false
    - name: deathDate
      type: "string"
      description:
        zh: "逝世日期，格式为年-月-日或年份"
      required: false
    - name: nationality
      type: "string"
      description:
        zh: "国籍"
      required: false
    - name: birthPlace
      type: "string"
      description:
        zh: "出生地"
      required: false
    - name: education
      type: "array"
      description:
        zh: "教育经历"
      required: false
    - name: occupations
      type: "array"
      description:
        zh: "职业/身份"
      required: false
    - name: coreIdentity
      type: "array"
      description:
        zh: "核心身份/标签"
      required: false
    - name: majorAchievements
      type: "array"
      description:
        zh: "主要成就"
      required: false
    - name: affiliations
      type: "array"
      description:
        zh: "所属组织/机构"
      required: false
    - name: summary
      type: "string"
      description:
        zh: "个人简介"
      required: false

extraction_guide:
  target:
    zh: |
      你是一位专业的人物档案编辑，请从文本中提取该人物的静态属性信息，构建个人档案。

  rules:
    zh: |
      1. 提取姓名、性别、出生日期、逝世日期、国籍、出生地等基本信息
      2. 提取教育经历
      3. 提取职业或身份信息
      4. 提取核心身份标签
      5. 提取主要成就
      6. 提取所属组织或机构
      7. 撰写 100-200 字的个人简介
      8. 若信息缺失时留空，不要编造

display:
  label: "name"
