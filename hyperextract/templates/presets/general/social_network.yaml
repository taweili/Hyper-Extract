name: "SocialNetwork"
autotype: graph
tag: [general]

language: zh

description:
  zh: "社交网络图 - 专注于提取人际关系、互动与组织隶属"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "名称"
    - name: type
      type: "string"
      description:
        zh: "节点类型：人物、组织、机构、其他"
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
    - name: role
      type: "string"
      description:
        zh: "角色/身份"
      required: false

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源节点"
    - name: target
      type: "string"
      description:
        zh: "目标节点"
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：亲属、朋友、同事、师生、上下级、合作、竞争、隶属、其他"
    - name: details
      type: "string"
      description:
        zh: "关系详细说明"
      required: false

guide:
  target:
    zh: |
      你是一位专业的社会关系分析专家，请从文本中提取人物、组织及其相互关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从提取的节点中创建边

  rules_for_nodes:
    zh: |
      - 提取所有人物、组织、机构等
      - 为每个节点指定类型和角色

  rules_for_edges:
    zh: |
      - 亲属：血缘或姻亲关系
      - 朋友：朋友关系
      - 同事：工作关系
      - 师生：教育关系
      - 上下级：层级关系
      - 合作：合作关系
      - 竞争：竞争关系
      - 隶属：组织隶属关系

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({role})"
  edge_label: "{relationType}"
