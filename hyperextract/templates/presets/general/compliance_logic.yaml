language: zh
name: compliance_logic
type: hypergraph
tags: [general]
description:
  zh: '规定条文超图 - 面向制度、细则、办法、规范、指引、规程等规定类文本，提取条文中涉及的名词性要素，并用 action 概括这些要素之间被要求执行的行为。'

output:
  description:
    zh: '由名词性实体节点和规定超边组成的结构化结果。节点只保留规定中涉及的人、部门、文件、场所、物品等要素；超边表示一条独立规定，action 用于概括这些要素之间被要求执行的行为。'
  entities:
    description:
      zh: '规定涉及的基础节点。只提取名词或名词短语，不提取动作本身。'
    fields:
    - name: name
      type: str
      description:
        zh: '实体名称，尽量直接使用原文中的稳定称呼；同一对象若同时出现全称、简称或缩写，应统一为一个名称。'
    - name: category
      type: str
      description:
        zh: '实体类型，应尽量使用清晰、稳定的名词类别，如人员、部门、组织、岗位、文件表单、证件、场所、设备、物品、时间要求、其他。'
    - name: description
      type: str
      description:
        zh: '用一句话说明该实体在当前规定中的含义或作用。'
      required: false
      default: ''
  relations:
    description:
      zh: '表达规定条文的超边。每条超边对应一条独立规定，由相关实体构成，action 负责概括这些实体之间被要求执行的行为。'
    fields:
    - name: ruleType
      type: str
      description:
        zh: '规定类型，用于概括该条规定在规定什么。优先使用：职责分工、行为要求、流程程序、其他。'
    - name: participants
      type: list[str]
      description:
        zh: '构成该条规定基本内容的实体名称列表，必须直接使用已提取节点的 name。只放实体，不要把动作短语放进 participants。'
    - name: action
      type: str
      description:
        zh: '该条规定涉及的核心行为概括，用 1 句话说明这些实体之间被要求执行什么行为。action 承担行为表达，不要把 action 再拆成实体。'
    - name: sourceClause
      type: str
      description:
        zh: '规定来源的条款编号、标题或出处标识，尽量写最近的编号或小节定位。'
      required: false
      default: ''

guideline:
  target:
    zh: '你是一位规定条文结构化分析专家。请从规定类文本中提取每条规定涉及的名词性要素，并用 action 写清这些要素之间被要求执行的行为。'
  rules_for_entities:
    zh:
    - '提取名词或名词短语形式的实体'
    - '优先提取规定中真正参与行为的要素，如人员、岗位、部门、组织、文件表单、证件、场所、设备、物品、时间要求等。根据文本的具体内容和你的知识来决定具体的类别。'
    - 'name 尽量保持原文中的稳定称呼；同一对象不要重复命名。'
    - '如果某个词只是行为本身，例如“登记”“审批”“填写交接记录”，不要单独作为实体。'
    - '对于“访客证”“登记表”“样品库”“前台”“每日18:00前”这类名词性短语，可以作为实体提取。'
    - 'category 要尽量使用少数、容易理解的类别，不要为了细分而临时创造模糊类别。'
  rules_for_relations:
    zh:
    - '每条超边只表达一条独立规定，并连接这条规定涉及的相关实体。'
    - 'ruleType 优先使用：职责分工、行为要求、流程程序、其他。根据文本的具体内容和你的知识来决定具体的类别。'
    - 'participants 必须直接引用已提取节点的 name，只放名词性实体，不放动作短语。'
    - 'action 用 1 句话概括这条规定要求这些实体之间发生什么行为。'
    - |
      完整示例（输入）：
      1. 访客进入样品库前，应在前台登记并领取访客证。
      2. 安全部门每日18:00前回收当日访客证，并存档登记表。
    - |
      完整示例（输出）：
      entities:
        - name: 访客
          category: 人员
          description: 进入样品库并需履行登记要求的外来人员。
        - name: 样品库
          category: 场所
          description: 访客进入前需要满足规定要求的区域。
        - name: 前台
          category: 场所
          description: 办理登记和领取访客证的地点。
        - name: 访客证
          category: 证件
          description: 访客登记后领取并在离开前回收的证件。
        - name: 安全部门
          category: 部门
          description: 负责回收访客证并保存记录的管理部门。
        - name: 登记表
          category: 文件表单
          description: 记录访客登记信息并需要存档的表单。
        - name: 每日18:00前
          category: 时间要求
          description: 安全部门执行回收和存档要求的截止时间要求。
      relations:
        - ruleType: 流程程序
          participants: [访客, 样品库, 前台, 访客证]
          action: 规定访客进入样品库前，应在前台登记并领取访客证。
          sourceClause: 1
        - ruleType: 流程程序
          participants: [安全部门, 访客证, 登记表, 每日18:00前]
          action: 规定安全部门每日18:00前回收当日访客证，并存档登记表。
          sourceClause: 2

identifiers:
  entity_id: name
  relation_id: '{sourceClause}|{ruleType}|{action}'
  relation_members: participants

options:
  extraction_mode: one_stage

display:
  entity_label: '{name} ({category})'
  relation_label: '[{ruleType}] {action}'
