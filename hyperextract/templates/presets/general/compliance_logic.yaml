language: zh
name: compliance_logic
type: hypergraph
tags: [general]
description:
  zh: '规定条文超图 - 面向制度、细则、办法、规范、指引、规程等规定类文本，提取条文中涉及的基本主体及其行为。'

output:
  description:
    zh: '由主体/行为节点和规定超边组成的结构化结果。节点只保留条文中的基本主体与行为；超边表示一条独立规定，并概括该规定在要求什么。'
  entities:
    description:
      zh: '规定涉及的基础节点。只提取主体和行为两类节点，不提取条件、结果、章节标题或整句规定。'
    fields:
    - name: name
      type: str
      description:
        zh: '实体名称，尽量直接使用原文中的稳定称呼；同一对象若同时出现全称、简称或缩写，应统一为一个名称。'
    - name: category
      type: str
      description:
        zh: '实体类型，只能是“主体、行为”两种。主体是人、部门、组织或角色；行为是主体执行、被要求执行或被禁止执行的动作短语。'
    - name: description
      type: str
      description:
        zh: '用一句话说明该主体或行为在条文中的含义。'
      required: false
      default: ''
  relations:
    description:
      zh: '表达规定条文的超边。每条超边对应一条独立规定，由相关主体和行为构成。'
    fields:
    - name: ruleType
      type: str
      description:
        zh: '规定类型，用于概括该条规定在规定什么。优先使用：职责分工、行为要求、流程程序、其他。'
    - name: participants
      type: list[str]
      description:
        zh: '构成该条规定基本内容的节点名称列表，必须直接使用已提取节点的 name。通常只包含主体和行为。'
    - name: action
      type: str
      description:
        zh: '该条规定涉及的核心行为概括，用 1 句话说明主体要做什么。'
    - name: sourceClause
      type: str
      description:
        zh: '规定来源的条款编号、标题或出处标识，尽量写最近的编号或小节定位。'
      required: false
      default: ''

guideline:
  target:
    zh: '你是一位规定条文结构化分析专家。请从规定类文本中提取每条规定涉及的基本主体，以及这些主体对应的行为。'
  rules_for_entities:
    zh:
    - '只提取两类节点：主体和行为。不要提取条件、结果、时间、范围、标题或概括性栏目名。'
    - '主体是人、部门、组织或角色；行为是主体执行、被要求执行或被禁止执行的动作短语。'
    - 'name 尽量保持原文中的稳定称呼；同一对象不要重复命名。'
    - '例1：原文“访客进入样品库前须登记”，可提取“访客(主体)”和“登记(行为)”。'
    - '例2：原文“值班工程师负责核对设备状态并填写交接记录”，可提取“值班工程师(主体)”和“核对设备状态并填写交接记录(行为)”。'
  rules_for_relations:
    zh:
    - '每条超边只表达一条独立规定，并连接相关主体和行为。'
    - 'ruleType 优先使用：职责分工、行为要求、流程程序、其他。'
    - 'participants 必须直接引用已提取节点的 name，通常只保留主体和行为。'
    - 'action 用 1 句话概括这条规定中主体要做的行为。'
    - '例1：原文“访客进入样品库前须登记”，可抽为 ruleType=流程程序，participants=[访客, 登记]，action=规定访客进入样品库前须登记。'
    - '例2：原文“值班工程师负责核对设备状态并填写交接记录”，可抽为 ruleType=职责分工，participants=[值班工程师, 核对设备状态并填写交接记录]，action=规定值班工程师负责核对设备状态并填写交接记录。'

identifiers:
  entity_id: name
  relation_id: '{sourceClause}|{ruleType}|{action}'
  relation_members: participants

options:
  extraction_mode: one_stage

display:
  entity_label: '{name} ({category})'
  relation_label: '[{ruleType}] {action}'
