name: "SurgicalEventGraph"
autotype: hypergraph
tag: [medicine]

language: zh

description:
  zh: "手术事件超图 - 将手术建模为连接 {医生, 部位, 术式, 器械} 共同参与的复杂事件"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称，如医生、部位、术式、器械等"
    - name: category
      type: "string"
      description:
        zh: "实体类型：医生、部位、术式、器械、麻醉方式等"
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false

edge_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "超边名称，如手术名称"
    - name: nodes
      type: "array"
      description:
        zh: "参与超边的节点列表"
    - name: date
      type: "string"
      description:
        zh: "手术日期"
    - name: duration
      type: "string"
      description:
        zh: "手术时长"
      required: false
    - name: details
      type: "string"
      description:
        zh: "详细描述，如手术过程"

guide:
  target:
    zh: |
      你是一位专业的外科医生，请从文本中提取手术事件及其相关实体，构建手术事件超图。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 超边连接2个或多个实体

  rules_for_nodes:
    zh: |
      - 医生：手术主刀医生及参与人员
      - 部位：手术部位
      - 术式：具体手术方式
      - 器械：使用的医疗器械

  rules_for_edges:
    zh: |
      - 一个超边代表一个完整的手术事件
      - 需要包含手术的时间、地点、参与人员等信息

identifiers:
  node_id: "name"
  edge_id: "name"
  edge_members: "nodes"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{name} ({date})"
