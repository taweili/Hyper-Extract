name: "HospitalCourseTimeline"
autotype: temporal_graph
tag: [medicine]

language: zh

description:
  zh: "住院病程时间轴 - 严格按时间顺序提取入院、检查、治疗、转归等节点"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "节点名称，如入院、检查、治疗、转归等"
    - name: category
      type: "string"
      description:
        zh: "节点类型：入院、检查、治疗、手术、转归、其他等"
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源节点"
    - name: target
      type: "string"
      description:
        zh: "目标节点"
    - name: eventType
      type: "string"
      description:
        zh: "事件类型：入院、检查、治疗、手术、转归等"
    - name: eventDate
      type: "string"
      description:
        zh: "事件日期，格式为年-月-日"
    - name: details
      type: "string"
      description:
        zh: "详细描述"
      required: false

guide:
  target:
    zh: |
      你是一位专业的医院管理人员，请从文本中严格按时间顺序提取入院、检查、治疗、转归等节点，构建住院病程时间轴。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体

  rules_for_nodes:
    zh: |
      - 医学术语保持原文

  rules_for_edges:
    zh: |
      - 记录事件之间的时间顺序关系

  rules_for_time:
    zh: |
      当前观察日期：{observation_time}

      1. 相对时间解析（基于观察日期）：
         - "去年" → {observation_time} 的前一年
         - "上月" → {observation_time} 的前一个月
         - "本季度" → {observation_time} 所在季度
         - "近期" → {observation_time} 最近 3 个月
         - "入院当天" → 使用入院日期
         - "术后第一天" → 手术日期的后一天

      2. 精确时间 → 保持原样
      3. 时间缺失 → 留空，不要猜测

identifiers:
  node_id: "name"
  edge_id: "{source}|{eventType}|{target}"
  edge_members:
    source: "source"
    target: "target"
  time_field: "eventDate"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{eventType} ({eventDate})"
