name: "ContraindicationList"
autotype: list
tag: [medicine]

language: zh

description:
  zh: "禁忌症清单 - 提取绝对禁忌（如孕妇、严重肾衰竭等）的明确列表"

item_schema:
  fields:
    - name: contraindication
      type: "string"
      description:
        zh: "禁忌症描述"
    - name: contraindicationType
      type: "string"
      description:
        zh: "禁忌症类型：绝对禁忌、相对禁忌等"
    - name: details
      type: "string"
      description:
        zh: "详细描述"
      required: false

guide:
  target:
    zh: |
      你是一位专业的临床药师，请从文本中提取绝对禁忌（如孕妇、严重肾衰竭等）的明确列表，构建禁忌症清单。

  rules:
    zh: |
      1. 提取所有禁忌症，包括绝对禁忌和相对禁忌
      2. 为每个禁忌症指定类型：绝对禁忌、相对禁忌等
      3. 为每个禁忌症添加详细描述（如果文本中提供）
      4. 保持禁忌症描述与原文一致

  rules_for_nodes:
    zh: |
      - 禁忌症名称保持原文
      - 医学术语保持原文

display:
  label: "{contraindication} ({contraindicationType})"
