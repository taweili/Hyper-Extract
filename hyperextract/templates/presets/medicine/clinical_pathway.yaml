name: "ClinicalPathway"
autotype: graph
tag: [medicine]

language: zh

description:
  zh: "临床路径图 - 提取 '如果症状A则检查B否则治疗C' 的决策树结构"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "节点名称，如症状、检查、治疗等"
    - name: category
      type: "string"
      description:
        zh: "节点类型：症状、检查、治疗、诊断、决策点等"
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源节点"
    - name: target
      type: "string"
      description:
        zh: "目标节点"
    - name: condition
      type: "string"
      description:
        zh: "条件描述，如如果症状A则"
    - name: details
      type: "string"
      description:
        zh: "详细描述"
      required: false

extraction_guide:
  target:
    zh: |
      你是一位专业的临床医生，请从文本中提取"如果症状A则检查B否则治疗C"的决策树结构，构建临床路径图。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体

  rules_for_nodes:
    zh: |
      - 医学专业术语保持原文，如检查项目名称、药物名称
      - 临床术语保持原文，如心电图、血常规

  rules_for_edges:
    zh: |
      - 条件描述应清晰表达决策逻辑

identifiers:
  node_id: "name"
  edge_id: "{source}|{condition}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{condition}"
