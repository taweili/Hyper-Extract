name: "LevelOfEvidence"
autotype: list
tag: [medicine]

language: zh

description:
  zh: "证据评级表 - 提取指南中的具体推荐意见及其对应的证据等级"

item_schema:
  fields:
    - name: topic
      type: "string"
      description:
        zh: "推荐主题，如血糖控制、血脂管理、阿司匹林使用等"
    - name: summary
      type: "string"
      description:
        zh: "推荐意见摘要，简短概括该推荐的核心内容，不超过10字"
    - name: recommendation
      type: "string"
      description:
        zh: "推荐意见"
    - name: evidenceLevel
      type: "string"
      description:
        zh: "证据等级，如A、B、C、1a、1b等"
    - name: recommendationLevel
      type: "string"
      description:
        zh: "推荐级别，如强推荐、弱推荐等"
    - name: details
      type: "string"
      description:
        zh: "详细描述"
      required: false

guide:
  target:
    zh: |
      你是一位专业的循证医学专家，请从文本中提取指南中的具体推荐意见及其对应的证据等级，构建证据评级表。

  rules:
    zh: |
      1. 提取所有推荐意见及其对应的证据等级
      2. 为每个推荐意见指定推荐主题（topic）
      3. 为每个推荐意见提取摘要（summary），不超过10字
      4. 为每个推荐意见指定推荐级别
      5. 为每个推荐意见添加详细描述（如果文本中提供）
      6. 保持推荐意见与原文一致

  rules_for_nodes:
    zh: |
      - 证据等级保持原文，如 A、B、C、1a、1b
      - 医学术语保持原文

display:
  label: "{topic} [{evidenceLevel}]"
