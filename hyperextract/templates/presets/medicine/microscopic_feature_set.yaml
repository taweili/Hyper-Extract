name: "MicroscopicFeatureSet"
autotype: set
tag: [medicine]

language: zh

description:
  zh: "微观特征集 - 提取免疫组化指标（如 HER2+, Ki67）及基因突变状态"

item_schema:
  fields:
    - name: featureName
      type: "string"
      description:
        zh: "特征名称，如免疫组化指标、基因突变等"
    - name: featureType
      type: "string"
      description:
        zh: "特征类型：免疫组化、基因突变、其他等"
    - name: value
      type: "string"
      description:
        zh: "特征值，如阳性、阴性、百分比等"
    - name: description
      type: "string"
      description:
        zh: "特征描述"
      required: false

guide:
  target:
    zh: |
      你是一位专业的病理学家，请从文本中提取免疫组化指标（如 HER2+, Ki67）及基因突变状态，构建微观特征集。

  rules:
    zh: |
      1. 提取所有免疫组化指标和基因突变状态
      2. 为每个特征指定类型：免疫组化、基因突变、其他等
      3. 为每个特征添加特征值，如阳性、阴性、百分比等
      4. 为每个特征添加简要描述（如果文本中提供）
      5. 保持特征名称与原文一致

  rules_for_nodes:
    zh: |
      - 免疫组化指标保持原文，如 HER2、Ki67、ER、PR
      - 基因突变名称保持原文，如 BRCA1、KRAS、TP53

identifiers:
item_id: "featureName"

display:
  label: "{featureName} ({featureType})"
