name: "AcupointLocationMap"
autotype: graph
tag: [tcm]

language: zh

description:
  zh: "腧穴空间定位 - 基于人体解剖标志提取穴位的相对位置关系（如 '脐旁2寸'）"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "穴位名称：如合谷、足三里、三阴交等"
      required: true
      default: ""
    - name: meridian
      type: "string"
      description:
        zh: "所属经脉"
      required: false
      default: ""
    - name: location
      type: "string"
      description:
        zh: "位置描述：如脐旁2寸、腕横纹上3寸等"
      required: false
      default: ""
    - name: indications
      type: "string"
      description:
        zh: "主治功能"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源穴位或解剖标志名称"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标穴位名称"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：位于"
      required: true
      default: ""
    - name: relativePosition
      type: "string"
      description:
        zh: "相对位置描述：如脐旁2寸、腕横纹上3寸等"
      required: true
      default: ""

guide:
  target:
    zh: |
      你是一位专业的针灸学专家，请从文本中提取穴位的相对位置关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 穴位：针灸特定位置，如合谷、足三里、三阴交
      6. 解剖标志：人体解剖部位，如腕横纹、第2掌骨
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 穴位：针灸特定位置
      4. 解剖标志：人体解剖部位
  rules_for_edges:
    zh: |
      1. 仅从已知穴位列表中提取边，不要创建未列出的穴位
      2. 关系描述应与原文保持一致

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name}"
  edge_label: "{relationType}: {relativePosition}"
