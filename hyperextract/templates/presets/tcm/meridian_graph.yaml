language: [zh, en]

name: meridian_graph
type: graph
tags: [tcm, meridian, acupuncture, acupoint]

description:
  zh: '经络流注图模板 - 从针灸学教材中提取穴位和经脉的关系'
  en: 'Meridian Flow Graph Template - Extract relationships between acupoints and meridians from acupuncture textbooks'

output:
  description:
    zh: '穴位和经脉的关系网络'
    en: 'Network of acupoint and meridian relationships'
  entities:
    description:
      zh: '穴位和经脉'
      en: 'Acupoints and meridians'
    fields:
      - name: name
        type: str
        description:
          zh: '穴位或经脉名称'
          en: 'Acupoint or meridian name'
        required: true
      - name: type
        type: str
        description:
          zh: '实体类型：穴位/经脉'
          en: 'Entity type: acupoint/meridian'
        required: true
      - name: location
        type: str
        description:
          zh: '位置描述'
          en: 'Location description'
        required: false
  relations:
    description:
      zh: '穴位和经脉的归属和流注关系'
      en: 'Belonging and flow relationships between acupoints and meridians'
    fields:
      - name: source
        type: str
        description:
          zh: '源实体'
          en: 'Source entity'
        required: true
      - name: target
        type: str
        description:
          zh: '目标实体'
          en: 'Target entity'
        required: true
      - name: type
        type: str
        description:
          zh: '关系类型：located_on/flows_to'
          en: 'Relation type: located_on/flows_to'
        required: true

guideline:
  target:
    zh: '你是一位专业的针灸学专家，负责从针灸学教材中准确提取穴位和经脉的关系。'
    en: 'You are a professional acupuncture expert responsible for accurately extracting relationships between acupoints and meridians from acupuncture textbooks.'
  rules_for_entities:
    zh:
      - '提取穴位名称作为实体'
      - '提取经脉名称作为实体'
      - '位置描述应准确标注解剖位置'
    en:
      - 'Extract acupoint names as entities'
      - 'Extract meridian names as entities'
      - 'Location descriptions should accurately indicate anatomical positions'
  rules_for_relations:
    zh:
      - 'type为located_on表示穴位属于某经脉'
      - 'type为flows_to表示经脉的流注顺序'
    en:
      - 'type located_on indicates acupoint belongs to a meridian'
      - 'type flows_to indicates the flow sequence of meridians'

identifiers:
  entity_id: name
  relation_id: '{source}|{type}|{target}'
  relation_members:
    source: source
    target: target

display:
  entity_label: '{name}'
  relation_label: '{type}'
