name: "PrescriptionModification"
autotype: hypergraph
tag: [tcm]

language: zh

description:
  zh: "处方加减逻辑 - 提取基于特定证型或症状对基础方剂进行的药物加减（如'随证加减'）"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "实体类型：基础方、药物、证型、症状"
      required: true
      default: ""

edge_schema:
  fields:
    - name: baseFormula
      type: "string"
      description:
        zh: "基础方剂名称"
      required: true
      default: ""
    - name: condition
      type: "string"
      description:
        zh: "加减条件（证型或症状）"
      required: true
      default: ""
    - name: modificationType
      type: "string"
      description:
        zh: "加减类型：加、减、替换"
      required: true
      default: ""
    - name: herbs
      type: "array"
      description:
        zh: "加减药物列表"
      required: true
      default: ""
    - name: reason
      type: "string"
      description:
        zh: "加减原因"
      required: false
      default: ""
    - name: dosage
      type: "string"
      description:
        zh: "调整后的剂量"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的中医方剂专家，请从文本中提取处方加减的实体和超边结构。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 基础方：方剂名称，如桂枝汤、麻黄汤、小柴胡汤
      5. 药物：中药名称，如葛根、厚朴、杏仁、附子
      6. 证型/症状：临床表现，如项背强几几、喘、腹满痛
      7. 加减类型：加、减、替换
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 基础方：方剂名称，如桂枝汤、麻黄汤、小柴胡汤
      4. 药物：中药名称，如葛根、厚朴、杏仁、附子
      5. 证型/症状：临床表现，如项背强几几、喘、腹满痛
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 加减类型：加、减、替换（通过 modificationType 字段区分）

identifiers:
  node_id: "name"
  edge_id: "{baseFormula}|{condition}"
  edge_members:
    - "baseFormula"
    - "herbs"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{baseFormula} | {condition}"
