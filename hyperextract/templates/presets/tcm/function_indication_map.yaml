name: "FunctionIndicationMap"
autotype: graph
tag: [tcm]

language: zh

description:
  zh: "主治功效映射 - 关联 方剂 -> 功能（如清热解毒） -> 主治证候"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "实体类型：方剂、功能、主治证候"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源实体"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标实体"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：具有功能、主治"
      required: true
      default: ""
    - name: details
      type: "string"
      description:
        zh: "详细描述"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的方剂学专家，请从文本中提取方剂、功能和主治证候之间的关联关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 方剂：如桂枝汤、麻黄汤
      6. 功能：如解肌发表、清热解毒
      7. 主治证候：如太阳中风、外感风寒
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 方剂：如桂枝汤、麻黄汤
      4. 功能：如解肌发表、清热解毒
      5. 主治证候：如太阳中风、外感风寒
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 关系类型：具有功能、主治

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{relationType}"
