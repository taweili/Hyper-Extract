language: [zh, en]

name: formula_composition
type: hypergraph
tags: [tcm, formula, prescription, composition]

description:
  zh: '方剂组成图模板 - 从经典方剂著作中提取方剂的组成和配伍关系'
  en: 'Formula Composition Graph Template - Extract formula composition and compatibility from classical formula texts'

output:
  description:
    zh: '方剂的组成和配伍关系'
    en: 'Formula composition and compatibility relationships'
  entities:
    description:
      zh: '方剂和药材'
      en: 'Formulas and herbs'
    fields:
      - name: name
        type: str
        description:
          zh: '方剂或药材名称'
          en: 'Formula or herb name'
        required: true
      - name: type
        type: str
        description:
          zh: '实体类型：方剂/药材'
          en: 'Entity type: formula/herb'
        required: true
      - name: description
        type: str
        description:
          zh: '说明'
          en: 'Description'
        required: false
  relations:
    description:
      zh: '方剂中药材的角色和配伍关系'
      en: 'Herb roles and compatibility in formulas'
    fields:
      - name: formula
        type: str
        description:
          zh: '方剂名称'
          en: 'Formula name'
        required: true
      - name: herb
        type: str
        description:
          zh: '药材名称'
          en: 'Herb name'
        required: true
      - name: role
        type: str
        description:
          zh: '药材角色：君/臣/佐/使'
          en: 'Herb role: sovereign/minister/assistant/envoy'
        required: true
      - name: dosage
        type: str
        description:
          zh: '剂量'
          en: 'Dosage'
        required: false
      - name: type
        type: str
        description:
          zh: '关系类型：contains/antagonizes'
          en: 'Relation type: contains/antagonizes'
        required: true

guideline:
  target:
    zh: '你是一位专业的中医药学家，负责从经典方剂著作中准确提取方剂的组成和配伍关系。'
    en: 'You are a professional traditional Chinese medicine scholar responsible for accurately extracting formula composition and compatibility from classical formula texts.'
  rules_for_entities:
    zh:
      - '提取方剂名称作为实体'
      - '提取方剂中的药材作为实体'
      - '角色分类应遵循中医方剂学理论'
    en:
      - 'Extract formula names as entities'
      - 'Extract herbs in formulas as entities'
      - 'Role classification should follow TCM formula theory'
  rules_for_relations:
    zh:
      - 'type为contains表示药材属于某方剂'
      - 'type为antagonizes表示相恶相反的配伍禁忌'
      - 'role字段应准确标注君臣佐使角色'
    en:
      - 'type contains indicates herb belongs to a formula'
      - 'type antagonizes indicates incompatible compatibility'
      - 'Role field should accurately indicate sovereign/minister/assistant/envoy role'

identifiers:
  entity_id: name
  relation_id: '{formula}|{type}|{herb}'
  relation_members: herb

display:
  entity_label: '{name}'
  relation_label: '{role}'
