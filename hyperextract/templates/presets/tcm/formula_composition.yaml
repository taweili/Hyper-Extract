name: "FormulaComposition"
autotype: hypergraph
tag: [tcm]

language: zh

description:
  zh: "君臣佐使结构图 - 将方剂建模为 {君药, 臣药, 佐药, 使药} 的层级化超边结构"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "药物名称"
      required: true
      default: ""
    - name: nature
      type: "string"
      description:
        zh: "性味，如：辛温、苦寒、甘平"
      required: false
      default: ""
    - name: meridian
      type: "string"
      description:
        zh: "归经，如：归肺经、归脾经、归心经"
      required: false
      default: ""
    - name: effect
      type: "string"
      description:
        zh: "功效，如：发汗解表、温通经脉、补气健脾"
      required: false
      default: ""

edge_schema:
  fields:
    - name: formulaName
      type: "string"
      description:
        zh: "方剂名称"
      required: true
      default: ""
    - name: source
      type: "string"
      description:
        zh: "方剂来源，如：伤寒论、金匮要略、方剂学教材"
      required: false
      default: ""
    - name: junHerbs
      type: "array"
      description:
        zh: "君药列表（包含药物名称、剂量、炮制方法）"
      required: false
      default: ""
    - name: chenHerbs
      type: "array"
      description:
        zh: "臣药列表（包含药物名称、剂量、炮制方法）"
      required: false
      default: ""
    - name: zuoHerbs
      type: "array"
      description:
        zh: "佐药列表（包含药物名称、剂量、炮制方法）"
      required: false
      default: ""
    - name: shiHerbs
      type: "array"
      description:
        zh: "使药列表（包含药物名称、剂量、炮制方法）"
      required: false
      default: ""
    - name: functions
      type: "array"
      description:
        zh: "方剂功能，如：解肌发表、调和营卫"
      required: false
      default: ""
    - name: indications
      type: "array"
      description:
        zh: "主治证候，如：外感风寒表虚证"
      required: false
      default: ""
    - name: decoctionMethod
      type: "string"
      description:
        zh: "煎服法，如：水煎服，日三服"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的方剂学专家，请从文本中提取方剂的君臣佐使结构。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 药物固有属性：性味、归经、功效（不随方剂变化）
      4. 药物在方剂中的属性：剂量、炮制方法、角色（君/臣/佐/使）
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 药物固有属性：性味、归经、功效
  rules_for_edges:
    zh: |
      1. 仅从已知药物列表中提取边，不要创建未列出的药物
      2. 关系描述应与原文保持一致
      3. 药物角色：君药、臣药、佐药、使药

identifiers:
  node_id: "name"
  edge_id: "formulaName"
  edge_members:
  - "junHerbs"
  - "chenHerbs"
  - "zuoHerbs"
  - "shiHerbs"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}"
  edge_label: "{formulaName}"
