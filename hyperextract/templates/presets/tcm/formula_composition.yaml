language: [zh, en]

name: formula_composition
type: hypergraph
tags: [tcm, formula, prescription, composition]

description:
  zh: '方剂组成图模板 - 从经典方剂著作中提取方剂的组成和配伍关系'
  en: 'Formula Composition Graph Template - Extract formula composition and compatibility from classical formula texts'

output:
  description:
    zh: '方剂的组成和配伍关系'
    en: 'Formula composition and compatibility relationships'
  entities:
    description:
      zh: '方剂和药材'
      en: 'Formulas and herbs'
    fields:
      - name: name
        type: str
        description:
          zh: '方剂或药材名称'
          en: 'Formula or herb name'
        required: true
      - name: type
        type: str
        description:
          zh: '实体类型：方剂/药材/剂型/功效/主治等'
          en: 'Entity type: formula/herb/dosage_form/efficacy/indication, etc.'
        required: true
      - name: description
        type: str
        description:
          zh: '说明'
          en: 'Description'
        required: false
  relations:
    description:
      zh: '方剂组成和配伍关系'
      en: 'Formula composition and compatibility'
    fields:
      - name: formula_name
        type: str
        description:
          zh: '方剂名称'
          en: 'Formula name'
        required: true
      - name: sovereigns
        type: list
        description:
          zh: '君药列表 - 主治主症的药物'
          en: 'Sovereign herbs - herbs addressing the main condition'
        required: true
      - name: ministers
        type: list
        description:
          zh: '臣药列表 - 辅助君药的药物'
          en: 'Minister herbs - herbs supporting the sovereign'
        required: true
      - name: assistants
        type: list
        description:
          zh: '佐药列表 - 配合治疗或减轻副作用的药物'
          en: 'Assistant herbs - herbs for synergy or reducing side effects'
        required: false
      - name: envoys
        type: list
        description:
          zh: '使药列表 - 引药入经或调和诸药的药物'
          en: 'Envoy herbs - herbs guiding the formula or harmonizing'
        required: false
      - name: total_dosage
        type: str
        description:
          zh: '方剂总剂量'
          en: 'Total formula dosage'
        required: false
      - name: indications
        type: str
        description:
          zh: '主治功效'
          en: 'Therapeutic indications'
        required: false

guideline:
  target:
    zh: '你是一位专业的中医药学家，负责从经典方剂著作中准确提取方剂的组成和配伍关系。'
    en: 'You are a professional traditional Chinese medicine scholar responsible for accurately extracting formula composition and compatibility from classical formula texts.'
  rules_for_entities:
    zh:
      - '提取方剂名称作为实体'
      - '提取方剂中的药材作为实体'
      - '角色分类应遵循中医方剂学理论'
    en:
      - 'Extract formula names as entities'
      - 'Extract herbs in formulas as entities'
      - 'Role classification should follow TCM formula theory'
  rules_for_relations:
    zh:
      - '每个方剂作为一个完整的超边，提取方剂名称作为formula_name'
      - '将药材按君臣佐使角色分别填入对应的列表字段'
      - '君药：主治主症的核心药物，必填且通常只有1味'
      - '臣药：辅助君药的药物，至少1味'
      - '佐药：配合治疗或减轻副作用的药物，可选'
      - '使药：引药入经或调和诸药的药物，可选'
      - '若方剂仅标注君臣药，应将对应列表置空而非删除字段'
      - '提取总剂量和主治功效以完善方剂信息'
    en:
      - 'Extract each formula as a complete hyperedge with formula_name'
      - 'Partition herbs into corresponding lists by sovereign/minister/assistant/envoy roles'
      - 'Sovereign: Core herbs addressing the main condition, required, usually 1 herb'
      - 'Minister: Supporting herbs for the sovereign, at least 1 required'
      - 'Assistant: Herbs for synergy or reducing side effects, optional'
      - 'Envoy: Herbs guiding the formula or harmonizing, optional'
      - 'If a formula only specifies sovereign and minister herbs, leave corresponding lists empty rather than deleting fields'
      - 'Extract total dosage and therapeutic indications to complete formula information'

identifiers:
  entity_id: name
  relation_id: '{formula_name}'
  relation_members: [sovereigns, ministers, assistants, envoys]

display:
  entity_label: '{name}'
  relation_label: '{formula_name}'
