name: "PulseTongueRecord"
autotype: list
tag: [tcm]

language: zh

description:
  zh: "舌脉特征提取 - 结构化提取舌象（质、苔）与脉象描述，用于统计分析"

item_schema:
  fields:
    - name: type
      type: "string"
      description:
        zh: "特征类型：舌象、脉象"
      required: true
      default: ""
    - name: subType
      type: "string"
      description:
        zh: "子类型：如舌质、舌苔、脉位、脉率、脉势等"
      required: true
      default: ""
    - name: feature
      type: "string"
      description:
        zh: "具体特征描述，如淡红、薄白、浮、沉、迟、数等"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "详细描述"
      required: false
      default: ""
    - name: clinicalSignificance
      type: "string"
      description:
        zh: "临床意义"
      required: false
      default: ""
    - name: source
      type: "string"
      description:
        zh: "来源，如医案名称、章节等"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的中医诊断专家，请从文本中提取舌象和脉象的特征信息。
  rules:
    zh: |
      1. 提取所有舌象特征，包括舌质（颜色、形态）、舌苔（颜色、厚薄、干湿等）
      2. 提取所有脉象特征，包括脉位（浮、沉）、脉率（迟、数）、脉势（有力、无力）等
      3. 为每个特征指定类型和子类型
      4. 保持特征描述与原文一致
      5. 舌象描述解析：文言舌象常采用连写表述（如"舌淡红苔薄白"→拆分为舌质淡红、舌苔薄白）
      6. 脉象术语理解：文言脉象术语需准确识别（如"浮紧脉"→浮脉、紧脉）
      7. 复合特征拆分：文言中常将多个特征合并描述，需分别提取到对应字段

display:
  label: "{type} - {subType}"
