name: "SyndromeReasoningGraph"
autotype: hypergraph
tag: [tcm]

language: zh

description:
  zh: "辨证论治逻辑图 - 建模 {症状群} -> 证型 -> 治则 -> {处方} 的完整推理链条"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称，如症状、证型、治则、药物等"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "实体类型：症状、证型、治则、药物"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: nodes
      type: "array"
      description:
        zh: "参与推理的节点列表：[症状1, 症状2, ..., 证型, 治则, 药物1, 药物2, ...]"
      required: true
      default: ""
    - name: reasoningType
      type: "string"
      description:
        zh: "推理类型：辨证论治、随证加减"
      required: true
      default: ""
    - name: reasoningProcess
      type: "string"
      description:
        zh: "推理过程描述"
      required: false
      default: ""
    - name: source
      type: "string"
      description:
        zh: "推理来源，如医案名称、章节等"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的中医辨证论治专家，请从文本中提取中医实体和辨证论治推理逻辑作为超边。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 症状：临床表现，如发热、汗出、恶风
      5. 证型：疾病分类，如太阳中风、太阳伤寒
      6. 治则：治疗原则，如解肌发表、调和营卫
      7. 药物：中药名称，如桂枝、麻黄、杏仁
      8. 推理类型：辨证论治、随证加减
      9. 推理链条：症状群 → 证型 → 治则 → 处方
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 症状：临床表现，如发热、汗出、恶风
      4. 证型：疾病分类，如太阳中风、太阳伤寒
      5. 治则：治疗原则，如解肌发表、调和营卫
      6. 药物：中药名称，如桂枝、麻黄、杏仁
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 推理类型：辨证论治、随证加减
      4. 推理链条：症状群 → 证型 → 治则 → 处方

identifiers:
  node_id: "name"
  edge_id: "{reasoningType}|{nodes}"
  edge_members: "nodes"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{reasoningType}"
