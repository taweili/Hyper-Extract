name: "MeridianFlowGraph"
autotype: graph
tag: [tcm]

language: zh

description:
  zh: "经络流注图 - 提取十二经脉的循行路线及经气流注次序"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "经脉名称：如手太阴肺经、手阳明大肠经等"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "经脉类别：阴经、阳经"
      required: true
      default: ""
    - name: associatedOrgan
      type: "string"
      description:
        zh: "关联脏腑"
      required: false
      default: ""
    - name: circulationPath
      type: "string"
      description:
        zh: "循行路线"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源经脉名称"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标经脉名称"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：流注"
      required: true
      default: ""
    - name: flowOrder
      type: "int"
      description:
        zh: "流注次序"
      required: true
      default: "0"
    - name: connectionPoint
      type: "string"
      description:
        zh: "连接部位"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的经络学专家，请从文本中提取十二经脉的循行路线及经气流注次序。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 经脉：十二经脉，如手太阴肺经、手阳明大肠经
      6. 经脉类别：阴经、阳经
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 经脉：十二经脉
      4. 经脉类别：阴经、阳经
  rules_for_edges:
    zh: |
      1. 仅从已知经脉列表中提取边，不要创建未列出的经脉
      2. 关系描述应与原文保持一致
      3. 关系类型：流注

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "流注 #{flowOrder}"
