name: "CompatibilityNet"
autotype: graph
tag: [tcm]

language: zh

description:
  zh: "七情配伍网络 - 提取药物间的相须、相使、相畏、相杀、十八反十九畏关系"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "药物名称"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源药物"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标药物"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "配伍关系类型：相须、相使、相畏、相杀、相恶、相反、十八反、十九畏"
      required: true
      default: ""
    - name: effect
      type: "string"
      description:
        zh: "配伍效果描述"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的中药配伍专家，请从文本中提取药物间的配伍关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 配伍关系类型：相须、相使、相畏、相杀、相恶、相反、十八反、十九畏
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
  rules_for_edges:
    zh: |
      1. 仅从已知药物列表中提取边，不要创建未列出的药物
      2. 关系描述应与原文保持一致
      3. 配伍关系类型：相须、相使、相畏、相杀、相恶、相反、十八反、十九畏

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}"
  edge_label: "{relationType}"
