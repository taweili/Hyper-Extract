name: "FailureCaseGraph"
autotype: graph
tag: [industry]

language: zh

description:
  zh: "故障案例图谱 - 提取故障现象、原因、措施和教训，识别从发现到处理的完整故障演进链条"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "现象/措施等实体的名称"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "类别：现象、原因、措施、教训"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "对该实体内涵的进一步阐述和说明"
      required: false
      default: ""
    - name: equipment
      type: "string"
      description:
        zh: "涉及设备名称"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "上游环节名称"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "下游环节名称"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：导致、采取、产生、发现"
      required: true
      default: ""
    - name: time_sequence
      type: "string"
      description:
        zh: "时序关系：发现、分析、处理、总结"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位工业设备故障分析专家，请从文本中提取故障现象、原因、处理措施和经验教训。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 识别故障现象和异常表现
      6. 分析故障原因和根本原因
      7. 提取处理措施和解决方案
      8. 总结经验教训和改进建议
      9. 建立从发现到处理的完整链条
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 识别故障现象和异常表现
      4. 识别故障原因和根本原因
      5. 识别处理措施和解决方案
      6. 识别经验教训和改进建议
      7. 记录涉及的设备名称
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 识别从现象到原因的关联
      4. 识别从原因到措施的关联
      5. 识别从措施到教训的关联

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{relationType}"
