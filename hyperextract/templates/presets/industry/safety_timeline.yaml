name: "SafetyTimeline"
autotype: temporal_graph
tag: [industry]

language: zh

description:
  zh: "事故时序图 - 从事故调查报告中提取时间线，还原事故发生前后的操作与响应序列"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称"
      required: true
      default: ""
    - name: entity_type
      type: "string"
      description:
        zh: "类型：人员、设备、设施等"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源实体名称"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标实体名称"
      required: true
      default: ""
    - name: action
      type: "string"
      description:
        zh: "操作动作"
      required: true
      default: ""
    - name: timestamp
      type: "string"
      description:
        zh: "动作发生时间"
      required: false
      default: ""
    - name: location
      type: "string"
      description:
        zh: "发生位置"
      required: false
      default: ""
    - name: status
      type: "string"
      description:
        zh: "状态描述"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位工业安全事故调查专家，请从事故调查报告中提取时间线，还原事故发生前后的操作与响应序列。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 识别事故相关人员（操作工、班组长、安全员、管理人员）
      6. 识别相关设备（泵、电机、阀门、仪表）
      7. 识别操作动作（启动、停止、巡检、维修、发现异常）
      8. 识别环境状态（正常、异常、报警、危险）
  rules_for_nodes:
    zh: |
      1. 每个节点对应一个独立实体
      2. 实体名称与原文保持一致
      3. 人员、设备、设施、岗位、位置等
  rules_for_edges:
    zh: |
      1. source 和 target 都必须是已知实体列表中的节点
      2. 每个操作动作都必须提取为一条边
      3. 节点名称必须完全匹配
      4. 操作类型：启动、停止、开启、关闭、巡检、检查、排查、维修、检修、保养、发现、识别、报告、操作、使用、触发
  rules_for_time:
    zh: |
      当前观察日期：{observation_time}

      1. 相对时间解析（基于观察日期）：
         - "事故前30分钟" → {observation_time} 前30分钟
         - "当天上午" → {observation_time} 当天上午
         - "随后" → 接续前一事件

      2. 精确时间 → 保持原样
      3. 时间缺失 → 留空，不要猜测

identifiers:
  node_id: "name"
  edge_id: "{source}|{action}|{target}"
  edge_members:
    source: "source"
    target: "target"
  time_field: "timestamp"

parameters:
  extraction_mode: "two_stage"
  # observation_time 和 observation_location 由用户在运行时提供
  # 示例：TemplateFactory.create(config, llm, embedder, observation_time="2024-06-15")

display:
  node_label: "{name} ({entity_type})"
  edge_label: "{action} [{timestamp}]"
