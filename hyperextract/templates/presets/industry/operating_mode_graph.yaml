name: "OperatingModeGraph"
autotype: graph
tag: [industry]

language: zh

description:
  zh: "工况切换图谱 - 提取工况类型和切换条件，识别不同工况之间的切换条件和步骤"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称（如：自动运行模式、手动调试模式、待机模式、紧急停止模式、按下启动按钮、按下停止按钮、发生故障等）"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "类别：工况、条件。工况如自动运行、手动调试、待机等；条件如启动按钮、停止按钮、故障信号等"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "对该实体的描述"
      required: false
      default: ""
    - name: load_range
      type: "string"
      description:
        zh: "负荷范围（如：0-50%、50-80%、80-100%等），仅对工况类别有效"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源实体名称（工况或条件）"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标实体名称（工况或条件）"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：切换到、触发"
      required: true
      default: ""
    - name: transition_condition
      type: "string"
      description:
        zh: "切换条件（如：按下启动按钮、按下停止按钮、发生故障等）"
      required: false
      default: ""
    - name: transition_procedure
      type: "string"
      description:
        zh: "切换步骤"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位工业设备工况分析专家，请从文本中提取工况和条件实体，以及它们之间的关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 识别各种运行模式（工况），如自动运行、手动调试、待机、紧急停止等
      6. 识别各种触发条件，如按下启动按钮、按下停止按钮、发生故障等
      7. 识别每种工况的适用条件和负荷范围
      8. 提取工况之间的切换关系（切换到）
      9. 提取条件触发工况的关系（触发）
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 识别工况名称（如自动运行模式、手动调试模式、待机模式、紧急停止模式等）
      4. 识别条件名称（如按下启动按钮、按下停止按钮、发生故障、恢复正常等）
      5. 为每个实体指定类别（工况/条件）
      6. 记录每种工况的负荷范围
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 识别工况之间的切换关系（源工况 切换到 目标工况）
      4. 识别条件对工况的触发关系（条件 触发 目标工况）
      5. 关系类型使用 切换到 或 触发

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{relationType}"
