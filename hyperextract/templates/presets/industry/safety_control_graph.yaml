name: "SafetyControlGraph"
autotype: graph
tag: [industry]

language: zh

description:
  zh: "安全管控图谱 - 提取危险源、风险点和管控措施，构建安全管控关系，识别安全风险与管控责任的对应关系"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称（如：数控加工中心、烫伤风险、佩戴防护用品、安全主管等）"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "类别：危险源、风险点、管控措施、责任人"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "对该实体的描述"
      required: false
      default: ""
    - name: risk_level
      type: "string"
      description:
        zh: "风险等级：重大风险、较大风险、一般风险，仅对风险点类别有效"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源实体名称（危险源或风险点或管控措施）"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标实体名称（风险点或管控措施或责任人）"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：导致、需要、管控、负责"
      required: true
      default: ""
    - name: hazard_factor
      type: "string"
      description:
        zh: "危险因素（如：高温部件、旋转部件、高压液体等）"
      required: false
      default: ""
    - name: possible_consequence
      type: "string"
      description:
        zh: "可能导致后果（如：烫伤、机械伤害、触电等）"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位工业安全管理分析专家，请从文本中提取危险源、风险点和管控措施，构建安全管控关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 识别危险源（如数控加工中心、工业机械臂、冷却系统、液压站、电气控制柜等）
      6. 识别风险点（如烫伤风险、机械伤害风险、触电风险、摔伤风险等）
      7. 识别管控措施（如佩戴防护用品、设置安全围栏、定期检修、通风换气等）
      8. 识别责任人（如安全主管、设备负责人、班组长、电工等）
      9. 为风险点指定风险等级（重大风险、较大风险、一般风险）
      10. 建立从危险源→风险点→管控措施→责任人的完整管控链条
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 识别危险源名称（如数控加工中心、工业机械臂、冷却系统、液压站、电气控制柜等）
      4. 识别风险点名称（如烫伤风险、机械伤害风险、触电风险、摔伤风险等）
      5. 识别管控措施名称（如佩戴防护用品、设置安全围栏、定期检修、通风换气等）
      6. 识别责任人名称（如安全主管、设备负责人、班组长、电工等）
      7. 为每个实体指定类别（危险源/风险点/管控措施/责任人）
      8. 为风险点指定风险等级（重大风险、较大风险、一般风险）
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 识别从危险源到风险点的关联（关系类型：导致）
      4. 识别从风险点到管控措施的关联（关系类型：需要/管控）
      5. 识别从管控措施到责任人的关联（关系类型：负责）
      6. 记录危险因素和可能导致后果
      7. 关系类型使用：导致、需要、管控、负责

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({category})"
  edge_label: "{relationType}"
