name: "LitigationParticipantMap"
autotype: graph
tag: [legal]

language: zh

description:
  zh: "诉讼参与人图谱 - 提取原告、被告、第三人、代理律师及证人之间的关系"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "参与人姓名或名称"
      required: true
      default: ""
    - name: participant_type
      type: "string"
      description:
        zh: "参与人类型：原告、被告、第三人、委托诉讼代理人、法定代理人、证人、鉴定人、法官、合议庭成员"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "参与人角色描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源参与人姓名或名称"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标参与人姓名或名称"
      required: true
      default: ""
    - name: relation_type
      type: "string"
      description:
        zh: "关系类型：代理、代表、股东、董事、担保、上下级、同案当事人、敌对"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "关系描述"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的法律文书分析师，请从文本中提取诉讼参与人及其之间的关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的参与人，禁止将多个参与人合并为一个节点
      2. 参与人名称与原文保持一致
      3. 仅从已知参与人列表中提取边，不要创建未列出的参与人
      4. 关系描述应与原文保持一致
      5. 参与人类型：原告、被告、第三人、委托诉讼代理人、法定代理人、证人、鉴定人、法官、合议庭成员
      6. 关系类型：代理、代表、股东、董事、担保、上下级、同案当事人、敌对
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的参与人，禁止将多个参与人合并为一个节点
      2. 参与人名称与原文保持一致
      3. 参与人类型：原告、被告、第三人、委托诉讼代理人、法定代理人、证人、鉴定人、法官、合议庭成员
  rules_for_edges:
    zh: |
      1. 仅从已知参与人列表中提取边，不要创建未列出的参与人
      2. 关系描述应与原文保持一致
      3. 关系类型：代理、代表、股东、董事、担保、上下级、同案当事人、敌对

identifiers:
  node_id: "name"
  edge_id: "{source}|{relation_type}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({participant_type})"
  edge_label: "{relation_type}"
