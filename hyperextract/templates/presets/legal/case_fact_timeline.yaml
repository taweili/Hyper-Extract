name: "CaseFactTimeline"
autotype: temporal_graph
tag: [legal]

language: zh

description:
  zh: "案件事实时序图 - 展示法律关系的变化过程"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称，如原告、被告、合同、金钱、股权等"
      required: true
      default: ""
    - name: entity_type
      type: "string"
      description:
        zh: "实体类型：当事人、合同/协议、金钱、股权、证物、其他"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源实体名称"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标实体名称"
      required: true
      default: ""
    - name: event
      type: "string"
      description:
        zh: "法律行为或事件，如签订协议、支付投资款、分配红利、提起诉讼等"
      required: true
      default: ""
    - name: time_info
      type: "string"
      description:
        zh: "时间信息，统一格式为年-月-日（如2021-03-15）或年月（如2021-03）"
      required: false
      default: ""
    - name: description
      type: "string"
      description:
        zh: "事件详细描述"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的法律工作者，请从文本中提取案件相关的法律实体以及它们之间的法律行为。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 实体类型：当事人（原告、被告、第三人、法定代表人、委托诉讼代理人）、合同/协议（战略合作协议、补充协议、收益分配说明函等）、金钱（投资款、红利、违约金等）、股权（股份、股权等）
      6. 法律行为：签订协议、支付投资款、完成登记、召开股东会、分配红利、发送函件、提起诉讼等
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 实体类型：当事人、合同/协议、金钱、股权、证物、其他
      4. 当事人：原告、被告、第三人、法定代表人、委托诉讼代理人
      5. 合同/协议：战略合作协议、补充协议、收益分配说明函等
      6. 金钱：投资款、红利、违约金等
      7. 股权：股份、股权等
  rules_for_edges:
    zh: |
      1. 仅从已知法律实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 常见的法律行为：签订协议、支付投资款、完成登记、召开股东会、分配红利、发送函件、提起诉讼等
      4. 每个边表示一个法律行为，连接相关实体
  rules_for_time:
    zh: |
      当前观察日期：{observation_time}

      1. 相对时间解析（基于观察日期）
      2. 精确时间 → 转换为标准格式年-月-日
      3. 时间缺失 → 留空

identifiers:
  node_id: "name"
  edge_id: "{source}|{event}|{target}"
  edge_members:
    source: "source"
    target: "target"
  time_field: "time_info"

parameters:
  extraction_mode: "two_stage"
  # observation_time 和 observation_location 由用户在运行时提供
  # 示例：TemplateFactory.create(config, llm, embedder, observation_time="2024-06-15")

display:
  node_label: "{name}({entity_type})"
  edge_label: "{event} [{time_info}]"
