name: "LegalConceptOntology"
autotype: graph
tag: [legal]

language: zh

description:
  zh: "法律概念本体 - 提取法律术语的定义、上下位关系及法理阐释"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "法律概念名称，如过错、故意、过失、违法性"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "概念类型：原则、规则、学说、术语、法律依据"
      required: true
      default: ""
    - name: definition
      type: "string"
      description:
        zh: "概念的简要定义"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源概念名称"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标概念名称"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：上位概念、下位概念、相关联、对立、包含、依据"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "关系描述"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的法学专家，请从文本中提取所有法律概念以及它们之间的关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的概念，禁止将多个概念合并为一个节点
      2. 概念名称与原文保持一致
      3. 仅从已知概念列表中提取边，不要创建未列出的概念
      4. 关系描述应与原文保持一致
      5. 法律概念类型包括：原则、规则、学说、术语、法律依据
      6. 关系类型：上位概念、下位概念、相关联、对立、包含、依据
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的概念，禁止将多个概念合并为一个节点
      2. 概念名称与原文保持一致
      3. 法律概念类型包括：原则、规则、学说、术语、法律依据
      4. 常见的法律概念：过错、故意、过失、违法性、因果关系、举证责任等
  rules_for_edges:
    zh: |
      1. 仅从已知法律概念列表中提取边，不要创建未列出的概念
      2. 关系描述应与原文保持一致
      3. 上位概念：概念之间的层级包含关系
      4. 下位概念：概念之间的层级包含关系
      5. 相关联：概念之间存在逻辑关联
      6. 对立：概念之间存在对立关系
      7. 包含：一个概念包含另一个概念
      8. 依据：一个概念是另一个概念的依据

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}({category})"
  edge_label: "{relationType}"
