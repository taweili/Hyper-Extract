name: "HistoricalKnowledgeGraph"
autotype: graph
tag: [history]

language: zh

description:
  zh: "历史人物关系图 - 提取基础的人物关系（亲属、君臣、敌友）及事件因果"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "人物姓名"
    - name: title
      type: "string"
      description:
        zh: "身份或官职，如吴国大都督、刘备军师"
    - name: faction
      type: "string"
      description:
        zh: "所属阵营，如吴、蜀、魏"
    - name: description
      type: "string"
      description:
        zh: "人物简要描述，包括主要成就和特点"
      required: false

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源人物姓名"
    - name: target
      type: "string"
      description:
        zh: "目标人物姓名"
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：亲属、君臣、敌友、联盟、对手"
    - name: description
      type: "string"
      description:
        zh: "关系描述，描述两人之间的具体互动或关系详情"

extraction_guide:
  target:
    zh: |
      你是一位专业的历史学专家，请从文本中提取所有历史人物以及他们之间的关系。

  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致

  rules_for_nodes:
    zh: |
      - 历史人物要包含所属阵营信息

  rules_for_edges:
    zh: |
      - 亲属：血缘或姻亲关系
      - 君臣：君臣关系
      - 敌友：敌对或友好关系
      - 联盟：联盟关系
      - 对手：对手关系

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}({faction})"
  edge_label: "{relationType}"
