name: "SegmentPerformanceList"
autotype: list
tag: [finance]

language: zh

description:
  zh: "业务板块业绩列表 - 按业务板块提取营收和关键指标"

item_schema:
  fields:
    - name: segment_name
      type: "string"
      description:
        zh: "业务板块或地理区域名称（例如 '美洲'、'云服务'、'iPhone'）"
      required: true
      default: ""
    - name: segment_type
      type: "string"
      description:
        zh: "类型：'业务板块'、'地理区域'、'产品线'、'经营分部'"
      required: true
      default: ""
    - name: revenue
      type: "string"
      description:
        zh: "该期间的板块营收（例如 '482亿美元'）"
      required: false
      default: ""
    - name: operating_income
      type: "string"
      description:
        zh: "板块营业利润或经营利润"
      required: false
      default: ""
    - name: revenue_growth
      type: "string"
      description:
        zh: "同比或环比营收增长率（例如 '+12%'、'-3% 同比'）"
      required: false
      default: ""
    - name: key_metrics
      type: "array"
      description:
        zh: "板块特定的关键绩效指标（例如 ['订阅用户：2.3亿', 'ARPU：$14.99', '流失率：2.1%']）"
      required: false
      default: ""
    - name: commentary
      type: "string"
      description:
        zh: "管理层对板块业绩或展望的评论"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的财务分析师，请从 SEC 申报文件中提取每个业务板块或地理区域的业绩数据。
  rules:
    zh: |
      1. 每个条目对应一个独立的实体，禁止合并
      2. 实体名称与原文保持一致
      3. 提取每个可识别板块的营收和营业利润
      4. 捕获增长率和与前期的对比数据
      5. 提取板块特定的关键绩效指标和度量
      6. 保留管理层的板块评论

display:
  label: "{segment_name} ({segment_type}) | {revenue}"
