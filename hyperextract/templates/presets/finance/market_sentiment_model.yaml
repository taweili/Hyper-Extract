name: "MarketSentimentModel"
autotype: model
tag: [finance]

language: zh

description:
  zh: "市场情绪模型 - 从财经新闻中提取情绪极性、提及实体和预期价格影响"

schema:
  fields:
    - name: headline
      type: "string"
      description:
        zh: "新闻文章/评论的标题/主题"
      required: true
      default: ""
    - name: source
      type: "string"
      description:
        zh: "出版物或来源（例如 '彭博社'、'路透社'、'CNBC'）"
      required: false
      default: ""
    - name: publication_date
      type: "string"
      description:
        zh: "发布日期"
      required: false
      default: ""
    - name: overall_sentiment
      type: "string"
      description:
        zh: "整体情绪：看涨、看跌、中性、混合"
      required: false
      default: ""
    - name: sentiment_confidence
      type: "string"
      description:
        zh: "情绪评估的置信度：高、中、低"
      required: false
      default: ""
    - name: mentioned_tickers
      type: "array"
      description:
        zh: "提及的股票代码（例如 ['AAPL', 'MSFT', 'GOOGL']）"
      required: false
      default: ""
    - name: mentioned_sectors
      type: "array"
      description:
        zh: "涉及的行业板块（例如 ['科技', '金融', '能源']）"
      required: false
      default: ""
    - name: key_events
      type: "array"
      description:
        zh: "驱动情绪的关键事件（例如 ['美联储利率决议', 'NVDA 财报超预期']）"
      required: false
      default: ""
    - name: expected_impact
      type: "string"
      description:
        zh: "预期的价格/市场影响（例如 '科技股短期上行'、'板块轮动可能性大'）"
      required: false
      default: ""
    - name: time_horizon
      type: "string"
      description:
        zh: "隐含时间范围：'盘中'、'短期'、'中期'、'长期'"
      required: false
      default: ""
    - name: contrarian_signals
      type: "array"
      description:
        zh: "任何逆向或不同意见的观点"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的金融情绪分析师，请从财经新闻文章或市场评论中提取情绪快照。
  rules:
    zh: |
      1. 每个对象对应一个独立的实体，禁止合并
      2. 实体名称与原文保持一致
      3. 判断整体情绪极性（看涨/看跌/中性/混合）
      4. 识别所有提及的股票代码和行业板块
      5. 提取驱动情绪的关键事件
      6. 评估预期市场影响和时间范围
      7. 记录任何逆向或不同意见的观点

display:
  label: "{headline}"
