name: "ProceedsUsage"
autotype: list
tag: [finance]

language: zh

description:
  zh: "募集资金用途列表 - 从 IPO 招股说明书中提取募集资金分配计划"

item_schema:
  fields:
    - name: use_category
      type: "string"
      description:
        zh: "资金用途类别（例如'研发投入'、'偿还债务'、'营运资金'、'收购'、'资本支出'、'一般企业用途'）"
      required: true
      default: ""
    - name: project_name
      type: "string"
      description:
        zh: "具体项目或计划名称（例如'弗吉尼亚新数据中心'、'平台 2.0 开发'）"
      required: false
      default: ""
    - name: allocated_amount
      type: "string"
      description:
        zh: "分配金额（例如'1.5 亿美元'、'约占净募集资金的 30%'）"
      required: false
      default: ""
    - name: percentage_of_proceeds
      type: "string"
      description:
        zh: "占总募集资金的百分比（例如'30%'、'约三分之一'）"
      required: false
      default: ""
    - name: timeline
      type: "string"
      description:
        zh: "预计资金使用时间表（例如'12-18 个月'、'2025-2026 财年'）"
      required: false
      default: ""
    - name: description
      type: "string"
      description:
        zh: "资金具体使用方式的详细说明"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的 IPO 分析师，请从招股说明书中提取所有募集资金用途分配信息。
  rules:
    zh: |
      1. 每个条目对应一个独立的实体，禁止合并
      2. 实体名称与原文保持一致
      3. 提取每一项资金用途类别和具体项目
      4. 捕捉分配金额和百分比
      5. 提取资金使用时间表（如有说明）
      6. 保留资金使用方式的详细描述

display:
  label: "{use_category}: {allocated_amount}"
