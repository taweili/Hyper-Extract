language: [zh, en]

name: event_timeline
type: temporal_graph
tags: [finance, event, timeline, corporate-events]

description:
  zh: '重大事件时间线模板 - 从8-K报告、新闻稿和公司公告中提取公司重大事件的时间线'
  en: 'Major Events Timeline Template - Extract corporate major event timelines from 8-K reports, press releases, and company announcements'

output:
  description:
    zh: '公司重大事件的时间顺序和因果关系'
    en: 'Temporal order and causal relationships of corporate major events'
  entities:
    description:
      zh: '公司及其相关事件'
      en: 'Company and related events'
    fields:
      - name: name
        type: str
        description:
          zh: '公司或事件名称'
          en: 'Company or event name'
        required: true
      - name: entity_type
        type: str
        description:
          zh: '实体类型：公司/事件/公告/产品发布/并购重组/融资/诉讼/监管处罚等'
          en: 'Entity type: company/event/announcement/product_launch/m_a/financing/litigation/regulatory_penalty, etc.'
        required: true
  relations:
    description:
      zh: '事件之间的时间顺序和因果关系'
      en: 'Temporal sequence and causal relationships between events'
    fields:
      - name: source
        type: str
        description:
          zh: '源实体名称'
          en: 'Source entity name'
        required: true
      - name: target
        type: str
        description:
          zh: '目标实体名称'
          en: 'Target entity name'
        required: true
      - name: type
        type: str
        description:
          zh: '关系类型：先于/导致/触发/回应/依据等'
          en: 'Relation type: precedes/causes/triggers/responds_to/based_on, etc.'
        required: true
      - name: time
        type: str
        description:
          zh: '事件发生时间。例如：2024-01-15/2024年第一季度/公告发布日等'
          en: 'Event occurrence time. Examples: 2024-01-15/Q1_2024/announcement_date, etc.'
        required: true
      - name: description
        type: str
        description:
          zh: '事件说明，包括是否构成重大事项'
          en: 'Event description, including whether it constitutes a material event'
        required: false

guideline:
  target:
    zh: '你是一位专业的企业事件分析师，负责从公司披露文件中提取重大事件并构建时间线。'
    en: 'You are a professional corporate events analyst responsible for extracting major events and constructing timelines from company disclosure documents.'
  rules_for_entities:
    zh:
      - '提取公司名称作为核心实体'
      - '提取具有重大意义的事件作为实体'
      - '事件类型应反映事件的性质（公告/评级调整/业绩发布等）'
    en:
      - 'Extract company name as the core entity'
      - 'Extract events of significant meaning as entities'
      - 'Event type should reflect the nature of the event (announcement/rating adjustment/earnings release, etc.)'
  rules_for_relations:
    zh:
      - 'type为"先于"表示事件的时间先后顺序'
      - 'type为"导致"表示因果关联'
      - 'type为"触发"表示触发关系'
      - '仅提取文本中明确说明的关系'
      - 'description中应说明事件是否构成重大事项'
    en:
      - 'type precedes indicates temporal sequence of events'
      - 'type causes indicates causal connection'
      - 'type triggers indicates triggering relationship'
      - 'Only extract explicitly stated relationships in the text'
      - 'Description should indicate whether the event constitutes a material event'

identifiers:
  entity_id: name
  relation_id: '{source}|{type}|{target}|{time}'
  relation_members:
    source: source
    target: target
  time_field: time

display:
  entity_label: '{name}'
  relation_label: '{type}'
