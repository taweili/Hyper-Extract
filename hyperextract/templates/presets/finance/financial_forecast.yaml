name: "FinancialForecast"
autotype: list
tag: [finance]

language: zh

description:
  zh: "财务预测 - 从股票研究报告中提取预测财务数据"

item_schema:
  fields:
    - name: metric
      type: "string"
      description:
        zh: "被预测的财务指标（例如 '收入'、'每股收益'、'EBITDA'、'营业利润率'、'自由现金流'）"
      required: true
      default: ""
    - name: period
      type: "string"
      description:
        zh: "预测期间（例如 'FY2025E'、'Q1 2025E'、'CY2026E'）"
      required: true
      default: ""
    - name: estimate
      type: "string"
      description:
        zh: "预测值（例如 '$120.5B'、'$6.25'、'35.2%'）"
      required: true
      default: ""
    - name: prior_estimate
      type: "string"
      description:
        zh: "如有修订，之前的预测值（例如 '$115.0B'）"
      required: false
      default: ""
    - name: consensus
      type: "string"
      description:
        zh: "用于对比的市场一致性预期（例如 '$118.2B'）"
      required: false
      default: ""
    - name: growth_rate
      type: "string"
      description:
        zh: "隐含增长率（例如 '同比+15%'、'持平'）"
      required: false
      default: ""
    - name: assumptions
      type: "string"
      description:
        zh: "预测所依据的关键假设（例如 '假设销量增加 500 万台'）"
      required: false
      default: ""
    - name: source_firm
      type: "string"
      description:
        zh: "提供该预测的研究机构"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的金融分析师，请从文本中提取所有财务预测和估算。
  rules:
    zh: |
      1. 每个条目对应一个独立的实体，禁止合并
      2. 实体名称与原文保持一致
      3. 提取每个预测指标及其对应的具体时间段
      4. 在注明修订时，同时捕获当前和之前的预测值
      5. 在进行对比时提取一致性预期
      6. 捕获增长率和关键假设

display:
  label: "{metric} ({period}): {estimate}"
