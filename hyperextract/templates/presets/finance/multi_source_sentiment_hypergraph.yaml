name: "MultiSourceSentimentHypergraph"
autotype: hypergraph
tag: [finance]

language: zh

description:
  zh: "多源情绪超图 - 整合多个来源的情绪信号"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "来源或实体的名称（例如：'彭博社文章'、'高盛分析师报告'、'AAPL'、'科技板块'）"
      required: true
      default: ""
    - name: source_type
      type: "string"
      description:
        zh: "类型：'新闻文章'、'分析师报告'、'社交媒体'、'市场数据'、'公司公告'、'受影响实体'、'板块'、'指数'"
      required: true
      default: ""
    - name: sentiment_signal
      type: "string"
      description:
        zh: "该来源的个别情绪：'看涨'、'看跌'、'中性'"
      required: false
      default: ""
    - name: credibility
      type: "string"
      description:
        zh: "来源可信度评估：'一级'、'二级'、'未验证'"
      required: false
      default: ""

edge_schema:
  fields:
    - name: fusion_name
      type: "string"
      description:
        zh: "描述性名称（例如：'AAPL 来自 3 个来源的看涨共识'）"
      required: true
      default: ""
    - name: participating_sources
      type: "array"
      description:
        zh: "参与此融合的所有来源和受影响实体的名称"
      required: true
      default: ""
    - name: aggregated_polarity
      type: "string"
      description:
        zh: "融合情绪：'强烈看涨'、'看涨'、'中性'、'看跌'、'强烈看跌'、'冲突'"
      required: true
      default: ""
    - name: agreement_level
      type: "string"
      description:
        zh: "来源一致性：'一致'、'多数'、'分裂'、'矛盾'"
      required: true
      default: ""
    - name: affected_entity
      type: "string"
      description:
        zh: "情绪适用的主要实体（股票代码或板块）"
      required: false
      default: ""
    - name: signal_strength
      type: "string"
      description:
        zh: "交易用的整体信号强度：'可操作'、'参考性'、'噪音'"
      required: false
      default: ""
    - name: conflicting_views
      type: "string"
      description:
        zh: "任何不同或冲突的情绪信号摘要"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的多源情绪融合分析师，请从不同来源提取情绪信号并创建聚合情绪视图。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 识别每个不同的情绪来源（新闻、分析师报告、社交媒体）
      4. 提取每个来源的个别情绪信号
      5. 创建连接来源到受影响实体的聚合情绪超边
      6. 评估各来源之间的一致性
      7. 记录冲突观点和信号强度
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 识别新闻文章、分析师报告和社交媒体帖子
      4. 识别受影响实体（股票代码、板块、指数）
      5. 捕捉每个来源的个别情绪
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 每条超边连接多个来源到一个受影响实体
      4. 评估聚合情绪极性和一致性水平
      5. 评估交易用途的信号强度
      6. 记录任何冲突观点

identifiers:
  node_id: "name"
  edge_id: "fusion_name"
  edge_members: "participating_sources"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({source_type})"
  edge_label: "{fusion_name}"
