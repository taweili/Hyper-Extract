name: "CompanyHistoryTimeline"
autotype: temporal_graph
tag: [finance]

language: zh

description:
  zh: "公司历史时间线 - 从招股说明书或公司历史文档中提取里程碑事件"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称"
      required: true
      default: ""
    - name: type
      type: "string"
      description:
        zh: "实体类型：公司、创始人、投资机构等"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "事件主体/相关实体"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "事件对象/相关实体"
      required: true
      default: ""
    - name: eventType
      type: "string"
      description:
        zh: "事件类型：成立、融资、并购、IPO、裁员、发布产品、管理层变更、股权变更、获得专利、获奖"
      required: true
      default: ""
    - name: eventDate
      type: "string"
      description:
        zh: "事件日期，格式为年-月-日或年份"
      required: false
      default: ""
    - name: details
      type: "string"
      description:
        zh: "事件详细描述"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的公司历史分析师，请从文本中提取公司相关的实体以及里程碑事件。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建新的实体
      4. 关系描述应与原文保持一致
      5. 仅提取与公司历史直接相关的核心实体
      6. 重点关注：本公司、子公司、创始人、投资机构
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅提取与公司历史直接相关的核心实体
      4. 重点关注：本公司、子公司、创始人、投资机构
      5. 实体类型：公司、创始人、投资机构
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取事件，不要创建未列出的实体
      2. 时间信息为可选，仅在文本中明确提及时才提取
      3. source 和 target 只能是单个实体，不能是多个实体的拼接
      4. 如果多个主体参与同一事件，应为每个主体创建独立的边
      5. 事件类型：成立、融资、并购、IPO、裁员、发布产品、管理层变更、股权变更、获得专利、获奖
  rules_for_time:
    zh: |
      当前观察日期：{observation_time}
      
      1. 相对时间解析（基于观察日期）：
         - "去年" → {observation_time} 前一年
         - "今年" → {observation_time} 所属年份
         - "明年" → {observation_time} 后一年
         - "五年前" → {observation_time} 前五年
         - "最近" → {observation_time} 前1年
      
      2. 明确日期：保持原格式
         - 年份（如 2015年）→ 2015
         - 年-月-日 → 保持原格式
      
      3. 缺失时间：留空

identifiers:
  node_id: "name"
  edge_id: "{source}|{eventType}|{details}"
  edge_members:
    source: "source"
    target: "target"
  time_field: "eventDate"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({type})"
  edge_label: "{eventType} ({eventDate})"
