name: "SupplyChainGraph"
autotype: graph
tag: [finance]

language: zh

description:
  zh: "供应链图谱 - 从 SEC 申报文件中提取供应链实体及其关系"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称（公司或供应商）"
      required: true
      default: ""
    - name: entity_type
      type: "string"
      description:
        zh: "类型：客户、供应商、战略伙伴、分销商、本公司"
      required: true
      default: ""
    - name: details
      type: "string"
      description:
        zh: "地理管辖区、认证信息及合规说明"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "上游供应商或提供方"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "下游买方或需求方"
      required: true
      default: ""
    - name: relationship_type
      type: "string"
      description:
        zh: "类型：供应、采购、分销、战略合作"
      required: true
      default: ""
    - name: product_service
      type: "string"
      description:
        zh: "被供应或交易的内容，例如锂芯片、物流服务等"
      required: true
      default: ""

guide:
  target:
    zh: |
      你是一位专业的供应链分析师，请从文本中提取供应链实体及其关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 识别供应商、客户和伙伴
      6. 提取交易类型及产品
      7. 将依赖度、交易量及地缘政治风险汇总
  rules_for_nodes:
    zh: |
      1. 每个节点对应一个独立实体
      2. 实体名称与原文保持一致
      3. 识别公司及合作伙伴
      4. 分类角色（客户、供应商、战略伙伴、分销商）
      5. 记录地区及认证至 details
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 通过产品/服务连接实体
      4. 综合评估依赖度、交易量及风险（关税、单一来源）

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationship_type}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "one_stage"

display:
  node_label: "{name} ({entity_type})"
  edge_label: "{relationship_type}"
