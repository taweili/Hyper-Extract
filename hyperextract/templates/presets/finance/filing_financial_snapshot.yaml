name: "FilingFinancialSnapshot"
autotype: model
tag: [finance]

language: zh

description:
  zh: "财报财务快照 - 从 SEC 申报文件中提取关键财务数据"

schema:
  fields:
    - name: company_name
      type: "string"
      description:
        zh: "申报实体的法定名称"
      required: false
      default: ""
    - name: ticker
      type: "string"
      description:
        zh: "股票代码（例如 'AAPL'、'MSFT'）"
      required: false
      default: ""
    - name: filing_type
      type: "string"
      description:
        zh: "申报类型：'10-K'、'10-Q'、'8-K'、'20-F'"
      required: false
      default: ""
    - name: filing_period
      type: "string"
      description:
        zh: "涵盖的财务期间（例如 'FY2024'、'Q3 2024'）"
      required: false
      default: ""
    - name: revenue
      type: "string"
      description:
        zh: "总营收或净销售额（例如 '3943亿美元'）"
      required: false
      default: ""
    - name: net_income
      type: "string"
      description:
        zh: "净利润"
      required: false
      default: ""
    - name: earnings_per_share
      type: "string"
      description:
        zh: "稀释每股收益（例如 '$6.13'）"
      required: false
      default: ""
    - name: total_assets
      type: "string"
      description:
        zh: "总资产"
      required: false
      default: ""
    - name: total_liabilities
      type: "string"
      description:
        zh: "总负债"
      required: false
      default: ""
    - name: shareholders_equity
      type: "string"
      description:
        zh: "股东权益"
      required: false
      default: ""
    - name: operating_cash_flow
      type: "string"
      description:
        zh: "经营活动现金流"
      required: false
      default: ""
    - name: free_cash_flow
      type: "string"
      description:
        zh: "自由现金流"
      required: false
      default: ""
    - name: key_metrics
      type: "array"
      description:
        zh: "其他关键财务指标列表（如毛利率、ROE、市盈率等）"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的财务分析师，请从 SEC 申报文件中提取关键财务数据。
  rules:
    zh: |
      1. 每个对象对应一个独立的实体，禁止合并
      2. 实体名称与原文保持一致
      3. 按报告原文提取精确的金额数据，保留单位（百万、十亿）
      4. 识别申报实体、股票代码、申报类型和财务期间
      5. 在可获取时同时提取最近期间和前期对比数据
      6. 捕获申报文件中明确列出的关键财务比率
      7. 使用表格中的精确数据；除非文件明确给出，否则不要计算衍生数值


display:
  label: "{company_name} ({ticker}) - {filing_period}"
