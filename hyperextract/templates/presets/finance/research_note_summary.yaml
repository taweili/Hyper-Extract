name: "ResearchNoteSummary"
autotype: model
tag: [finance]

language: zh

description:
  zh: "研究报告摘要 - 从股票研究报告中提取核心投资论点"

schema:
  fields:
    - name: company_name
      type: "string"
      description:
        zh: "被覆盖公司的名称"
      required: false
      default: ""
    - name: ticker
      type: "string"
      description:
        zh: "股票代码（例如 'AAPL'、'NVDA'）"
      required: false
      default: ""
    - name: analyst_name
      type: "string"
      description:
        zh: "首席分析师的姓名"
      required: false
      default: ""
    - name: research_firm
      type: "string"
      description:
        zh: "研究机构名称（例如 '高盛'、'摩根士丹利'）"
      required: false
      default: ""
    - name: report_date
      type: "string"
      description:
        zh: "报告发布日期"
      required: false
      default: ""
    - name: rating
      type: "string"
      description:
        zh: "分析师评级：'买入'、'增持'、'持有'、'中性'、'卖出'、'减持'"
      required: false
      default: ""
    - name: prior_rating
      type: "string"
      description:
        zh: "如有变更，之前的评级"
      required: false
      default: ""
    - name: target_price
      type: "string"
      description:
        zh: "当前目标价（例如 '$150.00'）"
      required: false
      default: ""
    - name: prior_target_price
      type: "string"
      description:
        zh: "如有变更，之前的目标价"
      required: false
      default: ""
    - name: current_price
      type: "string"
      description:
        zh: "报告发布时的股价"
      required: false
      default: ""
    - name: investment_thesis
      type: "string"
      description:
        zh: "核心投资论点或评级的关键论据"
      required: false
      default: ""
    - name: key_catalysts
      type: "array"
      description:
        zh: "已识别的近期催化剂（例如 ['Q4 业绩超预期', '新产品发布', '监管审批']）"
      required: false
      default: ""
    - name: key_risks
      type: "array"
      description:
        zh: "分析师强调的主要风险"
      required: false
      default: ""
    - name: revenue_estimate
      type: "string"
      description:
        zh: "分析师对当前/下一财年的收入预测"
      required: false
      default: ""
    - name: eps_estimate
      type: "string"
      description:
        zh: "分析师对当前/下一财年的每股收益预测"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的股票研究分析师，请从研究报告中提取核心投资论点、评级、目标价和关键论据。
  rules:
    zh: |
      1. 每个对象对应一个独立的实体，禁止合并
      2. 实体名称与原文保持一致
      3. 提取分析师的评级及任何评级变更
      4. 捕获目标价以及变更前的目标价（如有变更）
      5. 简洁地总结核心投资论点
      6. 列出分析师识别的关键催化剂和风险
      7. 在提及时提取财务预测（收入、每股收益）

display:
  label: "{ticker} - {rating} (目标价: {target_price})"
