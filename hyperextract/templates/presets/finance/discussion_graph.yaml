name: "DiscussionGraph"
autotype: graph
tag: [finance]

language: zh

description:
  zh: "财报会议讨论图谱 - 从财报电话会议中提取实体及关系"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "实体名称"
      required: true
      default: ""
    - name: type
      type: "string"
      description:
        zh: "实体类型：参会人员、公司、产品、指标、行业"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "实体描述/说明"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "源实体"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "目标实体"
      required: true
      default: ""
    - name: relation_type
      type: "string"
      description:
        zh: "关系类型"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "简要描述"
      required: false
      default: ""

guide:
  target:
    zh: |
      你是一位专业的财报会议分析师，请从文本中提取讨论中出现的实体以及它们之间的关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体
      2. 实体名称与原文保持一致
      3. 参会人员是核心，必须提取
      4. 实体类型：参会人员（分析师、管理层）、公司、产品、指标、行业等
      5. 关系类型：参会人员之间（提问、回答、追问、澄清、反问等）、参会人员与其他实体（提问关于、回答关于、看好、看衰、担忧、质疑等）、其他实体之间（竞争、合作、增长、下降等）
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将其合并为一个节点
      2. 实体名称与原文保持一致
      3. 参会人员：分析师、管理层（CEO、CFO等）
      4. 公司、产品、指标、行业
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 参会人员之间：提问、回答、追问、澄清、反问等
      4. 参会人员与其他实体：提问关于、回答关于、看好、看衰、担忧、质疑、主导、负责等
      5. 其他实体之间：竞争、合作、增长、下降等

identifiers:
  node_id: "name"
  edge_id: "{source}|{relation_type}|{target}"
  edge_members:
    source: "source"
    target: "target"

options:
  extraction_mode: "two_stage"

display:
  node_label: "{name} ({type})"
  edge_label: "{relation_type}"
