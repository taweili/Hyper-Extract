name: "BindingSiteModel"
autotype: model
tag: [biology]

language: zh

description:
  zh: "关键位点模型 - 从蛋白质结构文献中提取活性位点、结合位点的残基信息"

schema:
  fields:
    - name: protein_name
      type: "string"
      description:
        zh: "蛋白质名称，如β2-肾上腺素受体"
    - name: site_type
      type: "string"
      description:
        zh: "位点类型：活性位点、结合位点、修饰位点、别构位点"
    - name: residue_numbers
      type: "string"
      description:
        zh: "关键残基编号范围，如Asp169-Lys210"
    - name: residue_details
      type: "array"
      description:
        zh: "关键残基详情列表"
    - name: chemical_properties
      type: "string"
      description:
        zh: "化学性质描述，如疏水口袋、氢键网络、金属离子结合位点"
    - name: function_annotation
      type: "string"
      description:
        zh: "功能注解，如配体识别、底物特异性、信号转导"
    - name: ligand_info
      type: "string"
      description:
        zh: "配体信息，如结合的配体分子或药物"
      required: false

extraction_guide:
  target:
    zh: |
      你是一位专业的结构生物学专家，请从文本中提取蛋白质的关键位点信息。

  rules:
    zh: |
      1. 识别文本中描述的核心蛋白质及其位点
      2. 提取位点的类型（活性位点、结合位点、修饰位点等）
      3. 提取关键残基的编号、化学性质和功能
      4. 数据必须与原文保持一致，不得编造

  rules_for_nodes:
    zh: |
      - 残基编号：使用标准编号系统，如Asp204表示第204位天冬氨酸
      - 氨基酸中文名称：天冬氨酸(Asp)、苯丙氨酸(Phe)、赖氨酸(Lys)、精氨酸(Arg)等
      - 位点类型：活性位点（直接参与催化）、结合位点（结合底物或配体）、修饰位点（可被修饰）
      - 化学性质：疏水、亲水、极性、带电荷等

display:
  label: "protein_name"
