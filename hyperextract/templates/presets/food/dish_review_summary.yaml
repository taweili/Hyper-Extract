name: "DishReviewSummary"
autotype: list
tag: [food]

language: zh

description:
  zh: "食评摘要清单 - 按菜品提取核心评价点、推荐等级及价格感知"

item_schema:
  fields:
    - name: dish_name
      type: "string"
      description:
        zh: "菜品名称"
      required: true
      default: ""
    - name: recommendation_level
      type: "string"
      description:
        zh: "推荐指数，如⭐⭐⭐⭐⭐ 或 4.5/5"
      required: true
      default: ""
    - name: highlights
      type: "array"
      description:
        zh: "亮点列表"
      required: true
      default: ""
    - name: improvements
      type: "array"
      description:
        zh: "改进空间列表"
      required: true
      default: ""
    - name: price_perception
      type: "string"
      description:
        zh: "价格感知，如性价比高、略贵但值"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "详细描述"
      required: true
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的美食评论家，请从文本中提取每道菜品的核心评价信息，形成食评摘要清单。
  rules:
    zh: |
      1. 提取文本中出现的每道菜品的评价信息
      2. 为每个菜品提取推荐等级（如⭐⭐⭐⭐⭐）
      3. 提取菜品亮点和可能的改进空间
      4. 提取价格感知信息
      5. 每个菜品作为独立条目提取
      6. 保持菜品名称与原文一致
      7. 推荐等级使用原文的表达方式
      8. 推荐指数常用表达：⭐⭐⭐⭐⭐、4.5/5、强烈推荐
      9. 价格感知常用表达：性价比极高、实惠、略贵但值

display:
  label: "{dish_name} - {recommendation_level}"
