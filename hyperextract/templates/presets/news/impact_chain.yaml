name: "ImpactChain"
autotype: graph
tag: [news]

language: zh

description:
  zh: "影响推演链 - 提取 '政策/事件 -> 影响群体 -> 预期后果' 的因果预测链条"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "节点名称"
      required: true
      default: ""
    - name: category
      type: "string"
      description:
        zh: "节点类型：政策/事件、影响群体、预期后果"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: source
      type: "string"
      description:
        zh: "原因"
      required: true
      default: ""
    - name: target
      type: "string"
      description:
        zh: "结果"
      required: true
      default: ""
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：影响、导致、预期"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "影响描述"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的政策分析师，请从政策分析文本中提取影响链实体和它们之间的因果关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 仅从已知实体列表中提取边，不要创建未列出的实体
      4. 关系描述应与原文保持一致
      5. 节点类型：政策/事件（政策文件、重大事件）、影响群体（企业、消费者、经销商等）、预期后果（销量变化、价格调整、市场调整等）
      6. 关系类型：影响、导致、预期
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 节点类型：政策/事件（政策文件、重大事件）、影响群体（企业、消费者、经销商等）、预期后果（销量变化、价格调整、市场调整等）
      4. 描述要包含简要信息
  rules_for_edges:
    zh: |
      1. 仅从已知实体列表中提取边，不要创建未列出的实体
      2. 关系描述应与原文保持一致
      3. 关系类型：影响（政策对群体的影响）、导致（原因导致结果）、预期（对未来趋势的预测）
      4. 描述原因到结果的逻辑链条

identifiers:
  node_id: "name"
  edge_id: "{source}|{relationType}|{target}"
  edge_members:
    source: "source"
    target: "target"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}[{category}]"
  edge_label: "{relationType}"
