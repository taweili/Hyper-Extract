name: "ComplexRelationNet"
autotype: hypergraph
tag: [news]

language: zh

description:
  zh: "复杂关系网络 - 建模涉及多方（三人及以上）的社会关联"

node_schema:
  fields:
    - name: name
      type: "string"
      description:
        zh: "参与者名称"
      required: true
      default: ""
    - name: role
      type: "string"
      description:
        zh: "角色：企业、个人、机构"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "参与者描述"
      required: false
      default: ""

edge_schema:
  fields:
    - name: relationType
      type: "string"
      description:
        zh: "关系类型：商业伙伴、政治盟友、家族成员、投资关系、担保关系"
      required: true
      default: ""
    - name: participants
      type: "array"
      description:
        zh: "参与者列表（3个及以上）"
      required: true
      default: ""
    - name: description
      type: "string"
      description:
        zh: "关系描述"
      required: false
      default: ""

extraction_guide:
  target:
    zh: |
      你是一位专业的新闻调查记者，请从调查报道文本中提取参与者以及它们之间的复杂关系。
  rules:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 超边必须包含至少3个参与者
      4. 仅从已知参与者列表中提取边，不要创建未列出的参与者
      5. 描述应与原文保持一致
      6. 参与者类型：企业、个人、机构
      7. 关系类型：商业伙伴、政治盟友、家族成员、投资关系、担保关系
  rules_for_nodes:
    zh: |
      1. 每个节点只能对应一个独立的实体，禁止将多个实体合并为一个节点
      2. 实体名称与原文保持一致
      3. 参与者类型：企业、个人、机构
      4. 参与者描述要包含基本背景信息
  rules_for_edges:
    zh: |
      1. 超边必须包含至少3个参与者
      2. 仅从已知参与者列表中提取边，不要创建未列出的参与者
      3. 描述应与原文保持一致
      4. 关系类型：商业伙伴、政治盟友、家族成员、投资关系、担保关系
      5. 描述多方之间的具体关联

identifiers:
  node_id: "name"
  edge_id: "{relationType}|{participants}"
  edge_members: "participants"

parameters:
  extraction_mode: "two_stage"

display:
  node_label: "{name}[{role}]"
  edge_label: "{relationType}"
